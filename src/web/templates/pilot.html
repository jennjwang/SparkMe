<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkMe — Pilot Viewer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            color: #374151;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
            gap: 16px;
        }

        .brand {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            letter-spacing: -0.02em;
            flex-shrink: 0;
        }

        .pilot-badge {
            font-size: 11px;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 500;
        }

        .session-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .session-picker select {
            font-size: 13px;
            font-family: inherit;
            color: #374151;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }
        .session-picker select:focus { border-color: #a5b4fc; }
        .session-picker label { font-size: 13px; color: #6b7280; }

        .msg-count {
            font-size: 13px;
            color: #9ca3af;
            flex-shrink: 0;
        }

        /* ---- Layout ---- */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .chat-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---- Chat Area ---- */
        .chat-wrapper {
            flex: 1;
            overflow-y: auto;
            background: #f9fafb;
        }

        .chat-wrapper::-webkit-scrollbar { width: 6px; }
        .chat-wrapper::-webkit-scrollbar-track { background: transparent; }
        .chat-wrapper::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        .chat-inner {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 24px 32px;
        }

        #chat-box {
            display: flex;
            flex-direction: column;
            gap: 36px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            font-size: 15px;
            line-height: 1.8;
            animation: fadeInUp 0.2s ease-out;
        }

        .message.user { justify-content: flex-end; }

        .message .content { flex: 1; min-width: 0; }
        .message .content p { margin: 0; word-wrap: break-word; color: #1f2937; }

        .message.user .content { flex: unset; max-width: 70%; }
        .message.user .content p {
            background: #e5e7eb;
            color: #111827;
            padding: 10px 16px;
            border-radius: 20px 20px 4px 20px;
            display: inline-block;
            word-wrap: break-word;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: #9ca3af;
        }
        .empty-state p { font-size: 15px; }
        .empty-state .sub { font-size: 13px; margin-top: 6px; }

        /* ---- Profile Panel ---- */
        .profile-panel {
            width: 320px;
            flex-shrink: 0;
            background: #fff;
            border-left: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .profile-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .profile-header-title { font-size: 15px; font-weight: 600; color: #111827; }
        .profile-header-badge {
            font-size: 11px; color: #9ca3af;
            background: #f9fafb; border: 1px solid #f3f4f6;
            padding: 2px 8px; border-radius: 99px;
        }
        .profile-header-badge.live { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }

        .profile-body {
            flex: 1; overflow-y: auto; padding: 16px 20px;
        }
        .profile-body::-webkit-scrollbar { width: 5px; }
        .profile-body::-webkit-scrollbar-track { background: transparent; }
        .profile-body::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }

        .profile-section { margin-bottom: 20px; }
        .profile-section-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: #9ca3af; margin-bottom: 8px;
        }
        .profile-value {
            font-size: 14px; color: #1f2937; line-height: 1.6;
            padding: 10px 12px;
            background: #f9fafb; border-radius: 8px;
            border: 1px solid #f3f4f6;
            min-height: 40px;
        }
        .profile-value.empty { color: #d1d5db; font-style: italic; }
        .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .profile-tag {
            font-size: 12px; color: #374151;
            background: #f3f4f6; border-radius: 6px;
            padding: 4px 10px; line-height: 1.4;
        }
        .profile-tag.pain { background: #fef2f2; color: #dc2626; }
        .profile-tag.bright { background: #f0fdf4; color: #16a34a; }
        .profile-tag.tool { background: #eff6ff; color: #2563eb; }
        .profile-tag.ai { background: #faf5ff; color: #7c3aed; }
        .profile-tag.motivation { background: #fffbeb; color: #d97706; }
        .profile-empty-tags { font-size: 13px; color: #d1d5db; font-style: italic; }

        .profile-empty-state {
            text-align: center; padding: 40px 20px; color: #9ca3af;
        }
        .profile-empty-state svg { width: 40px; height: 40px; margin: 0 auto 12px; display: block; opacity: 0.4; }
        .profile-empty-state p { font-size: 14px; }

        @media (min-width: 768px) {
            .chat-inner { padding: 48px 48px 40px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">SparkMe <span class="pilot-badge">Pilot</span></div>

        <div class="session-picker">
            <label for="user-select">User</label>
            <select id="user-select"><option value="">Loading...</option></select>
            <label for="session-select">Session</label>
            <select id="session-select" disabled><option value="">—</option></select>
        </div>

        <span class="msg-count" id="msg-count"></span>
    </div>

    <div class="main-content">
        <div class="chat-column">
            <div class="chat-wrapper">
                <div class="chat-inner">
                    <div id="chat-box">
                        <div class="empty-state">
                            <p>Select a user and session above.</p>
                            <p class="sub">Pilot conversations will be replayed here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-panel" id="profile-panel">
            <div class="profile-header">
                <span class="profile-header-title">User Profile</span>
                <span class="profile-header-badge" id="profile-badge">—</span>
            </div>
            <div class="profile-body" id="profile-body">
                <div class="profile-empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    <p>Select a session to<br>view the profile.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allSessions = {};

        async function loadSessionList() {
            const res = await fetch('/api/pilot-data');
            const data = await res.json();
            if (!data.success) return;
            allSessions = data.sessions;

            const userSel = document.getElementById('user-select');
            userSel.innerHTML = '<option value="">Select user…</option>';
            for (const uid of Object.keys(allSessions)) {
                const opt = document.createElement('option');
                opt.value = uid;
                opt.textContent = uid.slice(0, 12) + '…';
                userSel.appendChild(opt);
            }
        }

        document.getElementById('user-select').addEventListener('change', function() {
            const uid = this.value;
            const sessSel = document.getElementById('session-select');
            sessSel.innerHTML = '<option value="">Select session…</option>';
            sessSel.disabled = !uid;
            if (!uid) return;
            for (const s of (allSessions[uid] || [])) {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s.replace('_', ' ');
                sessSel.appendChild(opt);
            }
        });

        document.getElementById('session-select').addEventListener('change', function() {
            const uid = document.getElementById('user-select').value;
            const sess = this.value;
            if (uid && sess) loadSession(uid, sess);
        });

        async function loadSession(userId, session) {
            document.getElementById('chat-box').innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
            document.getElementById('msg-count').textContent = '';

            const res = await fetch(`/api/pilot-data?user_id=${encodeURIComponent(userId)}&session=${encodeURIComponent(session)}`);
            const data = await res.json();
            if (!data.success) {
                document.getElementById('chat-box').innerHTML = '<div class="empty-state"><p>Failed to load session.</p></div>';
                return;
            }

            renderMessages(data.messages);
            renderProfile(data.user_portrait || {});
        }

        function renderMessages(messages) {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            if (!messages.length) {
                box.innerHTML = '<div class="empty-state"><p>No messages found.</p></div>';
                return;
            }
            for (const msg of messages) {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                const p = document.createElement('p');
                p.innerHTML = msg.content.replace(/\n/g, '<br>');
                const contentDiv = document.createElement('div');
                contentDiv.className = 'content';
                contentDiv.appendChild(p);
                div.appendChild(contentDiv);
                box.appendChild(div);
            }
            document.getElementById('msg-count').textContent = `${messages.length} messages`;
            // Scroll to top so you read from the start
            document.querySelector('.chat-wrapper').scrollTop = 0;
        }

        function renderProfile(portrait) {
            const body = document.getElementById('profile-body');
            const badge = document.getElementById('profile-badge');

            const textFields = [
                { key: 'Role', label: 'Role' },
                { key: 'Tenure', label: 'Tenure' },
            ];
            const tagFields = [
                { key: 'Task Inventory', label: 'Tasks', cls: '' },
            ];

            const hasAny = textFields.some(f => portrait[f.key]) || tagFields.some(f => (portrait[f.key] || []).length > 0);
            if (!hasAny) {
                body.innerHTML = '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>No profile data for this session.</p></div>';
                badge.textContent = 'Empty';
                badge.className = 'profile-header-badge';
                return;
            }

            const filledCount = textFields.filter(f => portrait[f.key]).length + tagFields.filter(f => (portrait[f.key] || []).length > 0).length;
            badge.textContent = `${filledCount} / ${textFields.length + tagFields.length} fields`;
            badge.className = 'profile-header-badge live';

            let html = '';
            for (const { key, label } of textFields) {
                const val = portrait[key];
                html += `<div class="profile-section">
                    <div class="profile-section-label">${label}</div>
                    <div class="profile-value${val ? '' : ' empty'}">${val || 'Not captured'}</div>
                </div>`;
            }
            for (const { key, label, cls } of tagFields) {
                const items = portrait[key] || [];
                html += `<div class="profile-section">
                    <div class="profile-section-label">${label}</div>
                    ${items.length > 0
                        ? `<div class="profile-tags">${items.map(i => `<span class="profile-tag ${cls}">${i}</span>`).join('')}</div>`
                        : `<span class="profile-empty-tags">Not captured</span>`
                    }
                </div>`;
            }
            body.innerHTML = html;
        }

        loadSessionList();
    </script>
</body>
</html>
