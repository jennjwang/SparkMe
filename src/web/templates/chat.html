      async function fetchAndRenderProfile(options = {}) {
        if (!sessionToken) return;
        const stopLoadingSignal = options.showLoading
          ? beginProfileLoadingSignal()
          : null;
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          if (!data.success) return;
          lastPortrait = data.user_portrait || {};
          if (profileConfirmPending && profileConfirmSnapshot) {
            renderProfile(profileConfirmSnapshot);
            return;
          }
          if (
            profileConfirmPending &&
            !profileConfirmSnapshot &&
            profileHasRoleAndTenure(lastPortrait)
          ) {
            profileConfirmSnapshot = JSON.parse(
              JSON.stringify(lastPortrait || {}),
            );
            renderProfile(profileConfirmSnapshot);
            await ensureProfileBuildingIndicatorLeadIn();
            if (!profileConfirmPending) return;
            showProfilePanel();
            return;
          }
          renderProfile(lastPortrait);
          const tasks = lastPortrait["Task Inventory"] || [];
          const otherFieldsFilled = [
            "Functional Role",
            "Work Rhythm",
            "Tools and Methods",
          ].some(
            (k) =>
              lastPortrait[k] &&
              (Array.isArray(lastPortrait[k])
                ? lastPortrait[k].length > 0
                : lastPortrait[k]),
          );
          if (!profileShown && tasks.length >= 3 && otherFieldsFilled) {
            if (window.matchMedia("(max-width: 900px)").matches) {
              profileShown = true;
            } else {
              await ensureProfileBuildingIndicatorLeadIn();
              showProfilePanel();
            }
          }
          // Store topic coverage for the progress panel
          const topics = data.topics || [];
          lastSessionTopics = topics;
          updateProfileProgressBar();
          renderProgressPanel(lastPortrait);
          renderProfile(lastPortrait);
        } catch (e) {
        } finally {
          if (stopLoadingSignal) stopLoadingSignal();
        }
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function capitalizeFirst(s) {
        const str = String(s || "").trim();
        if (!str) return str;
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function capitalizeFieldValue(value) {
        return capitalizeFirst(value);
      }

      function condenseRoleText(value) {
        let s = String(value || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!s) return "";
        s = s.replace(/^(?:currently|right now)\s+/i, "");
        s = s.replace(/^i\s*(?:am|['’]m)\s+/i, "");
        s = s.replace(/^i\s+work\s+as\s+/i, "");
        s = s.replace(/^(?:my\s+)?role\s+is\s+/i, "");
        s = s.replace(/^(?:working|serving)\s+as\s+/i, "");
        s = s.replace(/^an?\s+/i, "");
        s = s.replace(/[.]+$/g, "").trim();
        return s;
      }

      function condenseTenureText(value) {
        let s = String(value || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!s) return "";
        s = s.replace(
          /^i\s*(?:have|['’]ve)\s+been\s+(?:in\s+(?:this|the)\s+)?(?:role|position|postdoc)?\s*(?:for\s+)?/i,
          "",
        );
        s = s.replace(
          /^been\s+(?:in\s+)?(?:this|the)?\s*(?:role|position|postdoc)?\s*(?:for\s+)?/i,
          "",
        );
        s = s.replace(/^for\s+/i, "");
        const durationMatch = s.match(
          /\b(?:about|around|roughly|approximately|almost|nearly|over|under)?\s*\d+(?:\.\d+)?\s*(?:years?|months?|weeks?|days?)\b/i,
        );
        if (durationMatch) return durationMatch[0].trim();
        return s.replace(/[.]+$/g, "").trim();
      }

      function condenseProfileTextField(key, value) {
        const raw = String(value || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!raw) return "";
        const k = String(key || "")
          .toLowerCase()
          .trim();
        if (k === "role" || k === "functional role") {
          return condenseRoleText(raw);
        }
        if (k === "tenure") {
          return condenseTenureText(raw);
        }
        return raw;
      }

      function condensePortraitForDisplay(portrait) {
        if (!portrait || typeof portrait !== "object") return {};
        const out = { ...portrait };
        Object.keys(out).forEach((key) => {
          if (typeof out[key] !== "string") return;
          out[key] = condenseProfileTextField(key, out[key]);
        });
        return out;
      }

      const PROFILE_LABEL_OVERRIDES = {
        "Task Inventory": "Tasks",
      };
      /** Primary column order in the profile panel; other keys follow alphabetically. */
      const PROFILE_FIELD_ORDER = ["Role", "Deliverables", "Task Inventory"];

      function classifyField(value) {
        if (Array.isArray(value)) return "tags";
        if (value !== null && typeof value === "object") return "dict";
        return "text";
      }

      function isFieldFilled(kind, value) {
        if (kind === "tags") return Array.isArray(value) && value.length > 0;
        if (kind === "dict") return value && Object.keys(value).length > 0;
        return typeof value === "string" && value.trim().length > 0;
      }

      function autosizeProfileInput(input) {
        if (!input) return;
        const minHeight = 24;
        const maxHeight = 86;
        const panel = document.getElementById("profile-panel");
        if (
          panel &&
          (!panel.classList.contains("visible") ||
            panel.getBoundingClientRect().width < 220)
        ) {
          input.style.height = minHeight + "px";
          input.style.overflowY = "hidden";
          return;
        }
        input.style.height = "auto";
        const nextHeight = Math.min(
          Math.max(input.scrollHeight, minHeight),
          maxHeight,
        );
        input.style.height = nextHeight + "px";
        input.style.overflowY =
          input.scrollHeight > maxHeight ? "auto" : "hidden";
      }

      function renderProfile(portrait) {
        const panel = document.getElementById("profile-panel");
        if (
          profilePanelLoadingHold &&
          profileLoadSignalDepth > 0 &&
          panel &&
          panel.classList.contains("visible")
        ) {
          return;
        }
        const body = document.getElementById("profile-body");
        const badge = document.getElementById("profile-badge");
        const displayPortrait = condensePortraitForDisplay(portrait);
        const setBadge = (text, className) => {
          if (!badge) return;
          if (profileLoadSignalDepth > 0 && badge.classList.contains("loading"))
            return;
          badge.textContent = text;
          badge.className = className;
        };

        const fields = Object.keys(displayPortrait).map((key) => {
          const value = displayPortrait[key];
          const kind = classifyField(value);
          return {
            key,
            label: PROFILE_LABEL_OVERRIDES[key] || key,
            kind,
            value,
            filled: isFieldFilled(kind, value),
          };
        });

        const profileFieldRank = (key) => {
          const i = PROFILE_FIELD_ORDER.indexOf(key);
          if (i !== -1) return i;
          if (key === "Priority Tasks" || key === "Time Allocation")
            return 2000;
          return 1000;
        };
        fields.sort((a, b) => {
          const ra = profileFieldRank(a.key);
          const rb = profileFieldRank(b.key);
          if (ra !== rb) return ra - rb;
          return a.key.localeCompare(b.key);
        });

        if (fields.length === 0) {
          body.innerHTML =
            '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>Profile is being built<br>as the interview progresses.</p></div>';
          setBadge("Building...", "profile-header-badge");
          return;
        }

        const hasAny = fields.some((f) => f.filled);
        if (!hasAny) {
          body.innerHTML =
            '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>Profile is being built<br>as the interview progresses.</p></div>';
          setBadge("Building...", "profile-header-badge");
          return;
        }

        const visibleFields = fields.filter(
          (f) =>
            f.key !== "Priority Tasks" &&
            f.key !== "Time Allocation" &&
            f.key !== "Task Grouping Tree" &&
            f.key !== TASK_GROUPING_FEEDBACK_KEY,
        );
        const filledCount = visibleFields.filter((f) => f.filled).length;
        setBadge(
          `${filledCount} / ${visibleFields.length} fields`,
          "profile-header-badge live",
        );

        const priorityRaw = Array.isArray(displayPortrait["Priority Tasks"])
          ? displayPortrait["Priority Tasks"]
          : [];
        const prioritySet = new Set(
          priorityRaw.map((t) => String(t).trim().toLowerCase()),
        );

        let html = "";
        for (const field of fields) {
          const { key, label, kind, value } = field;
          if (
            key === "Priority Tasks" ||
            key === "Time Allocation" ||
            key === "Task Grouping Tree" ||
            key === TASK_GROUPING_FEEDBACK_KEY
          )
            continue;
          const tagId = key.replace(/ /g, "-");
          const _sectionHeader = (lbl, fkey) => {
            const cov = _getFieldCoverage(fkey);
            if (!cov)
              return `<div class="profile-section-label">${escapeHtml(lbl)}</div>`;
            const badgeText =
              cov.status === "covered"
                ? "✓ Covered"
                : cov.status === "partial"
                  ? "In Progress"
                  : "Pending";
            return `<div class="profile-section-header-row">
              <div class="profile-section-label">${escapeHtml(lbl)}</div>
              <span class="profile-coverage-badge ${cov.status}">${badgeText}</span>
            </div>`;
          };

          if (key === "Tenure") {
            // Tenure is shown as a pill inside the Role card; skip as standalone section
            continue;
          } else if (kind === "text") {
            const val = typeof value === "string" ? value : "";
            const displayVal = capitalizeFieldValue(val);
            let tenurePillHtml = "";
            if (key === "Role") {
              const rawTenure =
                portrait["Tenure"] || displayPortrait["Tenure"] || "";
              const tenureVal =
                typeof rawTenure === "string"
                  ? condenseTenureText(rawTenure)
                  : "";
              if (tenureVal) {
                tenurePillHtml = `<div class="profile-tenure-pill" style="margin-top:8px">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  ${escapeHtml(tenureVal)}
                </div>`;
              }
            }
            html += `<div class="profile-section">
                        ${_sectionHeader(label, key)}
                        <textarea class="profile-edit-input" data-key="${escapeAttr(key)}" rows="1" placeholder="Not yet captured">${escapeHtml(displayVal)}</textarea>
                        ${tenurePillHtml}
                    </div>`;
          } else if (kind === "tags") {
            const items = Array.isArray(value) ? value : [];
            const singular = label.toLowerCase().replace(/s$/, "");
            const isTaskField = key === "Task Inventory";

            let listHtml = "";
            if (isTaskField) {
              const sig = taskInventorySignature(
                items,
                portraitGroupingFeedback(displayPortrait),
              );
              // Prefer the active widget's tree so the profile always shows the
              // same groupings as the open time-split widget.
              const resolvedTree =
                activeWidgetTree &&
                activeWidgetTree.sig === sig &&
                Array.isArray(activeWidgetTree.tree)
                  ? activeWidgetTree.tree
                  : taskTreeCache.signature === sig &&
                      Array.isArray(taskTreeCache.tree)
                    ? taskTreeCache.tree
                    : null;
              const haveTree = !!resolvedTree;
              if (haveTree) {
                const treeCopy = JSON.parse(JSON.stringify(resolvedTree));
                annotateTree(treeCopy, prioritySet);
                listHtml = renderTaskTreeNodes(treeCopy, 0, key, prioritySet);
              } else {
                const indexed = items.map((item, i) => ({
                  item,
                  origIdx: i,
                  isPriority: prioritySet.has(
                    String(item).trim().toLowerCase(),
                  ),
                }));
                indexed.sort((a, b) => {
                  if (a.isPriority !== b.isPriority)
                    return a.isPriority ? -1 : 1;
                  return a.origIdx - b.origIdx;
                });
                listHtml = `<ul class="profile-task-list" id="tags-${tagId}">
                                ${indexed
                                  .map(({ item, isPriority }) => {
                                    return `<li class="profile-task-item${isPriority ? " priority" : ""}">
                                        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                                            <span class="profile-task-text"><span>${escapeHtml(capitalizeFieldValue(item))}</span></span>
                                            <button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(item)}" title="Remove">×</button>
                                        </div>
                                    </li>`;
                                  })
                                  .join("")}
                            </ul>`;
                // Kick off the organize-tasks fetch in the background; on success we re-render with the tree.
                fetchTaskTree(items);
              }
            } else {
              const indexed = items.map((item, i) => ({ item, origIdx: i }));
              listHtml = `<ul class="profile-task-list" id="tags-${tagId}">
                            ${indexed
                              .map(({ item }) => {
                                return `<li class="profile-task-item">
                                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                                        <span class="profile-task-text"><span>${escapeHtml(capitalizeFieldValue(item))}</span></span>
                                        <button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(item)}" title="Remove">×</button>
                                    </div>
                                </li>`;
                              })
                              .join("")}
                        </ul>`;
            }

            html += `<div class="profile-section">
                        ${_sectionHeader(label, key)}
                        ${listHtml}
                        <div class="profile-add-row">
                            <input class="profile-add-input" id="add-input-${tagId}" placeholder="Add ${escapeAttr(singular)}…">
                            <button class="profile-add-btn" data-key="${escapeAttr(key)}">Add</button>
                        </div>
                    </div>`;
          } else if (kind === "dict") {
            const entries = Object.entries(value || {}).filter(
              ([k, v]) => k && v !== undefined && v !== null && v !== "",
            );
            html += `<div class="profile-section">
                        ${_sectionHeader(label, key)}
                        ${
                          entries.length > 0
                            ? `<ul class="profile-task-list" id="dict-${tagId}">
                                ${entries.map(([k, v]) => `<li class="profile-task-item"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;"><span class="profile-task-text">${escapeHtml(capitalizeFieldValue(k))}</span><span style="color:#6b7280;font-variant-numeric:tabular-nums;margin-left:8px;">${escapeHtml(typeof v === "string" ? capitalizeFieldValue(v) : String(v))}</span><button class="profile-tag-remove" data-dict-key="${escapeAttr(key)}" data-entry-key="${escapeAttr(k)}" title="Remove">×</button></div></li>`).join("")}
                               </ul>`
                            : `<div class="profile-value empty">Not yet captured</div>`
                        }
                    </div>`;
          }
        }
        html += `<button class="profile-save-btn" id="profile-save-btn">Save changes</button>`;
        body.innerHTML = html;

        body.querySelectorAll(".profile-edit-input").forEach((input) => {
          autosizeProfileInput(input);
          input.addEventListener("input", () => autosizeProfileInput(input));
        });
        const panelEl = document.getElementById("profile-panel");
        if (panelEl && panelEl.classList.contains("visible")) {
          scheduleProfileInputAutosizeRefresh();
        }

        body
          .querySelectorAll(".profile-tag-remove[data-dict-key]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const dictKey = btn.dataset.dictKey;
              const entryKey = btn.dataset.entryKey;
              if (
                lastPortrait[dictKey] &&
                typeof lastPortrait[dictKey] === "object"
              ) {
                delete lastPortrait[dictKey][entryKey];
              }
              renderProfile(lastPortrait);
            });
          });

        body
          .querySelectorAll(".profile-tag-remove[data-key]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const key = btn.dataset.key;
              const taskName = btn.dataset.taskName;
              const arr = lastPortrait[key] || [];
              const needle = String(taskName || "")
                .trim()
                .toLowerCase();
              let removed = null;
              const removeIdx = arr.findIndex(
                (t) => String(t).trim().toLowerCase() === needle,
              );
              if (removeIdx >= 0) {
                removed = arr[removeIdx];
                lastPortrait[key] = arr.filter((_, i) => i !== removeIdx);
              }
              if (key === "Task Inventory" && removed) {
                if (Array.isArray(lastPortrait["Priority Tasks"])) {
                  lastPortrait["Priority Tasks"] = lastPortrait[
                    "Priority Tasks"
                  ].filter((t) => String(t).trim().toLowerCase() !== needle);
                }
                if (
                  lastPortrait["Time Allocation"] &&
                  typeof lastPortrait["Time Allocation"] === "object"
                ) {
                  for (const k of Object.keys(
                    lastPortrait["Time Allocation"],
                  )) {
                    if (String(k).trim().toLowerCase() === needle)
                      delete lastPortrait["Time Allocation"][k];
                  }
                }
                // Invalidate the cached tree so the next render refetches the grouped layout.
                taskTreeCache = { signature: null, tree: null };
              }
              renderProfile(lastPortrait);
            });
          });
        body.querySelectorAll(".profile-add-btn").forEach((btn) => {
          btn.addEventListener("click", () => addTag(btn.dataset.key));
        });
        body.querySelectorAll(".profile-add-input").forEach((input) => {
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              addTag(
                input
                  .closest(".profile-section")
                  .querySelector(".profile-add-btn").dataset.key,
              );
            }
          });
        });
        document
          .getElementById("profile-save-btn")
          .addEventListener("click", saveProfile);

        updateProfileProgressBar();
      }

      function addTag(key) {
        const input = document.getElementById(
          `add-input-${key.replace(/ /g, "-")}`,
        );
        if (!input) return;
        const val = input.value.trim();
        if (!val) return;
        if (!lastPortrait[key]) lastPortrait[key] = [];
        lastPortrait[key].push(capitalizeFieldValue(val));
        if (key === "Task Inventory") {
          taskTreeCache = { signature: null, tree: null };
        }
        renderProfile(lastPortrait);
      }

      async function saveProfile() {
        const portrait = { ...lastPortrait };
        document.querySelectorAll(".profile-edit-input").forEach((input) => {
          portrait[input.dataset.key] = capitalizeFieldValue(
            input.value.trim(),
          );
        });
        const btn = document.getElementById("profile-save-btn");
        btn.disabled = true;
        btn.textContent = "Saving…";
        try {
          const r = await fetch("/api/update-portrait", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_token: sessionToken, portrait }),
          });
          const data = await r.json();
          if (data.success) {
            lastPortrait = portrait;
            btn.textContent = "Saved ✓";
            if (profileConfirmPending) {
              resolveProfileConfirmGate();
            } else {
              document
                .getElementById("profile-panel")
                .classList.remove("visible");
              document.getElementById("profile-btn").classList.remove("active");
              const backdrop = document.getElementById("profile-backdrop");
              if (backdrop) backdrop.classList.remove("visible");
            }
            setTimeout(() => {
              btn.disabled = false;
              btn.textContent = "Save changes";
            }, 1500);
          } else {
            btn.textContent = "Error";
            btn.disabled = false;
          }
        } catch (e) {
          btn.textContent = "Error";
          btn.disabled = false;
        }
      }

      // Shorten a subtopic description to a readable label (text before first colon, or full if short)
      function _subtopicLabel(desc) {
        if (!desc) return "";
        const colonIdx = desc.indexOf(":");
        const label =
          colonIdx > 0 && colonIdx < 40 ? desc.slice(0, colonIdx) : desc;
        return label.length > 52 ? label.slice(0, 50) + "…" : label;
      }

      // Build deliverable cards from interview topics (session state)
      function _buildTopicDeliverables() {
        if (!lastSessionTopics.length) return null;
        const cards = lastSessionTopics.map((topic) => {
          const subs = (topic.subtopics || []).filter((s) => !s.is_emergent);
          const coveredCount = subs.filter((s) => s.is_covered).length;
          let status;
          if (subs.length === 0) status = "pending";
          else if (coveredCount === subs.length) status = "mapped";
          else if (coveredCount > 0) status = "exploring";
          else status = "pending";
          return {
            name: topic.description,
            subs,
            status,
            coveredCount,
            total: subs.length,
          };
        });
        // If no topic is partially covered yet, mark the first pending as EXPLORING
        if (
          !isSessionCompleted &&
          !cards.some((c) => c.status === "exploring")
        ) {
          const firstPending = cards.find((c) => c.status === "pending");
          if (firstPending) firstPending.status = "exploring";
        }
        return cards;
      }

      function _computeProgressPct() {
        // Use real subtopic coverage from session state
        if (lastSessionTopics.length > 0) {
          const allSubs = lastSessionTopics.flatMap((t) => t.subtopics || []);
          const total = allSubs.filter((s) => !s.is_emergent).length;
          if (total > 0) {
            const covered = allSubs.filter(
              (s) => !s.is_emergent && s.is_covered,
            ).length;
            return Math.round((covered / total) * 100);
          }
        }
        return 0;
      }

      // Get deliverables for the progress panel:
      // 1. portrait["Deliverables"] flat list → each is a card, tasks come from Task Grouping Tree children
      // 2. Fallback: Task Grouping Tree top-level nodes
      function _getPortraitDeliverables(portrait) {
        // Build a name→tasks lookup from the task grouping tree
        const savedTree = portrait && portrait["Task Grouping Tree"];
        const treeSource =
          Array.isArray(savedTree) && savedTree.length > 0
            ? savedTree
            : taskTreeCache &&
                Array.isArray(taskTreeCache.tree) &&
                taskTreeCache.tree.length > 0
              ? taskTreeCache.tree
              : [];
        const treeMap = {};
        for (const node of treeSource) {
          const name = (node.name || "").trim().toLowerCase();
          if (name)
            treeMap[name] = Array.isArray(node.children)
              ? node.children
                  .map((c) => (typeof c === "string" ? c : c.name || ""))
                  .filter(Boolean)
              : [];
        }

        // Prefer the explicit Deliverables list
        const delivList = portrait && portrait["Deliverables"];
        if (Array.isArray(delivList) && delivList.length > 0) {
          return delivList.filter(Boolean).map((name) => ({
            name: String(name),
            tasks: treeMap[String(name).trim().toLowerCase()] || [],
          }));
        }

        // Fallback: use Task Grouping Tree nodes directly
        return treeSource.map((node) => ({
          name: node.name || "",
          tasks: Array.isArray(node.children)
            ? node.children
                .map((c) => (typeof c === "string" ? c : c.name || ""))
                .filter(Boolean)
            : [],
        }));
      }

      function updateProfileProgressBar() {
        const wrap = document.getElementById("profile-progress-wrap");
        const fill = document.getElementById("profile-progress-fill");
        const label = document.getElementById("profile-progress-label");
        if (!wrap || !fill || !label) return;
        if (!lastSessionTopics || lastSessionTopics.length === 0) {
          wrap.style.display = "none";
          return;
        }
        const pct = _computeProgressPct();
        wrap.style.display = "flex";
        fill.style.width = pct + "%";
        label.textContent = pct + "%";
      }

      // ---- Progress Panel ----

      let progressPanelTab = "role";

      function toggleProgressPanel() {
        const panel = document.getElementById("progress-panel");
        const btn = document.getElementById("progress-btn");
        const backdrop = document.getElementById("profile-backdrop");
        if (!panel) return;
        const isVisible = panel.classList.contains("visible");
        if (isVisible) {
          panel.classList.remove("visible");
          btn.classList.remove("active");
          if (backdrop) backdrop.classList.remove("visible");
        } else {
          document.getElementById("profile-panel").classList.remove("visible");
          document.getElementById("profile-btn").classList.remove("active");
          panel.classList.add("visible");
          btn.classList.add("active");
          if (backdrop) backdrop.classList.add("visible");
          renderProgressPanel(lastPortrait);
          if (sessionToken) fetchAndRenderProfile();
        }
      }

      document.getElementById("progress-btn").onclick = toggleProgressPanel;

      document
        .getElementById("progress-tabs")
        .addEventListener("click", (e) => {
          const tabBtn = e.target.closest("[data-tab]");
          if (!tabBtn) return;
          progressPanelTab = tabBtn.dataset.tab;
          document
            .querySelectorAll(".progress-tab")
            .forEach((t) => t.classList.remove("active"));
          tabBtn.classList.add("active");
          renderProgressPanel(lastPortrait);
        });

      function renderProgressPanel(portrait) {
        const panel = document.getElementById("progress-panel");
        if (!panel || !panel.classList.contains("visible")) return;
        portrait = portrait || {};

        const pct = _computeProgressPct();
        document.getElementById("progress-pct").textContent = pct + "%";
        document.getElementById("progress-bar-fill").style.width = pct + "%";

        const role = portrait["Role"] || "";
        const tenure = portrait["Tenure"] || "";
        const tasks = (portrait["Task Inventory"] || []).filter(Boolean);
        const topicCards = _buildTopicDeliverables();
        const portraitDeliverables = _getPortraitDeliverables(portrait);

        let html = "";
        if (progressPanelTab === "role") {
          html = _progRoleHtml(role, tenure);
        } else if (progressPanelTab === "deliverables") {
          html = _progDeliverablesHtml(portraitDeliverables, tasks);
        } else if (progressPanelTab === "tasks") {
          html = _progTasksHtml(portraitDeliverables, tasks);
        } else if (progressPanelTab === "review") {
          html = _progReviewHtml(portrait, topicCards, tasks);
        }

        document.getElementById("progress-body").innerHTML =
          html ||
          '<div class="prog-empty-state"><p>Start the interview to<br>see your progress.</p></div>';
      }

      function _progRoleHtml(role, tenure) {
        if (!role)
          return '<div class="prog-empty-state"><p>Role will appear<br>as the interview progresses.</p></div>';
        const tenureHtml = tenure
          ? `<div class="prog-role-meta"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${escapeHtml(condenseTenureText(tenure))}</div>`
          : "";
        return `<div class="prog-role-card">
          <div class="prog-role-label">Role</div>
          <div class="prog-role-title">${escapeHtml(role)}</div>
          ${tenureHtml}
        </div>`;
      }

      function _progDeliverablesHtml(deliverables, fallbackTasks) {
        let firstUnmapped = true;
        const enriched = deliverables.map((d) => {
          if (d.tasks.length > 0) return { ...d, status: "mapped" };
          if (firstUnmapped && !isSessionCompleted) {
            firstUnmapped = false;
            return { ...d, status: "exploring" };
          }
          return { ...d, status: "pending" };
        });

        if (!enriched.length) {
          if (!fallbackTasks.length)
            return '<div class="prog-empty-state"><p>Deliverables will appear<br>as the interview progresses.</p></div>';
          return `<div class="prog-section-header">
            <span class="prog-section-title">Deliverables</span>
            <span class="prog-section-count">identifying…</span>
          </div>
          <div class="prog-deliverable-card exploring">
            <div class="prog-deliverable-top">
              <span class="prog-deliverable-name">Your work</span>
              <span class="prog-deliverable-status exploring">Exploring</span>
            </div>
            <div class="prog-deliverable-divider"></div>
            <div class="prog-tasks-label">Tasks (${fallbackTasks.length})</div>
            <ul class="prog-tasks-list exploring">
              ${fallbackTasks
                .slice(0, 6)
                .map((t) => `<li>${escapeHtml(t)}</li>`)
                .join("")}
              ${fallbackTasks.length > 6 ? `<li style="color:#9ca3af">+${fallbackTasks.length - 6} more…</li>` : ""}
            </ul>
          </div>`;
        }

        let html = `<div class="prog-section-header">
          <span class="prog-section-title">Deliverables</span>
          <span class="prog-section-count">${enriched.filter((d) => d.status === "mapped").length} of ${enriched.length} mapped</span>
        </div>`;

        for (const d of enriched) {
          const statusLabel =
            d.status === "mapped"
              ? "Mapped ✓"
              : d.status === "exploring"
                ? "Exploring"
                : "Pending";
          html += `<div class="prog-deliverable-card ${d.status === "pending" ? "" : d.status}">
            <div class="prog-deliverable-top">
              <span class="prog-deliverable-name">${escapeHtml(d.name)}</span>
              <span class="prog-deliverable-status ${d.status}">${statusLabel}</span>
            </div>`;
          if (d.status === "mapped" && d.tasks.length > 0) {
            html += `<div class="prog-deliverable-divider"></div>
              <div class="prog-tasks-label">Tasks (${d.tasks.length})</div>
              <ul class="prog-tasks-list mapped">
                ${d.tasks.map((t) => `<li>${escapeHtml(t)}</li>`).join("")}
              </ul>`;
          } else if (d.status === "exploring") {
            html += `<div class="prog-deliverable-divider"></div>
              <div class="prog-tasks-label">Tasks</div>
              <div class="prog-exploring-note">Identifying tasks with you now…</div>`;
          }
          html += "</div>";
        }
        return html;
      }

      function _progTasksHtml(portraitDeliverables, fallbackTasks) {
        if (portraitDeliverables.some((d) => d.tasks.length > 0)) {
          let html = "";
          for (const d of portraitDeliverables) {
            if (!d.tasks.length) continue;
            html += `<div class="prog-role-card">
              <div class="prog-role-label">${escapeHtml(d.name)}</div>
              <ul class="prog-tasks-list mapped" style="margin-top:4px">
                ${d.tasks.map((t) => `<li>${escapeHtml(t)}</li>`).join("")}
              </ul>
            </div>`;
          }
          return html;
        }
        if (!fallbackTasks.length)
          return '<div class="prog-empty-state"><p>Tasks will appear<br>as the interview progresses.</p></div>';
        return `<div class="prog-section-header">
          <span class="prog-section-title">All Tasks</span>
          <span class="prog-section-count">${fallbackTasks.length} identified</span>
        </div>
        <div class="prog-role-card">
          <ul class="prog-tasks-list" style="margin-top:0">
            ${fallbackTasks.map((t) => `<li>${escapeHtml(t)}</li>`).join("")}
          </ul>
        </div>`;
      }

      function _progReviewHtml(portrait, topicCards, tasks) {
        const role = portrait["Role"] || "";
        const tenure = portrait["Tenure"] || "";
        const portraitDeliverables = _getPortraitDeliverables(portrait);
        const mappedCount = portraitDeliverables.filter(
          (d) => d.tasks.length > 0,
        ).length;

        if (!role && !tasks.length)
          return '<div class="prog-empty-state"><p>The review will be available<br>once the interview progresses.</p></div>';

        let html = "";
        if (role) {
          const tenureHtml = tenure
            ? `<div class="prog-role-meta"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${escapeHtml(condenseTenureText(tenure))}</div>`
            : "";
          html += `<div class="prog-role-card"><div class="prog-role-label">Role</div><div class="prog-role-title">${escapeHtml(role)}</div>${tenureHtml}</div>`;
        }
        if (portraitDeliverables.length > 0) {
          html += `<div class="prog-role-card"><div class="prog-role-label">Deliverables</div><div class="prog-role-title">${mappedCount} of ${portraitDeliverables.length} mapped</div></div>`;
        }
        if (tasks.length > 0) {
          html += `<div class="prog-role-card"><div class="prog-role-label">Tasks Identified</div><div class="prog-role-title">${tasks.length} tasks captured</div></div>`;
        }
        if (topicCards && topicCards.length) {
          const coveredTopics = topicCards.filter(
            (c) => c.status === "mapped",
          ).length;
          html += `<div class="prog-role-card"><div class="prog-role-label">Interview Coverage</div><div class="prog-role-title">${coveredTopics} of ${topicCards.length} topics done</div></div>`;
        }
        return html;
      }

      // Returns {status:'covered'|'partial'|'pending'} for a profile field based on interview topic coverage
      function _getFieldCoverage(fieldKey) {
        if (!lastSessionTopics || !lastSessionTopics.length) return null;
        let topic;
        if (fieldKey === "Role" || fieldKey === "Tenure") {
          topic = lastSessionTopics.find((t) =>
            (t.description || "").toLowerCase().includes("role"),
          );
        } else if (
          fieldKey === "Deliverables" ||
          fieldKey === "Task Inventory"
        ) {
          topic = lastSessionTopics.find((t) =>
            (t.description || "").toLowerCase().includes("task"),
          );
        }
        if (!topic) return null;
        const subs = (topic.subtopics || []).filter((s) => !s.is_emergent);
        let relevantSubs = subs;
        // Role covers both role/title (sub 0) and tenure (sub 1) since tenure pill lives inside the Role card
        if (fieldKey === "Role") relevantSubs = subs.slice(0, 2);
        const total = relevantSubs.length;
        if (total === 0) return null;
        const covered = relevantSubs.filter((s) => s.is_covered).length;
        return {
          status:
            covered === total ? "covered" : covered > 0 ? "partial" : "pending",
        };
      }

      // Returns Map<name.toLowerCase(), status> for each deliverable in the portrait
      function _getDeliverableStatuses(portrait) {
        const deliverables = _getPortraitDeliverables(portrait);
        const result = new Map();
        let firstUnmapped = true;
        for (const d of deliverables) {
          const key = d.name.toLowerCase();
          if (d.tasks.length > 0) {
            result.set(key, "mapped");
          } else if (firstUnmapped && !isSessionCompleted) {
            result.set(key, "exploring");
            firstUnmapped = false;
          } else {
            result.set(key, "pending");
          }
        }
        return result;
      }
    </script>
  </body>
</html>
