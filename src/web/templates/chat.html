      </div>
    </div>
    <div class="profile-backdrop" id="profile-backdrop"></div>
    <div
      id="page-config"
      style="display: none"
      data-prolific-completion-code="{{ prolific_completion_code }}"
      data-attn-check-max-fails="{{ attn_check_max_fails }}"
    ></div>

    <script>
      const _pageCfg = document.getElementById("page-config").dataset;
      const PROLIFIC_COMPLETION_CODE = _pageCfg.prolificCompletionCode || "";
      const ATTN_CHECK_MAX_FAILS = parseInt(
        _pageCfg.attnCheckMaxFails || "1",
        10,
      );

      let sessionToken = null;
      let sessionStartTime = null;
      let sessionTargetMs = null;
      let timerInterval = null;
      let isRecording = false;
      let mediaRecorder = null;
      let audioChunks = [];
      let seenMessageIds = new Set();
      let pendingAudioMessages = new Set();
      let currentAudio = null;
      let ttsEnabled = false;
      let isSessionCompleted = false;
      let pollingInterval = null;
      let endSessionButtonTimer = null;
      let isInitializing = false;
      let sessionRecovering = false;
      let pendingSessionRecovery = false;
      let sessionRecoverAttempts = 0;
      const MAX_SESSION_RECOVER_ATTEMPTS = 1;
      const MIN_SESSION_DURATION_MS = 0;
      let profileConfirmPending = false;
      let profileConfirmWidgetSeen = false;
      let attnFailed = 0;
      let botMessageBuffer = [];
      let profilePanelRevealInFlight = false;
      let profileConfirmSnapshot = null;
      let sendInFlight = false;

      const chatInput = document.getElementById("chat-input");
      chatInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 160) + "px";
      });

      function updateStatus(msg) {
        document.getElementById("status").textContent = msg;
      }

      function availableMinutesFromUrl() {
        const raw = new URLSearchParams(window.location.search).get(
          "available_time",
        );
        const parsed = Number.parseInt(raw || "", 10);
        if (!Number.isFinite(parsed)) return 20;
        return Math.min(120, Math.max(5, parsed));
      }

      function roundUpToPageSize(value, pageSize) {
        return Math.ceil(value / pageSize) * pageSize;
      }

      function regularTaskTarget(pageSize) {
        const minutes = availableMinutesFromUrl();
        const raw = Math.round(minutes * 0.75);
        return roundUpToPageSize(Math.min(36, Math.max(6, raw)), pageSize);
      }

      function aiTaskTarget(pageSize) {
        const minutes = availableMinutesFromUrl();
        const raw = Math.round(minutes * 0.35);
        return roundUpToPageSize(Math.min(18, Math.max(3, raw)), pageSize);
      }

      function startTimer() {
        const el = document.getElementById("session-timer");
        const tick = () => {
          const elapsedMs = Math.max(0, Date.now() - sessionStartTime);
          if (sessionTargetMs) {
            const remainingMs = sessionTargetMs - elapsedMs;
            const remainingMin = Math.ceil(remainingMs / 60000);
            el.textContent =
              remainingMs >= 0
                ? `${remainingMin} min left`
                : `+${Math.ceil(-remainingMs / 60000)} min`;
          } else {
            const elapsedMin = Math.floor(elapsedMs / 60000);
            el.textContent = `${elapsedMin} min`;
          }
        };
        tick();
        timerInterval = setInterval(tick, 1000);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function parseSessionStartTimeMs(payload) {
        const epochCandidate = Number(payload?.session_started_at_epoch_ms);
        if (Number.isFinite(epochCandidate) && epochCandidate > 0) {
          return epochCandidate;
        }

        const iso = String(payload?.session_started_at || "").trim();
        if (!iso) return null;

        const hasZone = /(?:Z|[+-]\d{2}:\d{2})$/.test(iso);
        const parsed = Date.parse(hasZone ? iso : `${iso}Z`);
        if (!Number.isFinite(parsed)) return null;
        return parsed;
      }

      function scrollToBottom() {
        const w = document.querySelector(".chat-wrapper");
        w.scrollTop = w.scrollHeight;
      }

      function disableChatInputs() {
        chatInput.disabled = true;
        chatInput.placeholder = "Session has ended. Thank you!";
        document.querySelector(".send-btn").disabled = true;
        document.getElementById("record-toggle").disabled = true;
        document.getElementById("chat-form").onsubmit = (e) => {
          e.preventDefault();
        };
      }

      function appendMessage(role, text, messageId) {
        if (messageId && seenMessageIds.has(messageId)) return false;
        if (messageId) seenMessageIds.add(messageId);

        const hint = document.getElementById("hint-text");
        if (hint) hint.style.display = "none";

        const box = document.getElementById("chat-box");
        const isUser = role === "user" || role === "User";
        const div = document.createElement("div");
        div.className = `message ${isUser ? "user" : "bot"}`;
        div.dataset.msgId = messageId || "";

        const contentP = document.createElement("p");
        const contentDiv = document.createElement("div");
        contentDiv.className = "content";
        contentDiv.appendChild(contentP);

        div.appendChild(contentDiv);
        box.appendChild(div);

        contentP.innerHTML = text.replace(/\n/g, "<br>");

        scrollToBottom();
        return true;
      }

      function normalizeTaskName(t) {
        return String(t)
          .toLowerCase()
          .trim()
          .replace(/[^\w\s]/g, "")
          .replace(
            /\b(just|the|a|an|my|some|any|basically|mostly|really|primarily)\b/g,
            "",
          )
          .replace(/\b(art|work|stuff|things|tasks?|activities?|stuff)\b/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      const IRREGULAR_TASK_STEMS = {
        reading: "read",
        reads: "read",
        wrote: "write",
        written: "write",
        writing: "write",
        running: "run",
        ran: "run",
        built: "build",
        building: "build",
        met: "meet",
        meeting: "meet",
      };

      function stemTaskToken(token) {
        const t = String(token || "")
          .toLowerCase()
          .trim();
        if (!t) return "";
        if (IRREGULAR_TASK_STEMS[t]) return IRREGULAR_TASK_STEMS[t];
        if (t.endsWith("ies") && t.length > 4) return t.slice(0, -3) + "y";
        if (t.endsWith("ing") && t.length > 5) return t.slice(0, -3);
        if (t.endsWith("ed") && t.length > 4) return t.slice(0, -2);
        if (t.endsWith("s") && t.length > 3) return t.slice(0, -1);
        return t;
      }

      function taskCoreKey(t) {
        let s = normalizeTaskName(t);
        if (!s) return "";
        // Objective tails ("to ...") should not create distinct tasks.
        const toIdx = s.indexOf(" to ");
        if (toIdx > 0) s = s.slice(0, toIdx).trim();
        // Explanatory clauses ("..., but ...") are usually manner/tool detail.
        const butIdx = s.indexOf(" but ");
        if (butIdx > 0) s = s.slice(0, butIdx).trim();
        if (!s) return "";
        return s
          .split(/\s+/)
          .map((tok) => stemTaskToken(tok))
          .filter(Boolean)
          .join(" ")
          .trim();
      }

      function dedupKey(t) {
        return taskCoreKey(t);
      }

      function dedupTasks(tasks) {
        const seen = new Map();
        for (const t of tasks) {
          const key = dedupKey(t);
          if (!key) continue;
          // Keep the first occurrence (by insertion order)
          if (!seen.has(key)) seen.set(key, t);
        }
        return Array.from(seen.values());
      }

      async function showTimeSplitWidget() {
        if (document.getElementById("time-split-widget")) return;

        // Show loading placeholder immediately so the widget appears as soon
        // as the question does — portrait refresh happens in the background.
        const widget = document.createElement("div");
        widget.id = "time-split-widget";
        widget.className = "time-split-widget";
        document.getElementById("chat-box").appendChild(widget);
        widget.innerHTML = `
                <div class="tsp-header">
                    <span class="tsp-title">Time allocation across tasks</span>
                </div>
                <div class="tsp-loader" aria-live="polite" aria-label="Organizing your tasks">
                    <div class="tsp-loader-tree">
                        <div class="tsp-loader-row is-parent"><span class="tsp-loader-dotmark"></span><div class="tsp-loader-chip" style="width:42%"></div></div>
                        <div class="tsp-loader-row is-sub"><span class="tsp-loader-branch"></span><span class="tsp-loader-dotmark"></span><div class="tsp-loader-chip" style="width:58%"></div></div>
                        <div class="tsp-loader-row is-sub"><span class="tsp-loader-branch"></span><span class="tsp-loader-dotmark"></span><div class="tsp-loader-chip" style="width:46%"></div></div>
                        <div class="tsp-loader-row is-parent"><span class="tsp-loader-dotmark"></span><div class="tsp-loader-chip" style="width:36%"></div></div>
                        <div class="tsp-loader-row is-sub"><span class="tsp-loader-branch"></span><span class="tsp-loader-dotmark"></span><div class="tsp-loader-chip" style="width:52%"></div></div>
                        <div class="tsp-loader-row is-sub"><span class="tsp-loader-branch"></span><span class="tsp-loader-dotmark"></span><div class="tsp-loader-chip" style="width:40%"></div></div>
                    </div>
                    <div class="tsp-loader-status">
                        <span class="tsp-loader-dots" aria-hidden="true"><span></span><span></span><span></span></span>
                        <span class="tsp-loader-messages">
                            <span>Reading through your tasks…</span>
                            <span>Finding themes and connections…</span>
                            <span>Grouping related work together…</span>
                            <span>Building your task tree…</span>
                        </span>
                    </div>
                    <div class="tsp-loader-hint">This usually takes under a minute.</div>
                </div>`;
        scrollToBottom();

        async function _fetchFreshWidgetData() {
          for (let attempt = 0; attempt < 4; attempt++) {
            const res = await fetch("/api/time-split-ready", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                session_token: sessionToken,
                timeout_seconds: 35,
              }),
            });
            if (res.status === 504) continue;
            if (!res.ok) throw new Error("time-split-ready request failed");
            const data = await res.json();
            if (data && data.success) return data;
            throw new Error("time-split-ready payload invalid");
          }
          throw new Error("fresh time-split data timed out");
        }

        let readyPayload = null;
        try {
          readyPayload = await _fetchFreshWidgetData();
        } catch (e) {
          widget.innerHTML = `
                <div class="tsp-header">
                    <span class="tsp-title">Time allocation across tasks</span>
                </div>
                <div style="color:#9ca3af;font-size:13px;padding:18px 2px;">Still preparing the latest task list. Please try again in a moment.</div>`;
          return;
        }
        lastPortrait = readyPayload.user_portrait || lastPortrait;
        renderProfile(lastPortrait);

        const rawTasks = lastPortrait["Task Inventory"] || [];
        const seedTasks = dedupTasks(rawTasks);
        if (seedTasks.length === 0) {
          widget.remove();
          return;
        }

        let tree = Array.isArray(readyPayload.tree) ? readyPayload.tree : [];
        if (!tree.length)
          tree = seedTasks.map((name) => ({ name, children: [] }));

        // Lock the profile panel to the same tree the widget resolved so both
        // always show the same groupings while the widget is active.
        if (tree.length) {
          const sig = taskInventorySignature(
            seedTasks,
            portraitGroupingFeedback(lastPortrait),
          );
          taskTreeCache = { signature: sig, tree };
          activeWidgetTree = { sig, tree };
          renderProfile(lastPortrait);
        }

        // Flatten tree into a node map
        const nodes = {}; // id -> { id, name, originalName, isGroup, mergedFrom, val, parentId, childIds }
        const rootIds = [];
        let nextId = 1;

        function addNode(name, parentId, isGroup = false, mergedFrom = []) {
          const id = "n" + nextId++;
          nodes[id] = {
            id,
            name,
            originalName: name,
            isGroup,
            mergedFrom,
            val: 0,
            parentId: parentId || null,
            childIds: [],
          };
          if (parentId) nodes[parentId].childIds.push(id);
          else rootIds.push(id);
          return id;
        }

        function buildFromTree(treeNodes, parentId) {
          for (const t of treeNodes || []) {
            const id = addNode(
              String(t.name || "").trim(),
              parentId,
              !!t.is_group,
              Array.isArray(t.merged_from) ? t.merged_from.filter(Boolean) : [],
            );
            if (Array.isArray(t.children) && t.children.length) {
              buildFromTree(t.children, id);
            }
          }
        }
        let otherId = null;
        function resetNodesFromTree(treeNodes) {
          const prevOtherVal =
            otherId && nodes[otherId] ? Number(nodes[otherId].val || 0) : 0;
          Object.keys(nodes).forEach((id) => delete nodes[id]);
          rootIds.splice(0, rootIds.length);
          nextId = 1;
          buildFromTree(treeNodes, null);
          // Always append an "Other" catch-all leaf at root
          otherId = addNode("Other", null);
          nodes[otherId].val = prevOtherVal;
        }
        resetNodesFromTree(tree);

        const PALETTE = [
          "#6366f1",
          "#f59e0b",
          "#10b981",
          "#06b6d4",
          "#f97316",
          "#8b5cf6",
          "#ec4899",
          "#14b8a6",
          "#84cc16",
          "#0ea5e9",
        ];
        function colorFor(id) {
          if (id === otherId) return "#d1d5db";
          const nonOther = rootIds.filter((r) => r !== otherId);
          const idx = nonOther.indexOf(id);
          return PALETTE[idx % PALETTE.length] || "#6366f1";
        }

        function normalizedRootPcts() {
          const rawTotal = rootIds.reduce(
            (s, id) => s + (nodes[id].val || 0),
            0,
          );
          if (rawTotal === 0) return {};
          const pcts = {};
          let allocated = 0;
          const active = rootIds.filter((id) => (nodes[id].val || 0) > 0);
          active.forEach((id, i) => {
            if (i < active.length - 1) {
              const scaled = Math.round((nodes[id].val / rawTotal) * 100);
              pcts[id] = scaled;
              allocated += scaled;
            } else {
              pcts[id] = 100 - allocated;
            }
          });
          return pcts;
        }

        function stackedBarMarkup() {
          const pcts = normalizedRootPcts();
          const segs = rootIds
            .map((id) => {
              const pct = pcts[id] || 0;
              if (pct === 0) return "";
              return `<div class="tsp-stacked-seg" style="width:${pct}%;background:${colorFor(id)}" title="${escapeAttr(capitalizeFirst(nodes[id].name))}: ${pct}%"></div>`;
            })
            .join("");
          const legend = rootIds
            .filter((id) => id !== otherId || (nodes[id].val || 0) > 0)
            .map((id) => {
              const color = colorFor(id);
              return `<span class="tsp-legend-item"><span class="tsp-legend-dot" style="background:${color}"></span><span class="tsp-legend-name" title="${escapeAttr(capitalizeFirst(nodes[id].name))}">${escapeHtml(capitalizeFirst(nodes[id].name))}</span></span>`;
            })
            .join("");
          return `<div class="tsp-stacked-bar" id="tsp-stacked-bar">${segs}</div><div class="tsp-legend" id="tsp-legend">${legend}</div>`;
        }

        function updateStackedBar() {
          const bar = widget.querySelector("#tsp-stacked-bar");
          if (!bar) return;
          const pcts = normalizedRootPcts();
          bar.innerHTML = rootIds
            .map((id) => {
              const pct = pcts[id] || 0;
              if (pct === 0) return "";
              return `<div class="tsp-stacked-seg" style="width:${pct}%;background:${colorFor(id)}" title="${escapeAttr(capitalizeFirst(nodes[id].name))}: ${pct}%"></div>`;
            })
            .join("");
        }

        function isLeaf(n) {
          return n.childIds.length === 0;
        }
        function getLeafIds() {
          return Object.values(nodes)
            .filter(isLeaf)
            .map((n) => n.id);
        }
        function total() {
          return Object.values(nodes).reduce((s, n) => s + (n.val || 0), 0);
        }

        function seedAllocations() {
          // Start every leaf at 0 — the user fills in from scratch.
          Object.values(nodes).forEach((n) => {
            n.val = 0;
          });
        }

        const OTHER_EXPLAIN_THRESHOLD = 1;
        let phase = "refine"; // 'refine' | 'allocate' | 'explain'
        let otherExplanation = "";
        let addSubForId = null;
        let groupingFeedback = portraitGroupingFeedback(lastPortrait);
        let regroupBusy = false;
        let regroupStatus = "";
        let regroupStatusError = false;
        let regroupRequestNonce = 0;

        function findOther() {
          return nodes[otherId];
        }

        function removeNode(id) {
          const n = nodes[id];
          if (!n) return;
          // Recursively remove children first
          [...n.childIds].forEach(removeNode);
          // Detach from parent / roots
          if (n.parentId) {
            const p = nodes[n.parentId];
            p.childIds = p.childIds.filter((cid) => cid !== id);
          } else {
            const i = rootIds.indexOf(id);
            if (i >= 0) rootIds.splice(i, 1);
          }
          delete nodes[id];
        }

        function isAncestorOf(ancestorId, descendantId) {
          let cur = nodes[descendantId];
          while (cur && cur.parentId) {
            if (cur.parentId === ancestorId) return true;
            cur = nodes[cur.parentId];
          }
          return false;
        }

        function reparent(nodeId, newParentId) {
          const n = nodes[nodeId];
          if (!n) return false;
          if (nodeId === otherId) return false;
          if (newParentId === otherId) return false;
          if (newParentId === nodeId) return false;
          if (newParentId === n.parentId) return false;
          if (newParentId && isAncestorOf(nodeId, newParentId)) return false;
          // Detach
          if (n.parentId) {
            const p = nodes[n.parentId];
            p.childIds = p.childIds.filter((cid) => cid !== nodeId);
          } else {
            const i = rootIds.indexOf(nodeId);
            if (i >= 0) rootIds.splice(i, 1);
          }
          // Attach
          if (newParentId) {
            nodes[newParentId].childIds.push(nodeId);
            n.parentId = newParentId;
          } else {
            const oIdx = rootIds.indexOf(otherId);
            if (oIdx >= 0) rootIds.splice(oIdx, 0, nodeId);
            else rootIds.push(nodeId);
            n.parentId = null;
          }
          return true;
        }

        function footerMarkup(t) {
          const hasAny = t > 0;
          const warnMsg = !hasAny
            ? `<div class="tsp-total-wrap"><span class="tsp-total warn" id="tsp-total"><span class="tsp-total-dot"></span>Move at least one slider to continue</span></div>`
            : "";
          return `
                    ${warnMsg}
                    <button class="tsp-back-btn" id="tsp-alloc-back">Back</button>
                    <button class="tsp-submit" id="tsp-submit" ${hasAny ? "" : "disabled"}>Submit</button>`;
        }

        function refineFooterMarkup() {
          const leafCount = getLeafIds().filter((id) => id !== otherId).length;
          const countLabel = leafCount === 1 ? "1 task" : `${leafCount} tasks`;
          const statusCls = leafCount > 0 ? "ok" : "warn";
          return `
                    <div class="tsp-total-wrap">
                        <span class="tsp-total ${statusCls}">
                            <span class="tsp-total-dot"></span>${countLabel} to allocate
                        </span>
                    </div>
                    <button class="tsp-submit" id="tsp-refine-next" ${leafCount === 0 ? "disabled" : ""}>Allocate time →</button>`;
        }

        function explainMarkup() {
          const pct = findOther().val;
          const canSubmit = otherExplanation.trim().length > 0;
          return `
                    <div class="tsp-explain">
                        <div class="tsp-explain-label">You put <strong>${pct}%</strong> toward "Other" — what does that cover?</div>
                        <input type="text" class="tsp-explain-input" id="tsp-explain-input"
                               placeholder="e.g., admin tasks, mentoring, job applications..."
                               value="${escapeAttr(otherExplanation)}" maxlength="200">
                        <div class="tsp-explain-actions">
                            <button class="tsp-back-btn" id="tsp-explain-back">Back</button>
                            <button class="tsp-submit" id="tsp-explain-submit" ${canSubmit ? "" : "disabled"}>Submit</button>
                        </div>
                    </div>`;
        }

        function commitTaskEdits() {
          widget.querySelectorAll(".tsp-task-edit").forEach((ta) => {
            const n = nodes[ta.dataset.id];
            if (n && ta.value.trim()) n.name = ta.value.trim();
          });
        }

        function collectRegroupTasks() {
          return dedupTasks(
            Object.values(nodes)
              .filter((n) => n.id !== otherId && !n.isGroup)
              .map((n) => String(n.name || "").trim())
              .filter(Boolean),
          );
        }

        async function regroupTasksFromFeedback() {
          if (phase !== "refine" || regroupBusy) return;
          const feedback = groupingFeedback.trim();
          if (!feedback) return;

          addSubForId = null;
          commitTaskEdits();
          const regroupTasks = collectRegroupTasks();
          if (regroupTasks.length < 2) {
            regroupStatus = "Add at least two tasks before regrouping.";
            regroupStatusError = true;
            render();
            return;
          }

          regroupBusy = true;
          regroupStatus = "Regrouping subtasks...";
          regroupStatusError = false;
          const reqId = ++regroupRequestNonce;
          render();

          let regrouped = false;
          try {
            const res = await fetch("/api/organize-tasks", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                session_token: sessionToken,
                tasks: regroupTasks,
                grouping_feedback: feedback,
              }),
            });
            if (!res.ok) throw new Error("regroup request failed");
            const data = await res.json();
            if (
              reqId !== regroupRequestNonce ||
              !data ||
              !data.success ||
              !Array.isArray(data.tree) ||
              data.tree.length === 0
            ) {
              throw new Error("invalid regroup payload");
            }
            tree = data.tree;
            resetNodesFromTree(tree);
            const sig = taskInventorySignature(regroupTasks, feedback);
            activeWidgetTree = { sig, tree };
            regroupStatus =
              String(data.acknowledgement || "").trim() ||
              "Applied feedback and regrouped subtasks.";
            regroupStatusError = false;
            regrouped = true;
          } catch (_) {
            if (reqId !== regroupRequestNonce) return;
            regroupStatus =
              "Couldn’t regroup right now. Try different feedback.";
            regroupStatusError = true;
          } finally {
            if (reqId !== regroupRequestNonce) return;
            regroupBusy = false;
            render();
            if (regrouped) renderProfile(lastPortrait);
            scrollToBottom();
          }
        }

        function groupingFeedbackMarkup() {
          if (phase !== "refine") return "";
          const canRegroup = groupingFeedback.trim().length > 0 && !regroupBusy;
          const showStatus = !regroupBusy && regroupStatus.trim().length > 0;
          const statusClass = regroupStatusError
            ? "tsp-regroup-status error"
            : "tsp-regroup-status success";
          const btnClass = `tsp-regroup-btn${regroupBusy ? " is-busy" : ""}`;
          const btnContent = regroupBusy
            ? `<span class="tsp-regroup-spinner" aria-hidden="true"></span>Regrouping…`
            : "Regroup subtasks";
          return `
                    <div class="tsp-group-feedback">
                        <div class="tsp-group-feedback-header">
                            <span class="tsp-group-feedback-label">Refine subtask grouping</span>
                            <span class="tsp-group-feedback-optional">optional</span>
                        </div>
                        <div class="tsp-group-feedback-hint">Tell me how you'd like subtasks re-grouped — by project, theme, or anything else.</div>
                        <textarea class="tsp-group-feedback-input" id="tsp-group-feedback-input" placeholder="e.g., group all meetings together and separate writing from analysis" maxlength="400">${escapeHtml(groupingFeedback)}</textarea>
                        <div class="tsp-group-feedback-actions">
                            <button class="${btnClass}" id="tsp-regroup-btn" ${canRegroup ? "" : "disabled"}>${btnContent}</button>
                            ${showStatus ? `<span class="${statusClass}" id="tsp-regroup-status">${escapeHtml(regroupStatus)}</span>` : `<span class="tsp-regroup-status" id="tsp-regroup-status" aria-hidden="true"></span>`}
                        </div>
                    </div>`;
        }

        function indentHtml(depth) {
          return Array.from(
            { length: depth },
            () => '<span class="tsp-task-indent"></span>',
          ).join("");
        }

        function renderNode(id, depth, out) {
          const n = nodes[id];
          const leaf = isLeaf(n);
          const rowCls = leaf ? "" : "is-parent";
          const inRefine = phase === "refine";
          if (!inRefine && depth > 0) return; // Allocate phase shows only top-level tasks.
          const nodeColor = colorFor(id);
          const trackInner = inRefine
            ? ``
            : `<div class="tsp-bar-fill" id="tsp-fill-${id}" style="width:${n.val}%;background:${nodeColor}"></div>
                        <input type="range" class="tsp-slider" data-id="${id}" min="0" max="100" step="1" value="${n.val}" style="--tsp-color:${nodeColor}">`;
          if (inRefine) {
            const depthCls = depth > 0 ? " is-sub" : "";
            const isDraggable = id !== otherId;
            out.push(`
                        <div class="tsp-row is-refine${depthCls} ${rowCls}" data-id="${id}" data-depth="${depth}" style="${depth > 0 ? `margin-left:${depth * 28}px;` : ""}" ${isDraggable ? 'draggable="true"' : ""}>
                            ${depth > 0 ? `<span class="tsp-sub-connector" aria-hidden="true"></span>` : ""}
                            ${isDraggable ? `<span class="tsp-drag-handle" title="Drag to nest or un-nest">⠿</span>` : ""}
                            <span class="tsp-task">
                                <textarea class="tsp-task-edit" data-id="${id}" draggable="false" maxlength="120" title="Click to edit" rows="1">${escapeHtml(capitalizeFirst(n.name))}</textarea>
                                ${""}
                            </span>
                            ${id !== otherId ? `<button class="tsp-add-sub" data-id="${id}" title="Add subtask"><span class="tsp-add-sub-plus">+</span> sub</button>` : ""}
                            ${id !== otherId ? `<button class="tsp-remove" data-id="${id}" title="Remove">×</button>` : `<span class="tsp-row-spacer"></span>`}
                        </div>`);
          } else {
            const displayPct = normalizedRootPcts()[id] || 0;
            const pctCell = `<span class="tsp-pct${displayPct ? "" : " tsp-pct-zero"}" id="tsp-pct-${id}">${displayPct ? displayPct + "%" : "—"}</span>`;
            out.push(`
                        <div class="tsp-row ${rowCls}" data-id="${id}" style="border-left:3px solid ${nodeColor};padding-left:10px;">
                            <span class="tsp-task" title="${escapeAttr(n.name)}">
                                <span class="tsp-task-label">${escapeHtml(capitalizeFirst(n.name))}</span>
                            </span>
                            <div class="tsp-track">${trackInner}</div>
                            ${pctCell}
                        </div>`);
          }
          if (addSubForId === id) {
            const subDepth = depth + 1;
            out.push(`
                        <div class="tsp-subadd-row" data-depth="${subDepth}" style="margin-left:${subDepth * 28}px;">
                            <span class="tsp-subadd-connector" aria-hidden="true"></span>
                            <input type="text" class="tsp-subadd-input" id="tsp-subadd-input"
                                   placeholder='Subtask of "${escapeAttr(n.name)}"…' maxlength="80">
                            <button class="tsp-subadd-commit" id="tsp-subadd-commit">Add</button>
                            <button class="tsp-subadd-cancel" id="tsp-subadd-cancel" title="Cancel">×</button>
                        </div>`);
          }
          for (const cid of n.childIds) renderNode(cid, depth + 1, out);
        }

        function buildRows() {
          const out = [];
          for (const id of rootIds) {
            if (phase === "refine" && id === otherId) continue;
            renderNode(id, 0, out);
          }
          return out.join("");
        }

        function finalSubmit() {
          // Normalize all values so they sum to exactly 100%.
          const rawTotal = total();
          if (rawTotal > 0) {
            let allocated = 0;
            const nodeList = Object.values(nodes);
            const active = nodeList.filter((n) => n.val > 0);
            active.forEach((n, i) => {
              if (i < active.length - 1) {
                const scaled = Math.round((n.val / rawTotal) * 100);
                n.val = scaled;
                allocated += scaled;
              } else {
                n.val = 100 - allocated;
              }
            });
          }

          // Emit every node with a non-zero allocation (parents and leaves alike).
          const parts = [];
          function walk(id, prefix) {
            const n = nodes[id];
            const path = prefix ? `${prefix} › ${n.name}` : n.name;
            if (n.val > 0) {
              if (n.id === otherId && otherExplanation.trim()) {
                parts.push(`Other (${otherExplanation.trim()}): ${n.val}%`);
              } else {
                parts.push(`${path}: ${n.val}%`);
              }
            }
            for (const cid of n.childIds) walk(cid, path);
          }
          for (const id of rootIds) walk(id, "");
          activeWidgetTree = null;
          widget.remove();
          chatInput.value = parts.join(", ");
          document
            .getElementById("chat-form")
            .dispatchEvent(new Event("submit"));
        }

        function render() {
          const title =
            phase === "refine"
              ? "Review your tasks"
              : "Time allocation across tasks";
          const subtitle =
            phase === "refine"
              ? "Edit names, remove extras, or drag any task to nest it under another."
              : "";
          const addRow =
            phase === "refine" || phase === "allocate"
              ? `<div class="tsp-add-row">
                        <input type="text" class="tsp-add-input" id="tsp-add-input" placeholder="Add a task..." maxlength="80">
                        <button class="tsp-add-btn" id="tsp-add-btn">+ Add</button>
                       </div>`
              : "";
          let footer;
          if (phase === "explain") footer = explainMarkup();
          else if (phase === "refine")
            footer = `<div class="tsp-footer">${refineFooterMarkup()}</div>`;
          else
            footer = `<div class="tsp-footer">${footerMarkup(total())}</div>`;
          widget.innerHTML = `
                    <div class="tsp-header">
                        <div class="tsp-header-text">
                            <span class="tsp-title">${title}</span>
                            ${subtitle ? `<span class="tsp-subtitle">${subtitle}</span>` : ""}
                        </div>
                    </div>
                    ${phase === "allocate" ? stackedBarMarkup() : ""}
                    <div id="tsp-rows">${buildRows()}</div>
                    ${addRow}
                    ${groupingFeedbackMarkup()}
                    ${footer}`;
          widget.querySelectorAll(".tsp-task-edit").forEach((el) => {
            el.style.height = "auto";
            el.style.height = el.scrollHeight + "px";
          });
        }

        function updateFooter() {
          const footer = widget.querySelector(".tsp-footer");
          if (!footer) return;
          if (phase === "refine") footer.innerHTML = refineFooterMarkup();
          else if (phase === "allocate")
            footer.innerHTML = footerMarkup(total());
        }

        function updatePctDisplays() {
          const pcts = normalizedRootPcts();
          rootIds.forEach((id) => {
            const el = document.getElementById(`tsp-pct-${id}`);
            if (!el) return;
            const p = pcts[id] || 0;
            el.textContent = p ? p + "%" : "—";
            el.className = "tsp-pct" + (p ? "" : " tsp-pct-zero");
          });
        }

        function applyVal(id, rawVal) {
          const n = nodes[id];
          if (!n) return;
          let v = parseInt(rawVal);
          if (isNaN(v)) v = 0;
          v = Math.max(0, Math.min(100, v));
          n.val = v;
          const fill = document.getElementById(`tsp-fill-${id}`);
          if (fill) fill.style.width = v + "%";
          const slider = widget.querySelector(`.tsp-slider[data-id="${id}"]`);
          if (slider && slider !== document.activeElement) slider.value = v;
          updateFooter();
          updateStackedBar();
          updatePctDisplays();
        }

        function addTopLevel() {
          const input = widget.querySelector("#tsp-add-input");
          const name = input.value.trim();
          if (!name) return;
          const newId = addNode(name, null);
          // Keep Other as the last root
          const oIdx = rootIds.indexOf(otherId);
          const nIdx = rootIds.indexOf(newId);
          if (oIdx >= 0 && nIdx > oIdx) {
            rootIds.splice(nIdx, 1);
            rootIds.splice(oIdx, 0, newId);
          }
          render();
          scrollToBottom();
        }

        function commitSubtask() {
          const input = widget.querySelector("#tsp-subadd-input");
          if (!input || !addSubForId) return;
          const name = input.value.trim();
          if (!name) return;
          addNode(name, addSubForId);
          addSubForId = null;
          render();
          scrollToBottom();
        }

        let dragId = null;
        function clearDropClasses() {
          widget
            .querySelectorAll(".is-drop-target")
            .forEach((el) => el.classList.remove("is-drop-target"));
          const rowsEl = widget.querySelector("#tsp-rows");
          if (rowsEl) rowsEl.classList.remove("is-drop-root");
        }
        widget.addEventListener("dragstart", function (e) {
          const row = e.target.closest(".tsp-row.is-refine");
          if (!row || row.dataset.id === otherId) return;
          dragId = row.dataset.id;
          row.classList.add("is-dragging");
          e.dataTransfer.effectAllowed = "move";
          try {
            e.dataTransfer.setData("text/plain", dragId);
          } catch (_) {}
        });
        widget.addEventListener("dragend", function () {
          dragId = null;
          widget
            .querySelectorAll(".is-dragging")
            .forEach((el) => el.classList.remove("is-dragging"));
          clearDropClasses();
        });
        widget.addEventListener("dragover", function (e) {
          if (!dragId) return;
          const rowsEl = widget.querySelector("#tsp-rows");
          if (!rowsEl) return;
          clearDropClasses();
          const row = e.target.closest(".tsp-row.is-refine");
          const canDropOnRow =
            row &&
            row.dataset.id !== dragId &&
            row.dataset.id !== otherId &&
            !isAncestorOf(dragId, row.dataset.id) &&
            nodes[dragId] &&
            nodes[dragId].parentId !== row.dataset.id;
          if (canDropOnRow) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            row.classList.add("is-drop-target");
          } else if (
            rowsEl.contains(e.target) &&
            nodes[dragId] &&
            nodes[dragId].parentId !== null
          ) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            rowsEl.classList.add("is-drop-root");
          }
        });
        widget.addEventListener("drop", function (e) {
          if (!dragId) return;
          e.preventDefault();
          const rowsEl = widget.querySelector("#tsp-rows");
          const row = e.target.closest(".tsp-row.is-refine");
          let changed = false;
          if (
            row &&
            row.dataset.id !== dragId &&
            row.dataset.id !== otherId &&
            !isAncestorOf(dragId, row.dataset.id)
          ) {
            changed = reparent(dragId, row.dataset.id);
          } else if (
            rowsEl &&
            rowsEl.contains(e.target) &&
            nodes[dragId] &&
            nodes[dragId].parentId !== null
          ) {
            changed = reparent(dragId, null);
          }
          dragId = null;
          clearDropClasses();
          if (changed) render();
        });

        widget.addEventListener("input", function (e) {
          if (e.target.classList.contains("tsp-slider")) {
            applyVal(e.target.dataset.id, e.target.value);
          } else if (e.target.id === "tsp-explain-input") {
            otherExplanation = e.target.value;
            const btn = document.getElementById("tsp-explain-submit");
            if (btn) btn.disabled = otherExplanation.trim().length === 0;
          } else if (e.target.id === "tsp-group-feedback-input") {
            groupingFeedback = e.target.value;
            const btn = document.getElementById("tsp-regroup-btn");
            if (btn)
              btn.disabled =
                regroupBusy || groupingFeedback.trim().length === 0;
          }
        });

        widget.addEventListener("change", function (e) {
          if (e.target.classList.contains("tsp-task-edit")) {
            const id = e.target.dataset.id;
            const n = nodes[id];
            if (!n) return;
            const newName = e.target.value.trim();
            if (newName) {
              n.name = newName;
              render();
            } else e.target.value = n.name;
          }
        });
        widget.addEventListener("keydown", function (e) {
          if (!e.target.classList.contains("tsp-task-edit")) return;
          if (e.key === "Enter") {
            e.preventDefault();
            e.target.blur();
          }
          if (e.key === "Escape") {
            const n = nodes[e.target.dataset.id];
            if (n) e.target.value = n.name;
            e.target.blur();
          }
        });

        widget.addEventListener("click", function (e) {
          if (e.target.classList.contains("tsp-remove")) {
            removeNode(e.target.dataset.id);
            render();
            scrollToBottom();
            return;
          }
          if (e.target.classList.contains("tsp-add-sub")) {
            addSubForId = e.target.dataset.id;
            render();
            scrollToBottom();
            setTimeout(() => {
              const el = document.getElementById("tsp-subadd-input");
              if (el) el.focus();
            }, 0);
            return;
          }
          if (e.target.id === "tsp-subadd-commit") {
            commitSubtask();
            return;
          }
          if (e.target.id === "tsp-subadd-cancel") {
            addSubForId = null;
            render();
            return;
          }
          if (e.target.id === "tsp-add-btn") {
            addTopLevel();
            return;
          }
          if (e.target.id === "tsp-regroup-btn") {
            regroupTasksFromFeedback();
            return;
          }
          if (e.target.id === "tsp-refine-next") {
            addSubForId = null;
            commitTaskEdits();
            // Save the task list back to the portrait.
            // Rules:
            //   - Skip Other and invented group labels (isGroup=true) — they are display containers, not tasks.
            //   - For un-edited nodes that absorbed tasks via dedup (mergedFrom), expand back to the
            //     original granular tasks so the portrait retains full detail.
            //   - For user-edited nodes, save the edited name as-is.
            const editedTasks = [];
            Object.values(nodes).forEach((n) => {
              if (n.id === otherId || n.isGroup) return;
              const userEdited = n.name.trim() !== n.originalName.trim();
              if (userEdited) {
                if (n.name.trim()) editedTasks.push(n.name.trim());
              } else if (n.mergedFrom && n.mergedFrom.length > 0) {
                n.mergedFrom.forEach((t) => {
                  if (t.trim()) editedTasks.push(t.trim());
                });
              } else {
                if (n.name.trim()) editedTasks.push(n.name.trim());
              }
            });
            // Serialize current widget hierarchy so drag-and-drop regroups persist.
            // Excludes the Other bucket (display-only).
            function serializeNode(id) {
              const n = nodes[id];
              if (!n) return null;
              const out = {
                name: String(n.name || "").trim(),
                children: (n.childIds || []).map(serializeNode).filter(Boolean),
              };
              if (n.isGroup) out.is_group = true;
              if (Array.isArray(n.mergedFrom) && n.mergedFrom.length > 0) {
                out.merged_from = n.mergedFrom.slice();
              }
              return out;
            }
            const groupingTree = rootIds
              .filter((id) => id !== otherId)
              .map(serializeNode)
              .filter(Boolean);
            if (editedTasks.length > 0 && lastPortrait) {
              const normalizedGroupingFeedback =
                normalizeGroupingFeedback(groupingFeedback);
              const updatedPortrait = {
                ...lastPortrait,
                "Task Inventory": editedTasks,
              };
              if (normalizedGroupingFeedback) {
                updatedPortrait[TASK_GROUPING_FEEDBACK_KEY] =
                  normalizedGroupingFeedback;
              } else {
                delete updatedPortrait[TASK_GROUPING_FEEDBACK_KEY];
              }
              if (groupingTree.length > 0) {
                updatedPortrait["Task Grouping Tree"] = groupingTree;
              } else {
                delete updatedPortrait["Task Grouping Tree"];
              }
              lastPortrait = updatedPortrait;
              // Prime the cache with the tree the user just submitted so the
              // profile panel doesn't re-fetch an out-of-date LLM grouping.
              const newSig = taskInventorySignature(
                editedTasks,
                normalizedGroupingFeedback,
              );
              taskTreeCache = { signature: newSig, tree: groupingTree };
              fetch("/api/update-portrait", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  session_token: sessionToken,
                  portrait: updatedPortrait,
                }),
              }).catch(() => {});
            }
            seedAllocations();
            phase = "allocate";
            render();
            scrollToBottom();
            return;
          }
          if (e.target.id === "tsp-alloc-back") {
            phase = "refine";
            render();
            scrollToBottom();
            return;
          }
          if (e.target.id === "tsp-submit") {
            if (total() === 0) return;
            const other = findOther();
            if (other && other.val >= OTHER_EXPLAIN_THRESHOLD) {
              phase = "explain";
              render();
              scrollToBottom();
              setTimeout(() => {
                const el = document.getElementById("tsp-explain-input");
                if (el) el.focus();
              }, 0);
            } else {
              finalSubmit();
            }
            return;
          }
          if (e.target.id === "tsp-explain-back") {
            phase = "allocate";
            render();
            return;
          }
          if (e.target.id === "tsp-explain-submit") {
            if (otherExplanation.trim().length === 0) return;
            finalSubmit();
          }
        });

        widget.addEventListener("keydown", function (e) {
          if (e.key !== "Enter") return;
          if (e.target.id === "tsp-add-input") {
            e.preventDefault();
            addTopLevel();
          } else if (e.target.id === "tsp-subadd-input") {
            e.preventDefault();
            commitSubtask();
          } else if (
            e.target.id === "tsp-explain-input" &&
            otherExplanation.trim().length > 0
          ) {
            e.preventDefault();
            finalSubmit();
          }
        });

        render();
        scrollToBottom();
      }

      async function showTaskValidationWidget() {
        if (document.getElementById("task-validation-widget")) return;

        const widget = document.createElement("div");
        widget.id = "task-validation-widget";
        widget.className = "task-validation-widget";
        document.getElementById("chat-box").appendChild(widget);
        scrollToBottom();

        const _PAGE_SIZE = 3; // tasks shown per page — must match _TASK_BATCH_SIZE on server
        const _ATTN_INTERVAL = 8; // inject one attention check per N real tasks
        const _TARGET_REAL_TASKS = regularTaskTarget(_PAGE_SIZE);
        const _TARGET_AI_TASKS = aiTaskTarget(_PAGE_SIZE);

        // State: flat list of all tasks across all batches
        let allTasks = []; // {text, description, status, isAttentionCheck, isAiTask, aiType}
        let batchesLoaded = 0;
        let viewStart = 0; // first index of the currently visible page
        let done = false;
        let prefetchPromise = null;
        let prefetchedBatch = null;
        let pendingAttentionChecks = [];

        function esc(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        async function fetchBatch(idx) {
          const prior = allTasks
            .filter((t) => !t.isAttentionCheck)
            .map((t) => t.text);
          const res = await fetch("/api/generate-tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_token: sessionToken,
              batch_index: idx,
              prior_tasks: prior,
            }),
          });
          const data = await res.json();
          if (!data.success) throw new Error(data.error || "fetch failed");
          return {
            tasks: (data.tasks || []).map((t) => ({
              text: typeof t === "string" ? t : t.name || "",
              description: typeof t === "string" ? "" : t.description || "",
              status: "unreviewed",
              isAttentionCheck: false,
            })),
            hasMore: !!data.has_more,
          };
        }

        async function fetchAttentionChecks() {
          try {
            const res = await fetch("/api/attention-check-tasks", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session_token: sessionToken }),
            });
            const data = await res.json();
            if (data.success) {
              pendingAttentionChecks = (data.tasks || []).map((t) => ({
                text: t.name || "",
                description: t.description || "",
                status: "unreviewed",
                isAttentionCheck: true,
              }));
            }
          } catch (_) {}
        }

        // AI task widget state — managed inside renderAiTaskWidget, kept here for scope
        let _aiWidgetTasks = [];
        let _aiWidgetHasMore = true;
        let _aiWidgetBatchIdx = 0;
        let _aiWidgetFetching = null; // Promise of in-flight fetch
        let _aiPendingDistractors = []; // attention-check items for AI widget

        async function _fetchAiDistractors() {
          try {
            const res = await fetch("/api/ai-attention-check-tasks", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session_token: sessionToken }),
            });
            const data = await res.json();
            if (data.success) {
              _aiPendingDistractors = (data.tasks || []).map((t) => ({
                text: t.name || "",
                description: t.description || "",
                isAttentionCheck: true,
              }));
            }
          } catch (_) {}
        }

        async function _fetchAiTaskBatch() {
          if (!_aiWidgetHasMore) return;
          const currentReal = _aiWidgetTasks.filter(
            (t) => !t.isAttentionCheck,
          ).length;
          if (currentReal >= _TARGET_AI_TASKS) {
            _aiWidgetHasMore = false;
            return;
          }
          const prior = _aiWidgetTasks
            .filter((t) => !t.isAttentionCheck)
            .map((t) => t.text);
          const res = await fetch("/api/ai-era-tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_token: sessionToken,
              batch_index: _aiWidgetBatchIdx,
              prior_tasks: prior,
            }),
          });
          const data = await res.json();
          if (data.success) {
            for (const t of data.tasks || []) {
              const currentReal = _aiWidgetTasks.filter(
                (x) => !x.isAttentionCheck,
              ).length;
              if (currentReal >= _TARGET_AI_TASKS) {
                _aiWidgetHasMore = false;
                break;
              }
              _aiWidgetTasks.push({
                text: t.name || "",
                description: t.description || "",
                aiType: t.ai_type || "capability",
                isAttentionCheck: false,
              });
              // Inject distractor every _ATTN_INTERVAL real tasks
              const realCount = _aiWidgetTasks.filter(
                (x) => !x.isAttentionCheck,
              ).length;
              if (
                _aiPendingDistractors.length &&
                realCount > 0 &&
                realCount % _ATTN_INTERVAL === 0
              ) {
                _aiWidgetTasks.push(_aiPendingDistractors.shift());
              }
            }
            _aiWidgetHasMore =
              !!data.has_more &&
              _aiWidgetTasks.filter((t) => !t.isAttentionCheck).length <
                _TARGET_AI_TASKS;
            _aiWidgetBatchIdx++;
          }
          _aiWidgetFetching = null;
        }

        function _ensureAiTaskBatch() {
          if (!_aiWidgetFetching && _aiWidgetHasMore) {
            _aiWidgetFetching = _fetchAiTaskBatch().catch(() => {
              _aiWidgetHasMore = false;
              _aiWidgetFetching = null;
            });
          }
          return _aiWidgetFetching || Promise.resolve();
        }

        function numClass(status) {
          if (status === "confirmed") return "tvw-num-confirmed";
          if (status === "edited") return "tvw-num-edited";
          if (status === "removed") return "tvw-num-removed";
          return "";
        }

        function taskCardHTML(t, idx) {
          const statusCls =
            t.status !== "unreviewed" ? ` tvw-card-${t.status}` : "";
          const badge =
            t.status === "edited"
              ? `<span class="tvw-badge tvw-badge-edited">edited</span>`
              : t.isConversation
                ? `<span class="tvw-badge tvw-badge-convo">you mentioned this</span>`
                : "";

          const actions = `
            <div class="tvw-card-actions">
              <button class="tvw-action-btn tvw-accurate-btn" data-idx="${idx}">Accurate</button>
              <button class="tvw-action-btn tvw-edit-btn"     data-idx="${idx}">Edit</button>
              <button class="tvw-action-btn tvw-remove-btn"   data-idx="${idx}">Remove</button>
              <!-- wish list button hidden -->
              <!-- <button class="tvw-action-btn tvw-wish-btn"     data-idx="${idx}" title="Add to wishlist">♡ Wish list</button> -->
            </div>`;
          return `<div class="tvw-task-card${statusCls}" id="tvw-card-${idx}">
            <div class="tvw-card-num ${numClass(t.status)}">${idx + 1}</div>
            <div class="tvw-card-body">
              <div class="tvw-card-title-row">
                <span class="tvw-card-title">${esc(t.text)}</span>${badge}
              </div>
              ${t.description ? `<div class="tvw-card-desc">${esc(t.description)}</div>` : ""}
              ${actions}
            </div>
          </div>`;
        }

        function updateProgress() {
          const visible = allTasks.slice(viewStart, viewStart + _PAGE_SIZE);
          const visibleReviewed = visible.filter(
            (t) => t.status !== "unreviewed",
          ).length;
          const visibleTotal = visible.length;
          const pct =
            visibleTotal > 0
              ? Math.round((visibleReviewed / visibleTotal) * 100)
              : 0;
          const fill = document.getElementById("tvw-progress-fill");
          if (fill) fill.style.width = `${pct}%`;
          const totalReviewed = allTasks.filter(
            (t) => t.status !== "unreviewed",
          ).length;
          const txt = document.getElementById("tvw-progress-text");
          if (txt)
            txt.textContent = `${totalReviewed} of ${allTasks.length} reviewed`;
        }

        function updateFooter() {
          const footer = document.getElementById("tvw-widget-footer");
          if (!footer) return;
          const hasNext = !done || viewStart + _PAGE_SIZE < allTasks.length;
          footer.innerHTML = `
            <button class="tvw-skip-btn" id="tvw-skip">Done</button>
            <button class="tvw-continue-btn" id="tvw-continue">Continue →</button>`;
          footer
            .querySelector("#tvw-skip")
            ?.addEventListener("click", renderMissing);
          footer
            .querySelector("#tvw-continue")
            ?.addEventListener("click", hasNext ? handleNext : renderMissing);
        }

        function showBatch(start) {
          viewStart = start;
          const list = document.getElementById("tvw-task-list");
          if (!list) return;
          list.innerHTML = "";
          allTasks.slice(start, start + _PAGE_SIZE).forEach((t, i) => {
            const globalIdx = start + i;
            const div = document.createElement("div");
            div.innerHTML = taskCardHTML(t, globalIdx);
            list.appendChild(div.firstElementChild);
            attachCardListeners(globalIdx);
            // Auto-fetch description if missing
            if (!t.description) {
              const card = document.getElementById(`tvw-card-${globalIdx}`);
              if (card) {
                const body = card.querySelector(".tvw-card-body");
                const actions = card.querySelector(".tvw-card-actions");
                const descEl = document.createElement("div");
                descEl.className = "tvw-card-desc";
                descEl.style.color = "#d1d5db";
                descEl.textContent = "Loading…";
                if (actions) body.insertBefore(descEl, actions);
                fetch("/api/regenerate-task-description", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    session_token: sessionToken,
                    task_name: t.text,
                  }),
                })
                  .then((r) => r.json())
                  .then((d) => {
                    if (d.success && d.description) {
                      allTasks[globalIdx].description = d.description;
                      descEl.style.color = "";
                      descEl.textContent = d.description;
                    } else {
                      descEl.remove();
                    }
                  })
                  .catch(() => {
                    descEl.remove();
                  });
              }
            }
          });
          updateFooter();
          updateProgress();
          scrollToBottom();
        }

        // Fetch batches until allTasks has at least `needUpTo` tasks (or truly done).
        async function fetchUntilFull(needUpTo) {
          while (allTasks.length < needUpTo) {
            if (!done) {
              let batch;
              if (prefetchedBatch) {
                batch = prefetchedBatch;
                prefetchedBatch = null;
                prefetchPromise = null;
              } else {
                try {
                  batch = await (prefetchPromise || fetchBatch(batchesLoaded));
                  prefetchPromise = null;
                } catch (_) {
                  done = true;
                }
              }
              if (batch) {
                receiveBatch(batch); // receiveBatch sets done if !hasMore
              }
              // If batch is undefined (catch above set done=true), loop will exit
            } else {
              break;
            }
          }
        }

        async function handleNext() {
          const nextStart = viewStart + _PAGE_SIZE;
          // If generation is done but the next page would be partial, try one more batch
          const remaining = allTasks.length - nextStart;
          if (done && remaining > 0 && remaining < _PAGE_SIZE) {
            done = false;
          }
          if (allTasks.length < nextStart + _PAGE_SIZE) {
            const btn = document.getElementById("tvw-continue");
            if (btn) {
              btn.disabled = true;
              btn.textContent = "Loading…";
            }
            await fetchUntilFull(nextStart + _PAGE_SIZE);
          }
          if (allTasks.length <= nextStart) {
            renderMissing();
            return;
          }
          showBatch(nextStart);
        }

        function prefetchAhead(idx) {
          if (done || prefetchPromise || prefetchedBatch) return;
          prefetchPromise = fetchBatch(idx)
            .then((batch) => {
              prefetchPromise = null;
              prefetchedBatch = batch;
            })
            .catch(() => {
              prefetchPromise = null;
            });
        }

        function setTaskStatus(idx, status) {
          allTasks[idx].status = status;
          const card = document.getElementById(`tvw-card-${idx}`);
          if (!card) return;
          card.className = `tvw-task-card tvw-card-${status}`;
          const num = card.querySelector(".tvw-card-num");
          if (num) num.className = `tvw-card-num ${numClass(status)}`;
          const titleRow = card.querySelector(".tvw-card-title-row");
          titleRow.querySelector(".tvw-badge")?.remove();
          if (status === "edited") {
            const badge = document.createElement("span");
            badge.className = `tvw-badge tvw-badge-edited`;
            badge.textContent = "edited";
            titleRow.appendChild(badge);
          }
          const title = card.querySelector(".tvw-card-title");
          if (title)
            title.style.textDecoration =
              status === "removed" ? "line-through" : "";
          // Highlight the active button (wish button is toggled separately)
          card
            .querySelectorAll(".tvw-action-btn:not(.tvw-wish-btn)")
            .forEach((b) => b.classList.remove("tvw-btn-active"));
          const activeBtn = card.querySelector(
            status === "confirmed"
              ? ".tvw-accurate-btn"
              : status === "edited"
                ? ".tvw-edit-btn"
                : status === "removed"
                  ? ".tvw-remove-btn"
                  : null,
          );
          if (activeBtn) activeBtn.classList.add("tvw-btn-active");
          updateProgress();
        }

        function startEdit(idx) {
          const card = document.getElementById(`tvw-card-${idx}`);
          if (!card || card.classList.contains("editing")) return;
          card.classList.add("editing");
          const titleEl = card.querySelector(".tvw-card-title");
          const currentText = allTasks[idx].text;
          const input = document.createElement("input");
          input.className = "tvw-card-input";
          input.value = currentText;
          titleEl.replaceWith(input);
          const actions = card.querySelector(".tvw-card-actions");
          if (actions) actions.style.display = "none";
          input.focus();
          input.select();
          function saveEdit() {
            const newText = input.value.trim() || currentText;
            allTasks[idx].text = newText;
            const span = document.createElement("span");
            span.className = "tvw-card-title";
            span.textContent = newText;
            input.replaceWith(span);
            card.classList.remove("editing");
            if (actions) actions.style.display = "";
            if (newText !== currentText) {
              setTaskStatus(idx, "edited");
              // Update description async for edited task name
              const descEl = card.querySelector(".tvw-card-desc");
              if (descEl) {
                descEl.textContent = "Updating…";
                fetch("/api/regenerate-task-description", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    session_token: sessionToken,
                    task_name: newText,
                  }),
                })
                  .then((r) => r.json())
                  .then((d) => {
                    if (d.success && d.description) {
                      allTasks[idx].description = d.description;
                      descEl.textContent = d.description;
                    } else {
                      descEl.textContent = allTasks[idx].description || "";
                    }
                  })
                  .catch(() => {
                    descEl.textContent = allTasks[idx].description || "";
                  });
              }
            } else {
              // Restore active highlight for current status
              const status = allTasks[idx].status;
              card
                .querySelectorAll(".tvw-action-btn")
                .forEach((b) => b.classList.remove("tvw-btn-active"));
              const activeBtn = card.querySelector(
                status === "confirmed"
                  ? ".tvw-accurate-btn"
                  : status === "edited"
                    ? ".tvw-edit-btn"
                    : status === "removed"
                      ? ".tvw-remove-btn"
                      : null,
              );
              if (activeBtn) activeBtn.classList.add("tvw-btn-active");
            }
          }
          input.addEventListener("blur", saveEdit);
          input.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter") {
              ev.preventDefault();
              saveEdit();
            }
            if (ev.key === "Escape") {
              input.value = currentText;
              saveEdit();

        function attachCardListeners(idx) {
          const card = document.getElementById(`tvw-card-${idx}`);
          if (!card) return;
          card
            .querySelector(".tvw-accurate-btn")
            ?.addEventListener("click", () => setTaskStatus(idx, "confirmed"));
          card
            .querySelector(".tvw-edit-btn")
            ?.addEventListener("click", () => startEdit(idx));
          card
            .querySelector(".tvw-remove-btn")
            ?.addEventListener("click", () => setTaskStatus(idx, "removed"));
          card.querySelector(".tvw-wish-btn")?.addEventListener("click", () => {
            const isWished = allTasks[idx].wishlisted;
            allTasks[idx].wishlisted = !isWished;
            const btn = card.querySelector(".tvw-wish-btn");
            if (allTasks[idx].wishlisted) {
              btn.classList.add("tvw-btn-active");
              btn.textContent = "♥ Wish list";
              card.classList.add("tvw-card-wishlisted");
            } else {
              btn.classList.remove("tvw-btn-active");
              btn.textContent = "♡ Wish list";
              card.classList.remove("tvw-card-wishlisted");

          });

        function receiveBatch(batch) {
          for (const task of batch.tasks) {
            const currentReal = allTasks.filter(
              (t) => !t.isAttentionCheck && !t.isAiTask,
            ).length;
            if (currentReal >= _TARGET_REAL_TASKS) {
              done = true;
              break;
            }
            allTasks.push(task);
            const realCount = allTasks.filter(
              (t) => !t.isAttentionCheck && !t.isAiTask,
            ).length;
            // Inject attention check every _ATTN_INTERVAL real tasks
            if (
              pendingAttentionChecks.length &&
              realCount > 0 &&
              realCount % _ATTN_INTERVAL === 0
            ) {
              allTasks.push(pendingAttentionChecks.shift());
            }
          }
          const realCount = allTasks.filter(
            (t) => !t.isAttentionCheck && !t.isAiTask,
          ).length;
          if (!batch.hasMore || realCount >= _TARGET_REAL_TASKS) done = true;
          batchesLoaded++;
          prefetchAhead(batchesLoaded);
        }

        function startProbingLoop(onDone) {
          // --- Probing loop: intercept chat form and route through task-followup ---
          const chatForm = document.getElementById("chat-form");
          const probingTasks = []; // raw user text (for context)
          const probingTaskNames = []; // formatted "Action + Object + Objective" names
          const probingDialogue = []; // rolling interviewer/participant turns
          const _origSubmit = chatForm.onsubmit;

          chatForm.onsubmit = async function (e) {
            e.preventDefault();
            if (isSessionCompleted) {
              chatForm.onsubmit = _origSubmit;
              return;
            }
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = "";
            chatInput.style.height = "auto";
            probingTasks.push(text);
            appendMessage("user", text, "probe-u-" + Date.now());
            showTyping();
            scrollToBottom();
            try {
              const dialogueForPrompt = probingDialogue.slice(-8);
              const r = await fetch("/api/task-followup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  session_token: sessionToken,
                  task_text: text,
                  prior_tasks: probingTaskNames.length
                    ? probingTaskNames
                    : probingTasks.slice(0, -1),
                  phase: "probing",
                  recent_dialogue: dialogueForPrompt,
                }),
              });
              const d = await r.json();
              removeTyping();
              probingDialogue.push({ role: "Participant", content: text });
              if (d.task_name) probingTaskNames.push(d.task_name);
              if (d.reply) {
                appendMessage("bot", d.reply, "probe-b-" + Date.now());
                probingDialogue.push({ role: "Interviewer", content: d.reply });
              }
              scrollToBottom();
              if (d.done) {
                chatForm.onsubmit = _origSubmit;
                if (onDone) onDone();
              }
            } catch (_) {
              removeTyping();
            }
          };
        }

        async function renderAiTaskWidget(currentTasks, onDone) {
