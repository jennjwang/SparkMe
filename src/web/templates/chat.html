      async function showAiUsageWidget() {
        if (document.getElementById("ai-usage-widget")) return;

        // Refresh portrait first so the default buckets reflect latest tasks.
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (res.ok) {
            const data = await res.json();
            if (data.success) {
              lastPortrait = data.user_portrait || lastPortrait;
              renderProfile(lastPortrait);
            }
          }
        } catch (_) {}

        const widget = document.createElement("div");
        widget.id = "ai-usage-widget";
        widget.className = "ai-usage-widget";
        document.getElementById("chat-box").appendChild(widget);
        scrollToBottom();

        function esc(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        const taskInventory = dedupTasks(
          (lastPortrait["Task Inventory"] || []).filter(Boolean),
        );
        let bucketNames = [];
        try {
          if (taskInventory.length >= 2) {
            const result = await getOrFetchTaskTree(
              taskInventory,
              portraitGroupingFeedback(lastPortrait),
            );
            const tree =
              result && Array.isArray(result.tree) ? result.tree : [];
            bucketNames = tree
              .map((n) => String((n && n.name) || "").trim())
              .filter(Boolean);
          }
        } catch (_) {}

        if (!bucketNames.length) bucketNames = taskInventory.slice();
        bucketNames = dedupTasks(
          bucketNames.map((n) => capitalizeFieldValue(n)),
        ).slice(0, 4);
        while (bucketNames.length < 4) {
          bucketNames.push(`Bucket ${bucketNames.length + 1}`);
        }

        let rowCounter = 1;
        let rows = bucketNames.map((name) => ({
          id: `aiw-${rowCounter++}`,
          name,
          mode: null, // 'ai' | 'manual'
        }));

        function canSubmit() {
          return (
            rows.length > 0 &&
            rows.every(
              (r) =>
                String(r.name || "").trim().length > 0 &&
                (r.mode === "ai" || r.mode === "manual"),
            )
          );
        }

        function autosizeAiwName(el) {
          if (!el) return;
          el.style.height = "auto";
          el.style.height = Math.min(el.scrollHeight, 140) + "px";
        }

        function render() {
          widget.innerHTML = `
            <div class="aiw-header">
              <div class="aiw-title">AI usage by task bucket</div>
              <div class="aiw-subtitle">For each bucket, mark whether you currently use AI tools or still do it manually.</div>
            </div>
            <div class="aiw-rows">
              ${rows
                .map(
                  (r) => `
                <div class="aiw-row" data-id="${esc(r.id)}">
                  <textarea class="aiw-name" data-id="${esc(r.id)}" rows="1">${esc(capitalizeFieldValue(r.name))}</textarea>
                  <div class="aiw-toggle">
                    <button type="button" class="aiw-opt ${r.mode === "ai" ? "selected" : ""}" data-id="${esc(r.id)}" data-mode="ai">Uses AI</button>
                    <button type="button" class="aiw-opt ${r.mode === "manual" ? "selected" : ""}" data-id="${esc(r.id)}" data-mode="manual">Manual</button>
                  </div>
                  <button type="button" class="aiw-remove" data-id="${esc(r.id)}" title="Remove bucket">×</button>
                </div>
              `,
                )
                .join("")}
            </div>
            <div class="aiw-actions">
              <button type="button" class="aiw-add" id="aiw-add">+ Add bucket</button>
              <button type="button" class="aiw-submit" id="aiw-submit" ${canSubmit() ? "" : "disabled"}>Submit</button>
            </div>
          `;
          widget
            .querySelectorAll(".aiw-name")
            .forEach((el) => autosizeAiwName(el));
        }

        function submitRows() {
          if (!canSubmit()) return;
          const parts = rows.map((r) => {
            const modeText =
              r.mode === "ai"
                ? "use AI tools right now"
                : "still mostly manual right now";
            return `${capitalizeFieldValue(r.name.trim())} — ${modeText}`;
          });
          const text = `AI tool usage by bucket: ${parts.join("; ")}.`;
          widget.remove();
          chatInput.value = text;
          document
            .getElementById("chat-form")
            .dispatchEvent(new Event("submit"));
        }

        widget.addEventListener("input", function (e) {
          if (!e.target.classList.contains("aiw-name")) return;
          const id = e.target.dataset.id;
          const row = rows.find((r) => r.id === id);
          if (!row) return;
          row.name = e.target.value;
          autosizeAiwName(e.target);
          const submitBtn = widget.querySelector("#aiw-submit");
          if (submitBtn) submitBtn.disabled = !canSubmit();
        });

        widget.addEventListener("click", function (e) {
          if (e.target.id === "aiw-add") {
            rows.push({ id: `aiw-${rowCounter++}`, name: "", mode: null });
            render();
            const inputs = widget.querySelectorAll(".aiw-name");
            if (inputs.length) inputs[inputs.length - 1].focus();
            return;
          }
          if (e.target.id === "aiw-submit") {
            submitRows();
            return;
          }
          if (e.target.classList.contains("aiw-remove")) {
            const id = e.target.dataset.id;
            rows = rows.filter((r) => r.id !== id);
            if (rows.length === 0)
              rows.push({ id: `aiw-${rowCounter++}`, name: "", mode: null });
            render();
            return;
          }
          if (e.target.classList.contains("aiw-opt")) {
            const id = e.target.dataset.id;
            const mode = e.target.dataset.mode;
            const row = rows.find((r) => r.id === id);
            if (!row) return;
            row.mode = mode === "ai" ? "ai" : "manual";
            render();
          }
        });

        widget.addEventListener("keydown", function (e) {
          if (e.key !== "Enter") return;
          if (e.target.classList.contains("aiw-name")) {
            e.preventDefault();
            const names = Array.from(widget.querySelectorAll(".aiw-name"));
            const idx = names.indexOf(e.target);
            if (idx >= 0 && idx < names.length - 1) names[idx + 1].focus();
            else if (canSubmit()) submitRows();
          }
        });

        render();
      }

      async function showFeedbackWidget() {
        if (document.getElementById("feedback-widget")) return;

        // Refresh portrait so the task list reflects the most recent state
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (res.ok) {
            const data = await res.json();
            if (data.success) {
              lastPortrait = data.user_portrait || lastPortrait;
              renderProfile(lastPortrait);
            }
          }
        } catch (e) {}

        const rawTasks = lastPortrait["Task Inventory"] || [];
        const tasks = dedupTasks(rawTasks);

        // Show the widget immediately; fetch the task tree in the background.
        let taskTree = tasks.map((name) => ({ name, children: [] }));

        const widget = document.createElement("div");
        widget.id = "feedback-widget";
        widget.className = "feedback-widget";
        document.getElementById("chat-box").appendChild(widget);

        let rating = null;

        function capitalizeTask(s) {
          const str = String(s || "").trim();
          if (!str) return str;
          return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function allTaskNames(nodes) {
          const names = [];
          for (const n of nodes || []) {
            if (n && n.name) names.push(String(n.name).trim());
            names.push(...allTaskNames(n && n.children));
          }
          return names;
        }

        // All tasks start checked (user unchecks tasks they don't perform)
        const checkedTasks = new Set();

        function renderTaskNodes(nodes, depth) {
          if (!Array.isArray(nodes) || nodes.length === 0) return "";
          const cls = depth === 0 ? "fb-task-list" : "fb-task-sublist";
          return `<ul class="${cls}">${nodes
            .map((n) => {
              const rawName = String((n && n.name) || "").trim();
              const name = capitalizeTask(rawName);
              const kids = n && Array.isArray(n.children) ? n.children : [];
              const checked = checkedTasks.has(rawName) ? "checked" : "";
              return `<li class="fb-task-item${depth > 0 ? " fb-task-sub" : ""}">
                        <label class="fb-task-label">
                            <input type="checkbox" class="fb-task-check" data-task="${escapeHtml(rawName)}" ${checked}>
                            <span class="fb-task-name">${escapeHtml(name)}</span>
                        </label>
                        ${renderTaskNodes(kids, depth + 1)}
                    </li>`;
            })
            .join("")}</ul>`;
        }

        function render() {
          const taskListHtml =
            tasks.length === 0
              ? `<div class="fb-task-empty">No tasks were extracted.</div>`
              : renderTaskNodes(taskTree, 0);
          const hasUnchecked =
            checkedTasks.size > 0 &&
            allTaskNames(taskTree).some((n) => !checkedTasks.has(n));
          const uncheckedReasonOk =
            !hasUnchecked ||
            (widget._uncheckedReasonValue || "").trim().length > 0;
          const canSubmit = rating !== null && uncheckedReasonOk;
          widget.innerHTML = `
                    <div class="fb-title">Before you go</div>
                    <div class="fb-intro">A couple of quick questions to help us improve.</div>

                    <div class="fb-section">
                        <div class="fb-section-label">How satisfied were you with this conversation?</div>
                        <div class="fb-rating">
                            ${[1, 2, 3, 4, 5]
                              .map(
                                (n) => `
                                <button type="button" class="fb-rating-btn ${rating === n ? "selected" : ""}" data-val="${n}">${n}</button>
                            `,
                              )
                              .join("")}
                        </div>
                        <div class="fb-rating-scale">
                            <span>Very unsatisfied</span>
                            <span>Very satisfied</span>
                        </div>
                    </div>


                    <div class="fb-section">
                        <div class="fb-section-label">Anything else you'd like to share? (optional)</div>
                        <textarea class="fb-comment" id="fb-comment" placeholder="Any comments or suggestions..." maxlength="1000"></textarea>
                    </div>

                    <button class="fb-submit" id="fb-submit" ${canSubmit ? "" : "disabled"}>Submit & End Session</button>
                `;

          // Preserve text inputs across re-renders
          const commentEl = widget.querySelector("#fb-comment");
          if (commentEl) commentEl.value = widget._commentValue || "";
          const uncheckedEl = widget.querySelector("#fb-unchecked-reason");
          if (uncheckedEl)
            uncheckedEl.value = widget._uncheckedReasonValue || "";
          const missingEl = widget.querySelector("#fb-missing-tasks");
          if (missingEl) missingEl.value = widget._missingTasksValue || "";

          widget.querySelectorAll(".fb-rating-btn").forEach((btn) => {
            btn.onclick = () => {
              rating = parseInt(btn.dataset.val);
              widget._commentValue = commentEl ? commentEl.value : "";
              render();
            };
          });
          widget.querySelectorAll(".fb-task-check").forEach((cb) => {
            cb.onchange = () => {
              if (cb.checked) checkedTasks.add(cb.dataset.task);
              else checkedTasks.delete(cb.dataset.task);
              widget._commentValue = commentEl ? commentEl.value : "";
              widget._uncheckedReasonValue = uncheckedEl
                ? uncheckedEl.value
                : "";
              render();
            };
          });
          function refreshSubmit() {
            const btn = widget.querySelector("#fb-submit");
            if (btn) btn.disabled = rating === null;
          }
          if (commentEl) {
            commentEl.addEventListener("input", () => {
              widget._commentValue = commentEl.value;
            });
          }
          if (uncheckedEl) {
            uncheckedEl.addEventListener("input", () => {
              widget._uncheckedReasonValue = uncheckedEl.value;
              refreshSubmit();
            });
          }
          if (missingEl) {
            missingEl.addEventListener("input", () => {
              widget._missingTasksValue = missingEl.value;
              refreshSubmit();
            });
          }

          const submitBtn = widget.querySelector("#fb-submit");
          if (submitBtn) {
            submitBtn.onclick = async () => {
              if (submitBtn.disabled) return;
              submitBtn.disabled = true;
              submitBtn.textContent = "Submitting...";
              const payload = {
                session_token: sessionToken,
                feedback: {
                  rating: rating,
                  tasks_shown: tasks,
                  task_tree: taskTree,
                  tasks_performed: Array.from(checkedTasks),
                  tasks_not_performed: allTaskNames(taskTree).filter(
                    (n) => !checkedTasks.has(n),
                  ),
                  tasks_not_performed_reason:
                    (widget._uncheckedReasonValue || "").trim() || null,
                  tasks_missing:
                    (widget._missingTasksValue || "").trim() || null,
                  comment: (commentEl ? commentEl.value : "").trim(),
                },
              };
              try {
                const r = await (
                  await fetch("/api/submit-feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                  })
                ).json();
                if (r.success) {
                  widget.remove();
                  isSessionCompleted = true;
                  stopTimer();
                  updateEndSessionButton();
                  disableChatInputs();
                  if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                  }
                  showEndBanner();
                } else {
                  submitBtn.disabled = false;
                  submitBtn.textContent = "Submit & End Session";
                  updateStatus("Failed to submit feedback");
                }
              } catch (e) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit & End Session";
                updateStatus("Error submitting feedback");
              }
            };
          }
        }

        render();
        scrollToBottom();

        // Fetch organized tree in background and re-render task list once ready.
        // Shared with the time-split widget and profile panel via getOrFetchTaskTree.
        if (tasks.length > 0) {
          (async () => {
            try {
              const result = await getOrFetchTaskTree(
                tasks,
                portraitGroupingFeedback(lastPortrait),
              );
              if (result && Array.isArray(result.tree) && result.tree.length) {
                taskTree = result.tree;
                render();
              }
            } catch (e) {}
          })();
        }
      }

      let currentAudioEl = null;

      function stopCurrentAudio() {
        if (currentAudioEl) {
          currentAudioEl.pause();
          currentAudioEl.src = "";
          currentAudioEl = null;
        }
        updateStatus("");
      }

      function playMessageAudio(messageId) {
        if (!messageId || !ttsEnabled) return;
        stopCurrentAudio();
        const audio = new Audio(
          `/api/stream-voice-response?session_token=${sessionToken}&message_id=${messageId}`,
        );
        currentAudioEl = audio;
        audio.onended = () => {
          if (currentAudioEl === audio) currentAudioEl = null;
          updateStatus("");
        };
        audio.onerror = (e) => {
          console.warn("TTS stream error:", e);
          if (currentAudioEl === audio) currentAudioEl = null;
        };
        audio.play().catch((e) => console.warn("Audio play failed:", e));
      }

      async function showMessageWithAudio(msg) {
        const audioEl = new Audio(
          `/api/stream-voice-response?session_token=${sessionToken}&message_id=${msg.id}`,
        );
        audioEl.preload = "auto";

        await new Promise((resolve) => {
          const timer = setTimeout(resolve, 4000);
          audioEl.addEventListener(
            "canplay",
            () => {
              clearTimeout(timer);
              resolve();
            },
            { once: true },
          );
          audioEl.addEventListener(
            "error",
            () => {
              clearTimeout(timer);
              resolve();
            },
            { once: true },
          );
        });

        appendMessage("bot", msg.content, msg.id);
        removeTyping();
        pendingAudioMessages.delete(msg.id);

        if (ttsEnabled) {
          stopCurrentAudio();
          currentAudioEl = audioEl;
          audioEl.onended = () => {
            if (currentAudioEl === audioEl) currentAudioEl = null;
            updateStatus("");
          };
          audioEl.onerror = (e) => {
            console.warn("TTS stream error:", e);
            if (currentAudioEl === audioEl) currentAudioEl = null;
          };
          audioEl.play().catch((e) => console.warn("Audio play failed:", e));
        }
      }

      async function initializeSession() {
        if (isInitializing || sessionToken) return;
        isInitializing = true;
        try {
          updateStatus("Starting session...");
          const urlParams = new URLSearchParams(window.location.search);
          const availableTime = urlParams.get("available_time");
          const body = availableTime
            ? JSON.stringify({ available_time: parseInt(availableTime) })
            : "{}";
          const res = await fetch("/api/start-session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body,
          });
          const data = await res.json();
          if (data.success) {
            sessionToken = data.session_token;
            pendingSessionRecovery = false;
            sessionRecoverAttempts = 0;
            const targetMinutes = Number.parseInt(
              data.available_time ?? availableTime ?? "",
              10,
            );
            if (Number.isFinite(targetMinutes) && targetMinutes > 0) {
              sessionTargetMs = targetMinutes * 60 * 1000;
            } else {
              sessionTargetMs = null;
            }
            let startedAt = parseSessionStartTimeMs(data);
            if (startedAt && startedAt > Date.now()) {
              startedAt = Date.now();
            }
            sessionStartTime =
              startedAt && !isNaN(startedAt) ? startedAt : Date.now();
            startTimer();
            updateStatus("");
            // Poll aggressively for the first 8 s so the opening question
            // appears as soon as the LLM responds, then settle to normal cadence.
            if (!pollingInterval) {
              pollingInterval = setInterval(pollForMessages, 100);
              setTimeout(() => {
                clearInterval(pollingInterval);
                pollingInterval = setInterval(pollForMessages, 400);
              }, 8000);
            }
            if (!endSessionButtonTimer) {
              endSessionButtonTimer = setInterval(updateEndSessionButton, 1000);
            }
            if (!profilePollInterval)
              profilePollInterval = setInterval(fetchAndRenderProfile, 5000);
            fetchAndRenderProfile();
            if (data.was_existing) {
              await silentProfileLoad();
              await pollForMessages(true);
            } else {
              // showTyping('Setting things up — this may take a minute...');
              pollForMessages();
            }
          } else updateStatus("Failed to start session");
        } catch (e) {
          updateStatus("Error starting session");
        } finally {
          isInitializing = false;
          if (pendingSessionRecovery && !isSessionCompleted) {
            pendingSessionRecovery = false;
            recoverFromInvalidSession();
          }
        }
      }

      async function recoverFromInvalidSession() {
        if (sessionRecovering || isSessionCompleted) return;
        if (isInitializing) {
          pendingSessionRecovery = true;
          return;
        }
        if (sessionRecoverAttempts >= MAX_SESSION_RECOVER_ATTEMPTS) {
          updateStatus("Session expired. Please refresh to continue.");
          return;
        }
        sessionRecovering = true;
        sessionRecoverAttempts += 1;
        removeTyping();
        if (pollingInterval) {
          clearInterval(pollingInterval);
          pollingInterval = null;
        }
        sessionToken = null;
        updateStatus("Reconnecting session...");
        try {
          await initializeSession();
        } finally {
          sessionRecovering = false;
        }
      }

      async function pollForMessages(fullHistory = false) {
        if (!sessionToken) return;
        try {
          const url = fullHistory
            ? `/api/get-messages?session_token=${sessionToken}&full=true`
            : `/api/get-messages?session_token=${sessionToken}`;
          const res = await fetch(url);
          if (res.status === 400) {
            let errText = "";
            try {
              const payload = await res.json();
              errText = String(payload.error || "");
            } catch (_) {}
            if (!errText || /invalid|expired/i.test(errText)) {
              await recoverFromInvalidSession();
            } else {
              updateStatus(errText);
            }
            return;
          }
          const data = await res.json();
          if (!data.success) {
            if (/invalid|expired/i.test(String(data.error || ""))) {
              await recoverFromInvalidSession();
            }
            return;
          }
          if (data.success && data.messages) {
            const messages = data.messages;
            // On reconnect/full-history replay, only re-open profile confirmation
            // if it was never resolved (i.e., no later user reply in history).
            const unresolvedProfileWidgetIds = new Set();
            if (fullHistory) {
              for (let i = 0; i < messages.length; i++) {
                const m = messages[i];
                if (m.type === "profile_confirm_widget") {
                  const hasLaterUserReply = messages
                    .slice(i + 1)
                    .some((x) => x.role === "User" || x.role === "user");
                  if (!hasLaterUserReply && m.id) {
                    unresolvedProfileWidgetIds.add(m.id);
                  }
                }
              }
            }

            messages.forEach((msg) => {
              if (msg.type === "time_split_widget") {
                if (!seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  // Flush any buffered Interviewer messages so the question
                  // appears above the widget (profile review may have buffered it)
                  if (profileConfirmPending) {
                    resolveProfileConfirmGate();
                  }
                  setTimeout(() => showTimeSplitWidget(), 50);
                }
                return;
              }
              if (msg.type === "task_validation_widget") {
                if (!seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  removeTyping();
                  setTimeout(() => showTaskValidationWidget(), 50);
                }
                return;
              }
              if (msg.type === "feedback_widget") {
                if (!seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  setTimeout(() => showFeedbackWidget(), 50);
                }
                return;
              }
              if (msg.type === "ai_usage_widget") {
                if (!seenMessageIds.has(msg.id) && msg.id) {
                  seenMessageIds.add(msg.id);
                }
                return;
              }
              if (msg.type === "profile_confirm_widget") {
                profileConfirmWidgetSeen = true;
                const shouldShow =
                  !fullHistory || unresolvedProfileWidgetIds.has(msg.id);
                if (!seenMessageIds.has(msg.id) && shouldShow) {
                  seenMessageIds.add(msg.id);
                  // Set the gate synchronously so subsequent Interviewer messages
                  // in this same poll batch are buffered.
                  profileConfirmPending = true;
                  removeTyping();
                  showProfileBuildingIndicator();
                  showProfilePanelWhenRoleReady();
                } else if (!seenMessageIds.has(msg.id) && msg.id) {
                  seenMessageIds.add(msg.id);
                }
                return;
              }
              if (msg.role === "Interviewer" || msg.role === "assistant") {
                if (
                  seenMessageIds.has(msg.id) ||
                  pendingAudioMessages.has(msg.id)
                )
                  return;
                if (botMessageBuffer.some((m) => m.id === msg.id)) return;
                if (profileConfirmPending) {
                  botMessageBuffer.push(msg);
                  return;
                }
                if (ttsEnabled && msg.id && !fullHistory) {
                  if (!profileConfirmPending) removeProfileBuildingIndicator();
                  pendingAudioMessages.add(msg.id);
                  showMessageWithAudio(msg);
                } else {
                  if (appendMessage("bot", msg.content, msg.id)) {
                    if (!profileConfirmPending)
                      removeProfileBuildingIndicator();
                    removeTyping();
                  }
                }
              } else if (msg.role === "User" || msg.role === "user") {
                appendMessage("user", msg.content, msg.id);
              } else if (msg.role === "system") {
                if (msg.id && !seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  const div = document.createElement("div");
                  div.className = "system-message";
                  div.textContent = msg.content;
                  document.querySelector(".chat-inner").appendChild(div);
                  scrollToBottom();
                }
              }
            });
          }
          if (!fullHistory) {
            maybeShowProfileBuildingIndicatorBeforeConfirm();
          }
          if (data.session_completed && !isSessionCompleted) {
            // If feedback widget or AI task widget is currently shown, don't end yet —
            // wait for the user to finish before finalizing.
            if (document.getElementById("feedback-widget")) return;
            if (document.querySelector(".aitw-widget")) return;
            updateStatus("");
            isSessionCompleted = true;
            stopTimer();
            updateEndSessionButton();
            disableChatInputs();
            // Keep polling for 1.5s to catch any goodbye message that is
            // buffered just before the session_in_progress flag flips.
            setTimeout(() => {
              if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
              }
              showEndBanner();
            }, 1500);
          }
        } catch (e) {}
      }

      function updateEndSessionButton() {
        const btn = document.getElementById("end-session-btn");
        if (isSessionCompleted) {
          btn.disabled = true;
          return;
        }
        if (sessionStartTime) {
          const left =
            MIN_SESSION_DURATION_MS - (Date.now() - sessionStartTime);
          if (left > 0) {
            btn.disabled = true;
            btn.title = `Available in ${Math.ceil(left / 60000)}m`;
          } else {
            btn.disabled = false;
            btn.title = "End Session";
          }
        }
      }

      let recordingStartTime = null;
      let recActualMimeType = "";
      const MIN_RECORDING_MS = 500;

      let currentStream = null;

      function startRecording(stream) {
        currentStream = stream;
        const track = stream.getAudioTracks()[0];
        console.log(
          "[Mic] Track:",
          track.label,
          "enabled:",
          track.enabled,
          "muted:",
          track.muted,
          "readyState:",
          track.readyState,
        );
        mediaRecorder = new MediaRecorder(stream);
        recActualMimeType = mediaRecorder.mimeType;
        console.log("[Mic] MediaRecorder mimeType:", recActualMimeType);
        audioChunks = [];
        recordingStartTime = Date.now();
        mediaRecorder.ondataavailable = (e) => {
          console.log("[Mic] chunk:", e.data.size, "bytes");
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
          console.log(
            "[Mic] Total chunks:",
            audioChunks.length,
            "total bytes:",
            audioChunks.reduce((s, c) => s + c.size, 0),
          );
          if (currentStream) {
            currentStream.getTracks().forEach((t) => t.stop());
            currentStream = null;
          }
          sendAudioToServer();
        };
        mediaRecorder.start(250);
        updateStatus("Recording...");
      }

      async function sendAudioToServer() {
        if (!sessionToken) return;
        const elapsed = Date.now() - (recordingStartTime || 0);
        if (elapsed < MIN_RECORDING_MS || audioChunks.length === 0) {
          updateStatus("Recording too short — please hold the button longer.");
          setTimeout(() => updateStatus(""), 3000);
          return;
        }
        updateStatus("Transcribing...");
        const ext = recActualMimeType.includes("mp4") ? "mp4" : "webm";
        const fd = new FormData();
        fd.append(
          "audio",
          new Blob(audioChunks, { type: recActualMimeType }),
          `recording.${ext}`,
        );
        fd.append("session_token", sessionToken);
        fd.append("transcribe_only", "true");
        try {
          const res = await fetch("/api/send-voice", {
            method: "POST",
            body: fd,
          });
          const data = await res.json();
          console.log("[send-voice] response:", res.status, data);
          if (data.success) {
            chatInput.value = data.transcribed_text;
            chatInput.style.height = "auto";
            chatInput.style.height =
              Math.min(chatInput.scrollHeight, 160) + "px";
            chatInput.focus();
            updateStatus("Review your message, then press Enter to send.");
            setTimeout(() => updateStatus(""), 5000);
          } else updateStatus("Voice error: " + (data.error || "unknown"));
        } catch (e) {
          console.error("[send-voice] fetch error:", e);
          updateStatus("Error sending voice");
        }
      }

      const micSVG =
        '<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
      const stopSVG =
        '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';

      function toggleRecording() {
        if (isSessionCompleted) return;
        const btn = document.getElementById("record-toggle");
        if (isRecording) {
          if (mediaRecorder && mediaRecorder.state !== "inactive")
            mediaRecorder.stop();
          btn.classList.remove("recording");
          btn.innerHTML = micSVG;
        } else {
          stopCurrentAudio();
          navigator.mediaDevices
            .getUserMedia({ audio: true })
            .then((s) => {
              startRecording(s);
              btn.classList.add("recording");
              btn.innerHTML = stopSVG;
            })
            .catch(() => updateStatus("Could not access microphone"));
        }
        isRecording = !isRecording;
      }

      // Typing indicator
      function showTyping(loadingNote) {
        if (!profileConfirmPending) removeProfileBuildingIndicator();
        removeTyping();
        const box = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "typing-indicator";
        div.id = "typing-indicator";
        const note = loadingNote
          ? `<div style="font-size:13px;color:#9ca3af;margin-top:8px;">${loadingNote}</div>`
          : "";
        div.innerHTML = `<div style="display:flex;flex-direction:column;align-items:flex-start;gap:0"><div class="typing-bubble"><span></span><span></span><span></span></div>${note}</div>`;
        box.appendChild(div);
        scrollToBottom();
      }
      function removeTyping() {
        const el = document.getElementById("typing-indicator");
        if (el) el.remove();
      }

      function showProfileBuildingIndicator() {
        if (!profileBuildingIndicatorShownAt) {
          profileBuildingIndicatorShownAt = Date.now();
        }
      }
      function removeProfileBuildingIndicator() {
        const el = document.getElementById("profile-building-indicator");
        if (el) el.remove();
        profileBuildingIndicatorShownAt = 0;
      }

      async function ensureProfileBuildingIndicatorLeadIn() {
        const panel = document.getElementById("profile-panel");
        if (panel && panel.classList.contains("visible")) return;
        showProfileBuildingIndicator();
        if (!profileBuildingIndicatorShownAt) return;
        const elapsed = Date.now() - profileBuildingIndicatorShownAt;
        const remaining = PROFILE_BUILDING_INDICATOR_MIN_VISIBLE_MS - elapsed;
        if (remaining > 0) {
          await new Promise((r) => setTimeout(r, remaining));
        }
      }

      let preConfirmIndicatorProbeInFlight = false;
      let preConfirmIndicatorLastProbeAt = 0;
      const PRE_CONFIRM_INDICATOR_PROBE_INTERVAL_MS = 350;

      function isFirstTopicCoveredForProfileConfirm(topics) {
        if (!Array.isArray(topics) || topics.length === 0) return false;
        const firstTopic = topics[0] || {};
        const subtopics = Array.isArray(firstTopic.subtopics)
          ? firstTopic.subtopics
          : [];
        const required = subtopics.filter((s) => !s || !s.is_emergent);
        if (required.length === 0) return false;
        return required.every((s) => !!(s && s.is_covered));
      }

      function isFirstTopicNearlyCoveredForProfileConfirm(topics) {
        if (!Array.isArray(topics) || topics.length === 0) return false;
        const firstTopic = topics[0] || {};
        const subtopics = Array.isArray(firstTopic.subtopics)
          ? firstTopic.subtopics
          : [];
        const required = subtopics.filter((s) => !s || !s.is_emergent);
        if (required.length <= 1) return false;
        const covered = required.filter((s) => !!(s && s.is_covered)).length;
        return covered >= required.length - 1;
      }

      async function maybeShowProfileBuildingIndicatorBeforeConfirm() {
        return; // indicator hidden
        const now = Date.now();
        if (
          preConfirmIndicatorProbeInFlight ||
          now - preConfirmIndicatorLastProbeAt <
            PRE_CONFIRM_INDICATOR_PROBE_INTERVAL_MS
        ) {
          return;
        }
        preConfirmIndicatorProbeInFlight = true;
        preConfirmIndicatorLastProbeAt = now;
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          if (!data || !data.success) return;
          if (String(data.session_type || "intake") !== "intake") return;
          const portrait = data.user_portrait || {};
          if (!profileHasRoleAndTenure(portrait)) return;
          const topics = data.topics || [];
          if (
            !isFirstTopicCoveredForProfileConfirm(topics) &&
            !isFirstTopicNearlyCoveredForProfileConfirm(topics)
          ) {
            return;
          }
          if (profileConfirmPending || profileConfirmWidgetSeen) return;
          if (!document.getElementById("typing-indicator")) return;
          removeTyping();
          showProfileBuildingIndicator();
        } catch (_) {
        } finally {
          preConfirmIndicatorProbeInFlight = false;
        }
      }

      function showEndBanner() {
        if (document.querySelector(".session-end-banner")) return;
        removeTyping();
        const banner = document.createElement("div");
        banner.className = "session-end-banner";

        const passed = attnFailed <= ATTN_CHECK_MAX_FAILS;
        if (PROLIFIC_COMPLETION_CODE && passed) {
          banner.innerHTML =
            '<div class="end-text">Session ended</div>' +
            '<div class="end-subtext">Thank you! Redirecting you back to Prolific…</div>';

      // ---- Profile Panel ----
      let profilePollInterval = null;
      let lastPortrait = {};
      let lastSessionTopics = [];
      let profileShown = false;
      const TASK_GROUPING_FEEDBACK_KEY = "Task Grouping Feedback";
      let taskTreeCache = { signature: null, tree: null };
      let profileLoadSignalDepth = 0;
      let profileLoadBadgeSnapshot = null;
      let profileLoadSignalStartedAt = 0;
      let profileLoadSignalClearTimer = null;
      let profilePanelLoadingHold = false;
      const PROFILE_LOADING_MIN_VISIBLE_MS = 300;
      let profileAutosizeRefreshTimer = null;
      let profileBuildingIndicatorShownAt = 0;
      const PROFILE_BUILDING_INDICATOR_MIN_VISIBLE_MS = 320;
      // When a time-split widget is open, this holds the tree it resolved so the

      function renderProfileLoadingState() {
        const panel = document.getElementById("profile-panel");
        const body = document.getElementById("profile-body");
        if (!panel || !body || !panel.classList.contains("visible")) return;
        body.innerHTML = `<div class="profile-loading-state">

      function beginProfileLoadingSignal() {
        profileLoadSignalDepth += 1;
        if (profileLoadSignalDepth === 1) {
          profileLoadSignalStartedAt = Date.now();
          if (profileLoadSignalClearTimer) {
            clearTimeout(profileLoadSignalClearTimer);
            profileLoadSignalClearTimer = null;
          }
          const panel = document.getElementById("profile-panel");
          profilePanelLoadingHold = !!(
            panel && panel.classList.contains("visible")
          );
          if (profilePanelLoadingHold) {
            renderProfileLoadingState();
          }
        }
        const profileBtn = document.getElementById("profile-btn");
        if (profileBtn) profileBtn.classList.add("loading");
        const badge = document.getElementById("profile-badge");
        if (badge && profileLoadSignalDepth === 1) {
          profileLoadBadgeSnapshot = {
            textContent: badge.textContent,
            className: badge.className,
          };
        }
        if (badge && !badge.classList.contains("loading")) {
          badge.textContent = "Loading...";
          badge.className = "profile-header-badge loading";
        }

        const finalize = () => {
          if (profileLoadSignalDepth > 0) return;
          if (profileBtn) profileBtn.classList.remove("loading");
          if (badge && badge.classList.contains("loading")) {
            const portraitForRender =
              profileConfirmPending && profileConfirmSnapshot
                ? profileConfirmSnapshot
                : lastPortrait;
            renderProfile(portraitForRender);
          } else if (badge && profileLoadBadgeSnapshot) {
            badge.textContent = profileLoadBadgeSnapshot.textContent;
            badge.className = profileLoadBadgeSnapshot.className;
          }
          profilePanelLoadingHold = false;
          profileLoadBadgeSnapshot = null;
          profileLoadSignalStartedAt = 0;
        };

        return () => {
          profileLoadSignalDepth = Math.max(0, profileLoadSignalDepth - 1);
          if (profileLoadSignalDepth > 0) return;
          const elapsed = Date.now() - profileLoadSignalStartedAt;
          const remaining = PROFILE_LOADING_MIN_VISIBLE_MS - elapsed;
          if (remaining > 0) {
            if (profileLoadSignalClearTimer) {
              clearTimeout(profileLoadSignalClearTimer);
            }
            profileLoadSignalClearTimer = setTimeout(() => {
              profileLoadSignalClearTimer = null;
              finalize();
            }, remaining);
            return;
          }
          finalize();
        };
      }

      function normalizeGroupingFeedback(text) {
        return String(text || "")
          .trim()
          .replace(/\s+/g, " ")
          .slice(0, 400);
      }

      function portraitGroupingFeedback(portrait) {
        return normalizeGroupingFeedback(
          portrait && portrait[TASK_GROUPING_FEEDBACK_KEY],
        );
      }

      // Canonical key for the task set used by the organize-tasks cache.
      // Runs the same dedup / normalization the widgets use so that any
      // caller (profile panel, time-split widget, feedback widget) hashing
      // the same underlying inventory gets the same key.
      function taskInventorySignature(items, groupingFeedback = "") {
        const deduped = dedupTasks(items || []);
        const taskSig = deduped
          .map((s) => normalizeTaskName(s))
          .filter(Boolean)
          .sort()
          .join("||");
        const feedbackSig = normalizeGroupingFeedback(groupingFeedback)
          .toLowerCase()
          .trim();
        return `${feedbackSig}##${taskSig}`;
      }

      // Single source of truth for the organized task tree.
      // All callers (profile panel, time-split widget, feedback widget) go
      // through this so they always render the same hierarchy for the same
      // task set. The backend additionally caches results per-signature.
      function getOrFetchTaskTree(items, groupingFeedback = "") {
        // Always send the deduped list so the backend cache key matches
        // regardless of which caller (profile / widget) initiated the fetch.
        const payload = dedupTasks(items || []);
        const feedback = normalizeGroupingFeedback(groupingFeedback);
        const sig = taskInventorySignature(payload, feedback);
        if (!sig || payload.length < 2) {
          return Promise.resolve({ sig, tree: [] });
        }
        if (
          taskTreeCache.signature === sig &&
          Array.isArray(taskTreeCache.tree)
        ) {
          return Promise.resolve({ sig, tree: taskTreeCache.tree });
        }
        // If the portrait already carries a user-authored grouping whose leaves
        // match the current task set, honor it verbatim — don't re-shuffle via LLM.
        const savedTree =
          lastPortrait && Array.isArray(lastPortrait["Task Grouping Tree"])
            ? lastPortrait["Task Grouping Tree"]
            : null;
        if (savedTree && savedTree.length > 0) {
          const leafNames = flattenTreeNodes(savedTree)
            .map((n) => normalizeTaskName(n.name || ""))
            .filter(Boolean)
            .sort();
          const wantNames = payload
            .map((t) => normalizeTaskName(t))
            .filter(Boolean)
            .sort();
          if (
            leafNames.length === wantNames.length &&
            leafNames.every((v, i) => v === wantNames[i])
          ) {
            taskTreeCache = { signature: sig, tree: savedTree };
            return Promise.resolve({ sig, tree: savedTree });
          }
        }
        if (taskTreeInflight.has(sig)) {
          return taskTreeInflight.get(sig);
        }
        const p = (async () => {
          try {
            const res = await fetch("/api/organize-tasks", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                session_token: sessionToken,
                tasks: payload,
                grouping_feedback: feedback,
              }),
            });
            if (!res.ok) return { sig, tree: [] };
            const data = await res.json();
            if (!data || !data.success || !Array.isArray(data.tree))
              return { sig, tree: [] };
            taskTreeCache = { signature: sig, tree: data.tree };
            return { sig, tree: data.tree };
          } catch (_) {
            return { sig, tree: [] };
          } finally {
            taskTreeInflight.delete(sig);
          }
        })();
        taskTreeInflight.set(sig, p);
        return p;
      }

      async function fetchTaskTree(items) {
        const portraitForRender =
          profileConfirmPending && profileConfirmSnapshot
            ? profileConfirmSnapshot
            : lastPortrait;
        const feedback = portraitGroupingFeedback(portraitForRender);
        const result = await getOrFetchTaskTree(items, feedback);
        if (!result || !Array.isArray(result.tree) || result.tree.length === 0)
          return;
        const currentFeedback = portraitGroupingFeedback(portraitForRender);
        const currentSig = taskInventorySignature(
          portraitForRender["Task Inventory"] || [],
          currentFeedback,
        );
        if (currentSig !== result.sig) {
          // Portrait changed while we were fetching — re-run with current tasks.
          const currentItems = portraitForRender["Task Inventory"] || [];
          if (currentItems.length >= 2) fetchTaskTree(currentItems);
          return;
        }
        renderProfile(portraitForRender);
      }

      function annotateTree(nodes, prioritySet) {
        for (const n of nodes || []) {
          const childHasPriority = annotateTree(n.children || [], prioritySet);
          const selfPriority =
            !n.is_group &&
            prioritySet.has(
              String(n.name || "")
                .trim()
                .toLowerCase(),
            );
          n._isPriority = selfPriority;
          n._hasPriority = selfPriority || childHasPriority;
        }
        (nodes || []).sort((a, b) => {
          if ((b._hasPriority ? 1 : 0) !== (a._hasPriority ? 1 : 0)) {
            return (b._hasPriority ? 1 : 0) - (a._hasPriority ? 1 : 0);
          }
          if ((a.is_group ? 1 : 0) !== (b.is_group ? 1 : 0)) {
            return (a.is_group ? 1 : 0) - (b.is_group ? 1 : 0);
          }
          return 0;
        });
        return (nodes || []).some((n) => n._hasPriority);
      }

      function flattenTreeNodes(nodes) {
        const leaves = [];
        for (const n of nodes || []) {
          if (n.is_group) {
            leaves.push(...flattenTreeNodes(n.children || []));
          } else {
            leaves.push(n);
          }
        }
        return leaves;
      }

      function renderTaskTreeNodes(nodes, depth, key, prioritySet) {
        if (!Array.isArray(nodes) || nodes.length === 0) return "";
        const leaves =
          depth === 0
            ? flattenTreeNodes(nodes)
            : nodes.filter((n) => !n.is_group);
        const html = leaves
          .map((n) => {
            const name = String(n.name || "").trim();
            if (!name) return "";
            const isPriority = prioritySet.has(name.toLowerCase());
            const liClass = ["profile-task-item", isPriority ? "priority" : ""]
              .filter(Boolean)
              .join(" ");
            const removeBtn = `<button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(name)}" title="Remove">×</button>`;
            return `<li class="${liClass}">
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                        <span class="profile-task-text"><span>${escapeHtml(capitalizeFirst(name))}</span></span>
                        ${removeBtn}
                    </div>
                </li>`;
          })
          .join("");
        return `<ul class="profile-task-list">${html}</ul>`;
      }

      function showProfilePanel() {
        removeProfileBuildingIndicator();
        document.getElementById("profile-panel").classList.add("visible");
        document.getElementById("profile-btn").classList.add("active");

      function profileHasRole(portrait) {
        const role = portrait && portrait["Role"];
        return typeof role === "string" && role.trim().length > 0;
      }

      function profileHasTenure(portrait) {
        const tenure = portrait && portrait["Tenure"];
        return typeof tenure === "string" && tenure.trim().length > 0;
      }

      function profileHasRoleAndTenure(portrait) {

      }

      async function showProfilePanelWhenRoleReady() {
        if (profilePanelRevealInFlight) return;
        profilePanelRevealInFlight = true;
        const stopLoadingSignal = beginProfileLoadingSignal();
        try {
          if (!profileConfirmPending) return;
          // Keep the panel hidden until required confirm fields are populated.
          for (let i = 0; i < 60; i++) {
            if (!profileConfirmPending) return;
            try {
              const res = await fetch(
                `/api/session-state?session_token=${sessionToken}`,
              );
              if (res.ok) {
                const data = await res.json();
                if (data.success) {
                  lastPortrait = data.user_portrait || lastPortrait;
                  if (profileConfirmSnapshot) {
                    renderProfile(profileConfirmSnapshot);
                  } else {
                    renderProfile(lastPortrait);
                  }
                  if (
                    !profileConfirmSnapshot &&
                    profileHasRoleAndTenure(lastPortrait)
                  ) {
                    profileConfirmSnapshot = JSON.parse(
                      JSON.stringify(lastPortrait || {}),
                    );
                    renderProfile(profileConfirmSnapshot);
                    await ensureProfileBuildingIndicatorLeadIn();
                    if (!profileConfirmPending) return;
                    showProfilePanel();
                    break;
                  }
                }
              }
            } catch (_) {}
            await new Promise((r) => setTimeout(r, 250));
          }
          // If still not ready, keep trying in the background while the gate is pending.
          if (profileConfirmPending && !profileConfirmSnapshot) {
            setTimeout(() => {
              if (profileConfirmPending && !profileConfirmSnapshot) {
                showProfilePanelWhenRoleReady();
              }
            }, 500);
          }
        } finally {
          profilePanelRevealInFlight = false;
          stopLoadingSignal();
        }
      }

      function resolveProfileConfirmGate() {

      async function silentProfileLoad() {
        if (!sessionToken) return;
        const stopLoadingSignal = beginProfileLoadingSignal();
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,

          lastPortrait = data.user_portrait || {};
