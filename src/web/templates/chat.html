      document.addEventListener("DOMContentLoaded", initializeSession);

      // ---- Profile Panel ----
      let profilePollInterval = null;
      let lastPortrait = {};
      let profileShown = false;
      let taskTreeCache = { signature: null, tree: null };
      // Track in-flight requests by signature so concurrent callers share one fetch.
      const taskTreeInflight = new Map();

      // Canonical key for the task set used by the organize-tasks cache.
      // Runs the same dedup / normalization the widgets use so that any
      // caller (profile panel, time-split widget, feedback widget) hashing
      // the same underlying inventory gets the same key.
      function taskInventorySignature(items) {
        const deduped = dedupTasks(items || []);
        return deduped
          .map((s) => normalizeTaskName(s))
          .filter(Boolean)
          .sort()
          .join("||");
      }

      // Single source of truth for the organized task tree.
      // All callers (profile panel, time-split widget, feedback widget) go
      // through this so they always render the same hierarchy for the same
      // task set. The backend additionally caches results per-signature.
      function getOrFetchTaskTree(items) {
        // Always send the deduped list so the backend cache key matches
        // regardless of which caller (profile / widget) initiated the fetch.
        const payload = dedupTasks(items || []);
        const sig = taskInventorySignature(payload);
        if (!sig || payload.length < 2) {
          return Promise.resolve({ sig, tree: [] });
        }
        if (
          taskTreeCache.signature === sig &&
          Array.isArray(taskTreeCache.tree)
        ) {
          return Promise.resolve({ sig, tree: taskTreeCache.tree });
        }
        if (taskTreeInflight.has(sig)) {
          return taskTreeInflight.get(sig);
        }
        const p = (async () => {
          try {
            const res = await fetch("/api/organize-tasks", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                session_token: sessionToken,
                tasks: payload,
              }),
            });
            if (!res.ok) return { sig, tree: [] };
            const data = await res.json();
            if (!data || !data.success || !Array.isArray(data.tree))
              return { sig, tree: [] };
            taskTreeCache = { signature: sig, tree: data.tree };
            return { sig, tree: data.tree };
          } catch (_) {
            return { sig, tree: [] };
          } finally {
            taskTreeInflight.delete(sig);
          }
        })();
        taskTreeInflight.set(sig, p);
        return p;
      }

      async function fetchTaskTree(items) {
        const result = await getOrFetchTaskTree(items);
        if (!result || !Array.isArray(result.tree) || result.tree.length === 0)
          return;
        const currentSig = taskInventorySignature(
          lastPortrait["Task Inventory"] || [],
        );
        if (currentSig !== result.sig) {
          // Portrait changed while we were fetching — re-run with current tasks.
          const currentItems = lastPortrait["Task Inventory"] || [];
          if (currentItems.length >= 2) fetchTaskTree(currentItems);
          return;
        }
        renderProfile(lastPortrait);
      }

      function annotateTree(nodes, prioritySet) {
        for (const n of nodes || []) {
          const childHasPriority = annotateTree(n.children || [], prioritySet);
          const selfPriority =
            !n.is_group &&
            prioritySet.has(
              String(n.name || "")
                .trim()
                .toLowerCase(),
            );
          n._isPriority = selfPriority;
          n._hasPriority = selfPriority || childHasPriority;
        }
        (nodes || []).sort((a, b) => {
          if ((b._hasPriority ? 1 : 0) !== (a._hasPriority ? 1 : 0)) {
            return (b._hasPriority ? 1 : 0) - (a._hasPriority ? 1 : 0);
          }
          if ((a.is_group ? 1 : 0) !== (b.is_group ? 1 : 0)) {
            return (a.is_group ? 1 : 0) - (b.is_group ? 1 : 0);
          }
          return 0;
        });
        return (nodes || []).some((n) => n._hasPriority);
      }

      function renderTaskTreeNodes(
        nodes,
        depth,
        key,
        prioritySet,
        timeAllocMap,
      ) {
        if (!Array.isArray(nodes) || nodes.length === 0) return "";
        const cls = depth === 0 ? "profile-task-list" : "profile-task-sublist";
        const html = nodes
          .map((n) => {
            const name = String(n.name || "").trim();
            if (!name) return "";
            const isGroup = !!n.is_group;
            const isPriority = !isGroup && prioritySet.has(name.toLowerCase());
            const pct = !isGroup ? timeAllocMap[name.toLowerCase()] : undefined;
            const pctStr =
              pct === undefined || pct === null || pct === ""
                ? ""
                : typeof pct === "number"
                  ? `${pct}%`
                  : String(pct);
            const merged = Array.isArray(n.merged_from)
              ? n.merged_from.filter(Boolean)
              : [];
            const mergedHint =
              merged.length > 0
                ? `<span class="profile-task-merged-hint" title="Merged from: ${escapeAttr(merged.join(" • "))}">+${merged.length}</span>`
                : "";
            const liClass = [
              "profile-task-item",
              isGroup ? "is-group" : "",
              depth > 0 && !isGroup ? "is-sub" : "",
              isPriority ? "priority" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const star = isPriority
              ? '<span class="profile-priority-star" title="Priority task">★</span>'
              : "";
            const removeBtn = isGroup
              ? ""
              : `<button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(name)}" title="Remove">×</button>`;
            const pctSpan = pctStr
              ? `<span class="profile-task-pct">${escapeHtml(pctStr)}</span>`
              : "";
            const childrenHtml = renderTaskTreeNodes(
              n.children || [],
              depth + 1,
              key,
              prioritySet,
              timeAllocMap,
            );
            return `<li class="${liClass}">
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                        <span class="profile-task-text">${star}<span>${escapeHtml(name)}</span>${mergedHint}</span>
                        ${pctSpan}
                        ${removeBtn}
                    </div>
                    ${childrenHtml}
                </li>`;
          })
          .join("");
        return `<ul class="${cls}">${html}</ul>`;
      }

      function showProfilePanel() {
        document.getElementById("profile-panel").classList.add("visible");
        document.getElementById("profile-btn").classList.add("active");
        profileShown = true;
        profileConfirmPending = true;
        removeTyping();
        showProfileHint();
      }

      function showProfileHint() {
        if (document.getElementById("profile-hint")) return;
        const div = document.createElement("div");
        div.id = "profile-hint";
        div.className = "system-message";
        div.textContent =
          "Review your profile on the right, then send a message to continue.";

      async function silentProfileLoad() {
        if (!sessionToken) return;
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          if (!data.success) return;

          renderProfile(lastPortrait);

            document.getElementById("profile-panel").classList.add("visible");

          }

      }

      async function fetchAndRenderProfile() {
        if (!sessionToken) return;
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          if (!data.success) return;
          lastPortrait = data.user_portrait || {};
          renderProfile(lastPortrait);
          const tasks = lastPortrait["Task Inventory"] || [];
          const otherFieldsFilled = [
            "Functional Role",
            "Work Rhythm",
            "Tools and Methods",
          ].some(
            (k) =>
              lastPortrait[k] &&
              (Array.isArray(lastPortrait[k])
                ? lastPortrait[k].length > 0
                : lastPortrait[k]),
          );
          if (!profileShown && tasks.length >= 3 && otherFieldsFilled) {
            showProfilePanel();
          }
          // Update progress bar from subtopic coverage
          const topics = data.topics || [];
          const allSubs = topics.flatMap((t) => t.subtopics || []);
          const total = allSubs.length;
          const covered = allSubs.filter((s) => s.is_covered).length;
        } catch (e) {}
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function capitalizeFirst(s) {
        const str = String(s || "").trim();
        if (!str) return str;
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      const PROFILE_LABEL_OVERRIDES = {
        "Task Inventory": "Tasks",
      };
      /** Primary column order in the profile panel; other keys follow alphabetically. */
      const PROFILE_FIELD_ORDER = ["Role", "Tenure", "Task Inventory"];

      function classifyField(value) {
        if (Array.isArray(value)) return "tags";
        if (value !== null && typeof value === "object") return "dict";
        return "text";
      }

      function isFieldFilled(kind, value) {
        if (kind === "tags") return Array.isArray(value) && value.length > 0;
        if (kind === "dict") return value && Object.keys(value).length > 0;
        return typeof value === "string" && value.trim().length > 0;
      }

      function renderProfile(portrait) {
        const body = document.getElementById("profile-body");
        const badge = document.getElementById("profile-badge");

        const fields = Object.keys(portrait).map((key) => {
          const value = portrait[key];
          const kind = classifyField(value);
          return {
            key,
            label: PROFILE_LABEL_OVERRIDES[key] || key,
            kind,
            value,
            filled: isFieldFilled(kind, value),
          };
        });

        const profileFieldRank = (key) => {
          const i = PROFILE_FIELD_ORDER.indexOf(key);
          if (i !== -1) return i;
          if (key === "Priority Tasks" || key === "Time Allocation")
            return 2000;
          return 1000;
        };
        fields.sort((a, b) => {
          const ra = profileFieldRank(a.key);
          const rb = profileFieldRank(b.key);
          if (ra !== rb) return ra - rb;
          return a.key.localeCompare(b.key);
        });

        if (fields.length === 0) {
          body.innerHTML =
            '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>Profile is being built<br>as the interview progresses.</p></div>';
          badge.textContent = "Building...";
          badge.className = "profile-header-badge";
          return;
        }

        const hasAny = fields.some((f) => f.filled);
        if (!hasAny) {
          body.innerHTML =
            '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>Profile is being built<br>as the interview progresses.</p></div>';
          badge.textContent = "Building...";
          badge.className = "profile-header-badge";
          return;
        }

        const visibleFields = fields.filter(
          (f) => f.key !== "Priority Tasks" && f.key !== "Time Allocation",
        );
        const filledCount = visibleFields.filter((f) => f.filled).length;
        badge.textContent = `${filledCount} / ${visibleFields.length} fields`;
        badge.className = "profile-header-badge live";

        const priorityRaw = Array.isArray(portrait["Priority Tasks"])
          ? portrait["Priority Tasks"]
          : [];
        const prioritySet = new Set(
          priorityRaw.map((t) => String(t).trim().toLowerCase()),
        );
        const timeAllocation =
          portrait["Time Allocation"] &&
          typeof portrait["Time Allocation"] === "object"
            ? portrait["Time Allocation"]
            : {};
        const timeAllocMap = {};
        for (const [k, v] of Object.entries(timeAllocation)) {
          if (k) timeAllocMap[String(k).trim().toLowerCase()] = v;
        }

        let html = "";
        for (const field of fields) {
          const { key, label, kind, value } = field;
          if (key === "Priority Tasks" || key === "Time Allocation") continue;
          const tagId = key.replace(/ /g, "-");
          if (kind === "text") {
            const val = typeof value === "string" ? value : "";
            html += `<div class="profile-section">
                        <div class="profile-section-label">${escapeHtml(label)}</div>
                        <input class="profile-edit-input" data-key="${escapeAttr(key)}" value="${escapeAttr(val)}" placeholder="Not yet captured">
                    </div>`;
          } else if (kind === "tags") {
            const items = Array.isArray(value) ? value : [];
            const singular = label.toLowerCase().replace(/s$/, "");
            const isTaskField = key === "Task Inventory";

            let listHtml = "";
            if (isTaskField) {
              const sig = taskInventorySignature(items);
              const haveTree =
                taskTreeCache.signature === sig &&
                Array.isArray(taskTreeCache.tree);
              if (haveTree) {
                const treeCopy = JSON.parse(JSON.stringify(taskTreeCache.tree));
                annotateTree(treeCopy, prioritySet);
                listHtml = renderTaskTreeNodes(
                  treeCopy,
                  0,
                  key,
                  prioritySet,
                  timeAllocMap,
                );
              } else {
                const indexed = items.map((item, i) => ({
                  item,
                  origIdx: i,
                  isPriority: prioritySet.has(
                    String(item).trim().toLowerCase(),
                  ),
                  pct: timeAllocMap[String(item).trim().toLowerCase()],
                }));
                indexed.sort((a, b) => {
                  if (a.isPriority !== b.isPriority)
                    return a.isPriority ? -1 : 1;
                  return a.origIdx - b.origIdx;
                });
                listHtml = `<ul class="profile-task-list" id="tags-${tagId}">
                                ${indexed
                                  .map(({ item, isPriority, pct }) => {
                                    const pctStr =
                                      pct === undefined ||
                                      pct === null ||
                                      pct === ""
                                        ? ""
                                        : typeof pct === "number"
                                          ? `${pct}%`
                                          : String(pct);
                                    return `<li class="profile-task-item${isPriority ? " priority" : ""}">
                                        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                                            <span class="profile-task-text">${isPriority ? '<span class="profile-priority-star" title="Priority task">★</span>' : ""}<span>${escapeHtml(item)}</span></span>
                                            ${pctStr ? `<span class="profile-task-pct">${escapeHtml(pctStr)}</span>` : ""}
                                            <button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(item)}" title="Remove">×</button>
                                        </div>
                                    </li>`;
                                  })
                                  .join("")}
                            </ul>`;
                // Kick off the organize-tasks fetch in the background; on success we re-render with the tree.
                fetchTaskTree(items);
              }
            } else {
              const indexed = items.map((item, i) => ({ item, origIdx: i }));
              listHtml = `<ul class="profile-task-list" id="tags-${tagId}">
                            ${indexed
                              .map(({ item }) => {
                                return `<li class="profile-task-item">
                                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                                        <span class="profile-task-text"><span>${escapeHtml(item)}</span></span>
                                        <button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(item)}" title="Remove">×</button>
                                    </div>
                                </li>`;
                              })
                              .join("")}
                        </ul>`;
            }

            html += `<div class="profile-section">
                        <div class="profile-section-label">${escapeHtml(label)}</div>
                        ${listHtml}
                        <div class="profile-add-row">
                            <input class="profile-add-input" id="add-input-${tagId}" placeholder="Add ${escapeAttr(singular)}…">
                            <button class="profile-add-btn" data-key="${escapeAttr(key)}">Add</button>
                        </div>
                    </div>`;
          } else if (kind === "dict") {
            const entries = Object.entries(value || {}).filter(
              ([k, v]) => k && v !== undefined && v !== null && v !== "",
            );
            html += `<div class="profile-section">
                        <div class="profile-section-label">${escapeHtml(label)}</div>
                        ${
                          entries.length > 0
                            ? `<ul class="profile-task-list" id="dict-${tagId}">
                                ${entries.map(([k, v]) => `<li class="profile-task-item"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;"><span class="profile-task-text">${escapeHtml(k)}</span><span style="color:#6b7280;font-variant-numeric:tabular-nums;margin-left:8px;">${escapeHtml(String(v))}</span><button class="profile-tag-remove" data-dict-key="${escapeAttr(key)}" data-entry-key="${escapeAttr(k)}" title="Remove">×</button></div></li>`).join("")}
                               </ul>`
                            : `<div class="profile-value empty">Not yet captured</div>`
                        }
                    </div>`;
          }
        }
        html += `<button class="profile-save-btn" id="profile-save-btn">Save changes</button>`;
        body.innerHTML = html;

        body
          .querySelectorAll(".profile-tag-remove[data-dict-key]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const dictKey = btn.dataset.dictKey;
              const entryKey = btn.dataset.entryKey;
              if (
                lastPortrait[dictKey] &&
                typeof lastPortrait[dictKey] === "object"
              ) {
                delete lastPortrait[dictKey][entryKey];
              }
              renderProfile(lastPortrait);
            });
          });

        body
          .querySelectorAll(".profile-tag-remove[data-key]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const key = btn.dataset.key;
              const taskName = btn.dataset.taskName;
              const arr = lastPortrait[key] || [];
              const needle = String(taskName || "")
                .trim()
                .toLowerCase();
              let removed = null;
              const removeIdx = arr.findIndex(
                (t) => String(t).trim().toLowerCase() === needle,
              );
              if (removeIdx >= 0) {
                removed = arr[removeIdx];
                lastPortrait[key] = arr.filter((_, i) => i !== removeIdx);
              }
              if (key === "Task Inventory" && removed) {
                if (Array.isArray(lastPortrait["Priority Tasks"])) {
                  lastPortrait["Priority Tasks"] = lastPortrait[
                    "Priority Tasks"
                  ].filter((t) => String(t).trim().toLowerCase() !== needle);
                }
                if (
                  lastPortrait["Time Allocation"] &&
                  typeof lastPortrait["Time Allocation"] === "object"
                ) {
                  for (const k of Object.keys(
                    lastPortrait["Time Allocation"],
                  )) {
                    if (String(k).trim().toLowerCase() === needle)
                      delete lastPortrait["Time Allocation"][k];
                  }
                }
                // Invalidate the cached tree so the next render refetches the grouped layout.
                taskTreeCache = { signature: null, tree: null };
              }
              renderProfile(lastPortrait);
            });
          });
        body.querySelectorAll(".profile-add-btn").forEach((btn) => {
          btn.addEventListener("click", () => addTag(btn.dataset.key));
        });
        body.querySelectorAll(".profile-add-input").forEach((input) => {
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              addTag(
                input
                  .closest(".profile-section")
                  .querySelector(".profile-add-btn").dataset.key,
              );
            }
          });
        });
        document
          .getElementById("profile-save-btn")
          .addEventListener("click", saveProfile);
      }

      function addTag(key) {
        const input = document.getElementById(
          `add-input-${key.replace(/ /g, "-")}`,
        );
        if (!input) return;
        const val = input.value.trim();
        if (!val) return;
        if (!lastPortrait[key]) lastPortrait[key] = [];
        lastPortrait[key].push(val);
        if (key === "Task Inventory") {
          taskTreeCache = { signature: null, tree: null };
        }
        renderProfile(lastPortrait);
      }

      async function saveProfile() {
        const portrait = { ...lastPortrait };
        document.querySelectorAll(".profile-edit-input").forEach((input) => {
          portrait[input.dataset.key] = input.value.trim();
        });
        const btn = document.getElementById("profile-save-btn");
        btn.disabled = true;
        btn.textContent = "Saving…";
        try {
          const r = await fetch("/api/update-portrait", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_token: sessionToken, portrait }),
          });
          const data = await r.json();
          if (data.success) {
            lastPortrait = portrait;
            btn.textContent = "Saved ✓";
            setTimeout(() => {
              btn.disabled = false;
              btn.textContent = "Save changes";
            }, 1500);
          } else {
            btn.textContent = "Error";
            btn.disabled = false;
          }
        } catch (e) {
          btn.textContent = "Error";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
