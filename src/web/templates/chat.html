      async function fetchAndRenderProfile(options = {}) {
        if (!sessionToken) return;
        const stopLoadingSignal = options.showLoading
          ? beginProfileLoadingSignal()
          : null;
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          if (!data.success) return;
          lastPortrait = data.user_portrait || {};
          if (profileConfirmPending && profileConfirmSnapshot) {
            renderProfile(profileConfirmSnapshot);
            return;
          }
          if (
            profileConfirmPending &&
            !profileConfirmSnapshot &&
            profileHasRoleAndTenure(lastPortrait)
          ) {
            profileConfirmSnapshot = JSON.parse(
              JSON.stringify(lastPortrait || {}),
            );
            renderProfile(profileConfirmSnapshot);
            await ensureProfileBuildingIndicatorLeadIn();
            if (!profileConfirmPending) return;
            showProfilePanel();
            return;
          }
          renderProfile(lastPortrait);
          const tasks = lastPortrait["Task Inventory"] || [];
          const otherFieldsFilled = [
            "Functional Role",
            "Work Rhythm",
            "Tools and Methods",
          ].some(
            (k) =>
              lastPortrait[k] &&
              (Array.isArray(lastPortrait[k])
                ? lastPortrait[k].length > 0
                : lastPortrait[k]),
          );
          if (!profileShown && tasks.length >= 3 && otherFieldsFilled) {
            if (window.matchMedia("(max-width: 900px)").matches) {
              profileShown = true;
            } else {
              await ensureProfileBuildingIndicatorLeadIn();
              showProfilePanel();
            }
          }
          // Update progress bar from subtopic coverage
          const topics = data.topics || [];
          const allSubs = topics.flatMap((t) => t.subtopics || []);
          const total = allSubs.length;
          const covered = allSubs.filter((s) => s.is_covered).length;
        } catch (e) {
        } finally {
          if (stopLoadingSignal) stopLoadingSignal();
        }
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function capitalizeFirst(s) {
        const str = String(s || "").trim();
        if (!str) return str;
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function capitalizeFieldValue(value) {
        return capitalizeFirst(value);
      }

      function condenseRoleText(value) {
        let s = String(value || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!s) return "";
        s = s.replace(/^(?:currently|right now)\s+/i, "");
        s = s.replace(/^i\s*(?:am|['’]m)\s+/i, "");
        s = s.replace(/^i\s+work\s+as\s+/i, "");
        s = s.replace(/^(?:my\s+)?role\s+is\s+/i, "");
        s = s.replace(/^(?:working|serving)\s+as\s+/i, "");
        s = s.replace(/^an?\s+/i, "");
        s = s.replace(/[.]+$/g, "").trim();
        return s;
      }

      function condenseTenureText(value) {
        let s = String(value || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!s) return "";
        s = s.replace(
          /^i\s*(?:have|['’]ve)\s+been\s+(?:in\s+(?:this|the)\s+)?(?:role|position|postdoc)?\s*(?:for\s+)?/i,
          "",
        );
        s = s.replace(
          /^been\s+(?:in\s+)?(?:this|the)?\s*(?:role|position|postdoc)?\s*(?:for\s+)?/i,
          "",
        );
        s = s.replace(/^for\s+/i, "");
        const durationMatch = s.match(
          /\b(?:about|around|roughly|approximately|almost|nearly|over|under)?\s*\d+(?:\.\d+)?\s*(?:years?|months?|weeks?|days?)\b/i,
        );
        if (durationMatch) return durationMatch[0].trim();
        return s.replace(/[.]+$/g, "").trim();
      }

      function condenseProfileTextField(key, value) {
        const raw = String(value || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!raw) return "";
        const k = String(key || "").toLowerCase().trim();
        if (k === "role" || k === "functional role") {
          return condenseRoleText(raw);
        }
        if (k === "tenure") {
          return condenseTenureText(raw);
        }
        return raw;
      }

      function condensePortraitForDisplay(portrait) {
        if (!portrait || typeof portrait !== "object") return {};
        const out = { ...portrait };
        Object.keys(out).forEach((key) => {
          if (typeof out[key] !== "string") return;
          out[key] = condenseProfileTextField(key, out[key]);
        });
        return out;
      }

      const PROFILE_LABEL_OVERRIDES = {
        "Task Inventory": "Tasks",
      };
      /** Primary column order in the profile panel; other keys follow alphabetically. */
      const PROFILE_FIELD_ORDER = ["Role", "Tenure", "Task Inventory"];

      function classifyField(value) {
        if (Array.isArray(value)) return "tags";
        if (value !== null && typeof value === "object") return "dict";
        return "text";
      }

      function isFieldFilled(kind, value) {
        if (kind === "tags") return Array.isArray(value) && value.length > 0;
        if (kind === "dict") return value && Object.keys(value).length > 0;
        return typeof value === "string" && value.trim().length > 0;
      }

      function autosizeProfileInput(input) {
        if (!input) return;
        const minHeight = 24;
        const maxHeight = 86;
        const panel = document.getElementById("profile-panel");
        if (
          panel &&
          (!panel.classList.contains("visible") ||
            panel.getBoundingClientRect().width < 220)
        ) {
          input.style.height = minHeight + "px";
          input.style.overflowY = "hidden";
          return;
        }
        input.style.height = "auto";
        const nextHeight = Math.min(Math.max(input.scrollHeight, minHeight), maxHeight);
        input.style.height = nextHeight + "px";
        input.style.overflowY = input.scrollHeight > maxHeight ? "auto" : "hidden";
      }

      function renderProfile(portrait) {
        const panel = document.getElementById("profile-panel");
        if (
          profilePanelLoadingHold &&
          profileLoadSignalDepth > 0 &&
          panel &&
          panel.classList.contains("visible")
        ) {
          return;
        }
        const body = document.getElementById("profile-body");
        const badge = document.getElementById("profile-badge");
        const displayPortrait = condensePortraitForDisplay(portrait);
        const setBadge = (text, className) => {
          if (!badge) return;
          if (profileLoadSignalDepth > 0 && badge.classList.contains("loading"))
            return;
          badge.textContent = text;
          badge.className = className;
        };

        const fields = Object.keys(displayPortrait).map((key) => {
          const value = displayPortrait[key];
          const kind = classifyField(value);
          return {
            key,
            label: PROFILE_LABEL_OVERRIDES[key] || key,
            kind,
            value,
            filled: isFieldFilled(kind, value),
          };
        });

        const profileFieldRank = (key) => {
          const i = PROFILE_FIELD_ORDER.indexOf(key);
          if (i !== -1) return i;
          if (key === "Priority Tasks" || key === "Time Allocation")
            return 2000;
          return 1000;
        };
        fields.sort((a, b) => {
          const ra = profileFieldRank(a.key);
          const rb = profileFieldRank(b.key);
          if (ra !== rb) return ra - rb;
          return a.key.localeCompare(b.key);
        });

        if (fields.length === 0) {
          body.innerHTML =
            '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>Profile is being built<br>as the interview progresses.</p></div>';
          setBadge("Building...", "profile-header-badge");
          return;
        }

        const hasAny = fields.some((f) => f.filled);
        if (!hasAny) {
          body.innerHTML =
            '<div class="profile-empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>Profile is being built<br>as the interview progresses.</p></div>';
          setBadge("Building...", "profile-header-badge");
          return;
        }

        const visibleFields = fields.filter(
          (f) =>
            f.key !== "Priority Tasks" &&
            f.key !== "Time Allocation" &&
            f.key !== "Task Grouping Tree" &&
            f.key !== TASK_GROUPING_FEEDBACK_KEY,
        );
        const filledCount = visibleFields.filter((f) => f.filled).length;
        setBadge(
          `${filledCount} / ${visibleFields.length} fields`,
          "profile-header-badge live",
        );

        const priorityRaw = Array.isArray(displayPortrait["Priority Tasks"])
          ? displayPortrait["Priority Tasks"]
          : [];
        const prioritySet = new Set(
          priorityRaw.map((t) => String(t).trim().toLowerCase()),
        );

        let html = "";
        for (const field of fields) {
          const { key, label, kind, value } = field;
          if (
            key === "Priority Tasks" ||
            key === "Time Allocation" ||
            key === "Task Grouping Tree" ||
            key === TASK_GROUPING_FEEDBACK_KEY
          )
            continue;
          const tagId = key.replace(/ /g, "-");
          if (kind === "text") {
            const val = typeof value === "string" ? value : "";
            const displayVal = capitalizeFieldValue(val);
            html += `<div class="profile-section">
                        <div class="profile-section-label">${escapeHtml(label)}</div>
                        <textarea class="profile-edit-input" data-key="${escapeAttr(key)}" rows="1" placeholder="Not yet captured">${escapeHtml(displayVal)}</textarea>
                    </div>`;
          } else if (kind === "tags") {
            const items = Array.isArray(value) ? value : [];
            const singular = label.toLowerCase().replace(/s$/, "");
            const isTaskField = key === "Task Inventory";

            let listHtml = "";
            if (isTaskField) {
              const sig = taskInventorySignature(
                items,
                portraitGroupingFeedback(displayPortrait),
              );
              // Prefer the active widget's tree so the profile always shows the
              // same groupings as the open time-split widget.
              const resolvedTree =
                activeWidgetTree &&
                activeWidgetTree.sig === sig &&
                Array.isArray(activeWidgetTree.tree)
                  ? activeWidgetTree.tree
                  : taskTreeCache.signature === sig &&
                      Array.isArray(taskTreeCache.tree)
                    ? taskTreeCache.tree
                    : null;
              const haveTree = !!resolvedTree;
              if (haveTree) {
                const treeCopy = JSON.parse(JSON.stringify(resolvedTree));
                annotateTree(treeCopy, prioritySet);
                listHtml = renderTaskTreeNodes(
                  treeCopy,
                  0,
                  key,
                  prioritySet,
                );
              } else {
                const indexed = items.map((item, i) => ({
                  item,
                  origIdx: i,
                  isPriority: prioritySet.has(
                    String(item).trim().toLowerCase(),
                  ),
                }));
                indexed.sort((a, b) => {
                  if (a.isPriority !== b.isPriority)
                    return a.isPriority ? -1 : 1;
                  return a.origIdx - b.origIdx;
                });
                listHtml = `<ul class="profile-task-list" id="tags-${tagId}">
                                ${indexed
                                  .map(({ item, isPriority }) => {
                                    return `<li class="profile-task-item${isPriority ? " priority" : ""}">
                                        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                                            <span class="profile-task-text"><span>${escapeHtml(capitalizeFieldValue(item))}</span></span>
                                            <button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(item)}" title="Remove">×</button>
                                        </div>
                                    </li>`;
                                  })
                                  .join("")}
                            </ul>`;
                // Kick off the organize-tasks fetch in the background; on success we re-render with the tree.
                fetchTaskTree(items);
              }
            } else {
              const indexed = items.map((item, i) => ({ item, origIdx: i }));
              listHtml = `<ul class="profile-task-list" id="tags-${tagId}">
                            ${indexed
                              .map(({ item }) => {
                                return `<li class="profile-task-item">
                                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;">
                                        <span class="profile-task-text"><span>${escapeHtml(capitalizeFieldValue(item))}</span></span>
                                        <button class="profile-tag-remove" data-key="${escapeAttr(key)}" data-task-name="${escapeAttr(item)}" title="Remove">×</button>
                                    </div>
                                </li>`;
                              })
                              .join("")}
                        </ul>`;
            }

            html += `<div class="profile-section">
                        <div class="profile-section-label">${escapeHtml(label)}</div>
                        ${listHtml}
                        <div class="profile-add-row">
                            <input class="profile-add-input" id="add-input-${tagId}" placeholder="Add ${escapeAttr(singular)}…">
                            <button class="profile-add-btn" data-key="${escapeAttr(key)}">Add</button>
                        </div>
                    </div>`;
          } else if (kind === "dict") {
            const entries = Object.entries(value || {}).filter(
              ([k, v]) => k && v !== undefined && v !== null && v !== "",
            );
            html += `<div class="profile-section">
                        <div class="profile-section-label">${escapeHtml(label)}</div>
                        ${
                          entries.length > 0
                            ? `<ul class="profile-task-list" id="dict-${tagId}">
                                ${entries.map(([k, v]) => `<li class="profile-task-item"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;width:100%;"><span class="profile-task-text">${escapeHtml(capitalizeFieldValue(k))}</span><span style="color:#6b7280;font-variant-numeric:tabular-nums;margin-left:8px;">${escapeHtml(typeof v === "string" ? capitalizeFieldValue(v) : String(v))}</span><button class="profile-tag-remove" data-dict-key="${escapeAttr(key)}" data-entry-key="${escapeAttr(k)}" title="Remove">×</button></div></li>`).join("")}
                               </ul>`
                            : `<div class="profile-value empty">Not yet captured</div>`
                        }
                    </div>`;
          }
        }
        html += `<button class="profile-save-btn" id="profile-save-btn">Save changes</button>`;
        body.innerHTML = html;

        body.querySelectorAll(".profile-edit-input").forEach((input) => {
          autosizeProfileInput(input);
          input.addEventListener("input", () => autosizeProfileInput(input));
        });
        const panelEl = document.getElementById("profile-panel");
        if (panelEl && panelEl.classList.contains("visible")) {
          scheduleProfileInputAutosizeRefresh();
        }

        body
          .querySelectorAll(".profile-tag-remove[data-dict-key]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const dictKey = btn.dataset.dictKey;
              const entryKey = btn.dataset.entryKey;
              if (
                lastPortrait[dictKey] &&
                typeof lastPortrait[dictKey] === "object"
              ) {
                delete lastPortrait[dictKey][entryKey];
              }
              renderProfile(lastPortrait);
            });
          });

        body
          .querySelectorAll(".profile-tag-remove[data-key]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const key = btn.dataset.key;
              const taskName = btn.dataset.taskName;
              const arr = lastPortrait[key] || [];
              const needle = String(taskName || "")
                .trim()
                .toLowerCase();
              let removed = null;
              const removeIdx = arr.findIndex(
                (t) => String(t).trim().toLowerCase() === needle,
              );
              if (removeIdx >= 0) {
                removed = arr[removeIdx];
                lastPortrait[key] = arr.filter((_, i) => i !== removeIdx);
              }
              if (key === "Task Inventory" && removed) {
                if (Array.isArray(lastPortrait["Priority Tasks"])) {
                  lastPortrait["Priority Tasks"] = lastPortrait[
                    "Priority Tasks"
                  ].filter((t) => String(t).trim().toLowerCase() !== needle);
                }
                if (
                  lastPortrait["Time Allocation"] &&
                  typeof lastPortrait["Time Allocation"] === "object"
                ) {
                  for (const k of Object.keys(
                    lastPortrait["Time Allocation"],
                  )) {
                    if (String(k).trim().toLowerCase() === needle)
                      delete lastPortrait["Time Allocation"][k];
                  }
                }
                // Invalidate the cached tree so the next render refetches the grouped layout.
                taskTreeCache = { signature: null, tree: null };
              }
              renderProfile(lastPortrait);
            });
          });
        body.querySelectorAll(".profile-add-btn").forEach((btn) => {
          btn.addEventListener("click", () => addTag(btn.dataset.key));
        });
        body.querySelectorAll(".profile-add-input").forEach((input) => {
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              addTag(
                input
                  .closest(".profile-section")
                  .querySelector(".profile-add-btn").dataset.key,
              );
            }
          });
        });
        document
          .getElementById("profile-save-btn")
          .addEventListener("click", saveProfile);
      }

      function addTag(key) {
        const input = document.getElementById(
          `add-input-${key.replace(/ /g, "-")}`,
        );
        if (!input) return;
        const val = input.value.trim();
        if (!val) return;
        if (!lastPortrait[key]) lastPortrait[key] = [];
        lastPortrait[key].push(capitalizeFieldValue(val));
        if (key === "Task Inventory") {
          taskTreeCache = { signature: null, tree: null };
        }
        renderProfile(lastPortrait);
      }

      async function saveProfile() {
        const portrait = { ...lastPortrait };
        document.querySelectorAll(".profile-edit-input").forEach((input) => {
          portrait[input.dataset.key] = capitalizeFieldValue(input.value.trim());
        });
        const btn = document.getElementById("profile-save-btn");
        btn.disabled = true;
        btn.textContent = "Saving…";
        try {
          const r = await fetch("/api/update-portrait", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_token: sessionToken, portrait }),
          });
          const data = await r.json();
          if (data.success) {
            lastPortrait = portrait;
            btn.textContent = "Saved ✓";
            if (profileConfirmPending) {
              resolveProfileConfirmGate();
            } else {
              document
                .getElementById("profile-panel")
                .classList.remove("visible");
              document.getElementById("profile-btn").classList.remove("active");
              const backdrop = document.getElementById("profile-backdrop");
              if (backdrop) backdrop.classList.remove("visible");
            }
            setTimeout(() => {
              btn.disabled = false;
              btn.textContent = "Save changes";
            }, 1500);
          } else {
            btn.textContent = "Error";
            btn.disabled = false;
          }
        } catch (e) {
          btn.textContent = "Error";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
