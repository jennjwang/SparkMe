<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SparkMe Interview</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          ui-sans-serif,
          -apple-system,
          system-ui,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background: #ffffff;
        color: #374151;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ---- Top Bar ---- */
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        flex-shrink: 0;
        z-index: 10;
      }

      .brand {
        font-size: 16px;
        font-weight: 600;
        color: #111827;
        letter-spacing: -0.02em;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .toggle-switch {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #6b7280;
      }

      .toggle-switch input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 36px;
        height: 20px;
        background: #d1d5db;
        border-radius: 10px;
        position: relative;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle-switch input[type="checkbox"]::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }
      .toggle-switch input[type="checkbox"]:checked {
        background: #10a37f;
      }
      .toggle-switch input[type="checkbox"]:checked::after {
        transform: translateX(16px);
      }
      .toggle-switch label {
        cursor: pointer;
        user-select: none;
      }

      .end-btn {
        background: #fff;
        color: #6b7280;
        border: 1px solid #e5e7eb;
        padding: 6px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s;
      }
      .end-btn:hover:not(:disabled) {
        background: #fef2f2;
        color: #dc2626;
        border-color: #fecaca;
      }
      .end-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .profile-toggle-btn:hover {
        background: #f3f4f6 !important;
        color: #374151 !important;
        border-color: #e5e7eb !important;
      }
      .profile-toggle-btn.active {
        background: #f0f9ff;
        color: #0284c7;
        border-color: #bae6fd;
      }

      .session-timer {
        font-size: 15px;
        color: #6b7280;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
        text-align: right;
      }
      .session-timer-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
        min-width: 120px;
      }
      .session-progress {
        width: 100%;
        height: 4px;
        background: #f3f4f6;
        border-radius: 2px;
        overflow: hidden;
      }
      .session-progress-fill {
        height: 100%;
        width: 0%;
        background: #6366f1;
        border-radius: 2px;
        transition:
          width 0.6s ease-out,
          background 0.4s;
      }
      .session-progress-fill.near-done {
        background: #16a34a;
      }

      /* ---- Main Chat Area ---- */
      .chat-wrapper {
        flex: 1;
        overflow-y: auto;
        background: #f9fafb;
      }

      .chat-wrapper::-webkit-scrollbar {
        width: 6px;
      }
      .chat-wrapper::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-wrapper::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 3px;
      }

      .chat-inner {
        max-width: 680px;
        margin: 0 auto;
        padding: 48px 24px 32px;
      }

      .system-message {
        text-align: center;
        margin: 24px 0;
        padding: 12px 20px;
        background: #f3f4f6;
        border-radius: 8px;
        color: #6b7280;
        font-size: 13px;
        font-style: italic;
      }

      .session-end-banner {
        text-align: center;
        margin: 32px 0 8px;
        padding: 24px 32px;
        background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .session-end-banner .end-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .session-end-banner .end-text {
        color: #15803d;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.5;
      }
      .session-end-banner .end-subtext {
        color: #6b7280;
        font-size: 13px;
        margin-top: 4px;
      }

      /* ---- Hint ---- */
      .hint-text {
        text-align: center;
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .hint-text kbd {
        display: inline-block;
        background: #f3f4f6;
        padding: 1px 7px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
        color: #6b7280;
        border: 1px solid #e5e7eb;
      }

      /* ---- Messages ---- */
      #chat-box {
        display: flex;
        flex-direction: column;
        gap: 40px;
      }

      .message {
        display: flex;
        align-items: flex-start;
        gap: 24px;
        font-size: 15px;
        line-height: 1.8;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message .content {
        flex: 1;
        min-width: 0;
      }
      .message .content p {
        margin: 0;
        word-wrap: break-word;
        color: #1f2937;
      }

      .message.user .content {
        flex: unset;
        max-width: 70%;
      }

      .message.user .content p {
        background: #e5e7eb;
        color: #111827;
        padding: 10px 16px;
        border-radius: 20px 20px 4px 20px;
        display: inline-block;
        word-wrap: break-word;
      }

      /* ---- Status ---- */
      #status {
        text-align: center;
        color: #9ca3af;
        font-size: 13px;
        padding: 8px 24px;
        min-height: 32px;
        flex-shrink: 0;
        background: #f9fafb;
      }

      /* ---- Input Area ---- */
      .input-area {
        background: #ffffff;
        padding: 20px 24px 28px;
        border-top: 1px solid #f3f4f6;
        flex-shrink: 0;
      }

      .input-container {
        max-width: 680px;
        margin: 0 auto;
        background: #f9fafb;
        border-radius: 24px;
        border: 1px solid #e5e7eb;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .input-container:focus-within {
        border-color: #c7d2fe;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
      }

      #chat-form {
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 12px 14px 12px 24px;
      }

      #chat-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #1f2937;
        font-size: 15px;
        font-family: inherit;
        line-height: 1.6;
        resize: none;
        min-height: 24px;
        max-height: 160px;
        padding: 6px 0;
      }

      #chat-input::placeholder {
        color: #9ca3af;
      }
      #chat-input:disabled {
        color: #d1d5db;
        cursor: not-allowed;
      }

      .mic-btn {
        width: 40px;
        height: 40px;
        min-width: 40px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: #9ca3af;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
        position: relative;
      }
      .mic-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .mic-btn:hover {
        background: #f3f4f6;
        color: #374151;
      }
      .mic-btn.recording {
        background: #fef2f2;
        color: #dc2626;
        animation: recPulse 1.5s ease-in-out infinite;
      }
      .mic-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      @keyframes recPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(220, 38, 38, 0.12);
        }
      }

      .send-btn {
        width: 40px;
        height: 40px;
        min-width: 40px;
        border-radius: 50%;
        border: none;
        background: #111827;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .send-btn svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .send-btn:hover {
        background: #374151;
        transform: scale(1.05);
      }
      .send-btn:active {
        transform: scale(0.95);
      }
      .send-btn:disabled {
        background: #e5e7eb;
        color: #9ca3af;
        cursor: not-allowed;
        transform: none;
      }

      /* ---- Typing indicator ---- */
      .typing-indicator {
        display: flex;
        align-items: flex-start;
      }
      .typing-bubble {
        background: #f3f4f6;
        border-radius: 18px 18px 18px 4px;
        padding: 14px 18px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .typing-bubble span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #9ca3af;
        animation: dotBounce 1.4s ease-in-out infinite;
      }
      .typing-bubble span:nth-child(2) {
        animation-delay: 0.18s;
      }
      .typing-bubble span:nth-child(3) {
        animation-delay: 0.36s;
      }
      @keyframes dotBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.45;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ---- Message fade-in ---- */
      .message {
        animation: fadeInUp 0.3s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .disclaimer {
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        padding: 12px 0 0;
        max-width: 680px;
        margin: 0 auto;
      }

      /* ---- Layout ---- */
      .main-content {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      .chat-column {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ---- Profile Panel ---- */
      .profile-panel {
        width: 0;
        flex-shrink: 0;
        background: #fff;
        border-left: 0 solid #e5e7eb;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition:
          width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          border-left-width 0.35s;
      }
      .profile-panel.visible {
        width: 320px;
        border-left-width: 1px;
      }

      .profile-header {
        padding: 20px 20px 16px;
        border-bottom: 1px solid #f3f4f6;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .profile-header-title {
        font-size: 15px;
        font-weight: 600;
        color: #111827;
      }
      .profile-header-badge {
        font-size: 11px;
        color: #9ca3af;
        background: #f9fafb;
        border: 1px solid #f3f4f6;
        padding: 2px 8px;
        border-radius: 99px;
      }
      .profile-header-badge.live {
        color: #16a34a;
        background: #f0fdf4;
        border-color: #bbf7d0;
      }
      .profile-close-btn {
        background: none;
        border: none;
        color: #9ca3af;
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        transition: color 0.15s;
      }
      .profile-close-btn:hover {
        color: #374151;
      }

      .profile-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
      }
      .profile-body::-webkit-scrollbar {
        width: 5px;
      }
      .profile-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .profile-body::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 3px;
      }

      .profile-section {
        margin-bottom: 20px;
        min-width: 0;
      }
      .profile-section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #9ca3af;
        margin-bottom: 8px;
      }
      .profile-value {
        font-size: 14px;
        color: #1f2937;
        line-height: 1.6;
        padding: 10px 12px;
        background: #f9fafb;
        border-radius: 8px;
        border: 1px solid #f3f4f6;
        min-height: 40px;
      }
      .profile-value.empty {
        color: #d1d5db;
        font-style: italic;
      }
      .profile-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .profile-tag {
        font-size: 12px;
        color: #374151;
        background: #f3f4f6;
        border-radius: 6px;
        padding: 4px 10px;
        line-height: 1.4;
      }
      .profile-tag.pain {
        background: #fef2f2;
        color: #dc2626;
      }
      .profile-tag.bright {
        background: #f0fdf4;
        color: #16a34a;
      }
      .profile-tag.tool {
        background: #eff6ff;
        color: #2563eb;
      }
      .profile-tag.ai {
        background: #faf5ff;
        color: #7c3aed;
      }
      .profile-tag.motivation {
        background: #fffbeb;
        color: #d97706;
      }
      .profile-empty-tags {
        font-size: 13px;
        color: #d1d5db;
        font-style: italic;
      }

      .profile-empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #9ca3af;
      }
      .profile-empty-state svg {
        width: 40px;
        height: 40px;
        margin: 0 auto 12px;
        display: block;
        opacity: 0.4;
      }
      .profile-empty-state p {
        font-size: 14px;
      }

      .profile-edit-input {
        width: 100%;
        font-size: 14px;
        color: #1f2937;
        line-height: 1.6;
        padding: 9px 12px;
        background: #f9fafb;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        font-family: inherit;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .profile-edit-input:focus {
        border-color: #a5b4fc;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        background: #fff;
      }
      .profile-task-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .profile-task-item {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        font-size: 14px;
        color: #1f2937;
        padding: 7px 10px;
        border-radius: 6px;
        background: #f9fafb;
        border: 1px solid #f3f4f6;
        min-width: 0;
      }
      .profile-task-item > div {
        min-width: 0;
      }
      .profile-task-item.priority {
        background: #fffbeb;
        border-color: #fde68a;
        color: #92400e;
      }
      .profile-task-text {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: flex-start;
        gap: 6px;
        word-break: break-word;
        overflow-wrap: anywhere;
        line-height: 1.45;
      }
      .profile-task-text > span:not(.profile-priority-star) {
        min-width: 0;
        word-break: break-word;
        overflow-wrap: anywhere;
        line-height: 1.45;
      }
      .profile-priority-star {
        color: #d97706;
        font-size: 12px;
        flex-shrink: 0;
        line-height: 1.45;
        margin-top: 1px;
      }
      .profile-task-pct {
        color: #6b7280;
        font-variant-numeric: tabular-nums;
        font-size: 13px;
        flex-shrink: 0;
        line-height: 1.45;
        margin-top: 1px;
      }
      .profile-task-item.priority .profile-task-pct {
        color: #b45309;
      }
      .profile-task-sublist {
        list-style: none;
        margin: 6px 0 0 0;
        padding: 0 0 0 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        border-left: 2px solid #e5e7eb;
        font-size: 14px;
        font-weight: 400;
        text-transform: none;
        letter-spacing: normal;
        color: #1f2937;
      }
      .profile-task-item.is-group {
        background: transparent;
        border: none;
        padding: 6px 4px 2px;
      }
      .profile-task-item.is-group > div > .profile-task-text {
        font-size: 12px;
        font-weight: 600;
        color: #6b7280;
        letter-spacing: 0.02em;
      }
      .profile-task-item.is-group .profile-task-text {
        gap: 4px;
      }
      .profile-task-item.is-sub {
        background: #f9fafb;
        font-size: 14px;
        font-weight: 400;
        text-transform: none;
        letter-spacing: normal;
        color: #1f2937;
      }
      .profile-task-item.is-sub.priority {
        background: #fffbeb;
      }
      .profile-task-merged-hint {
        color: #9ca3af;
        font-size: 11px;
        margin-left: 6px;
        cursor: help;
      }
      .profile-tag-remove {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        color: #d1d5db;
        padding: 0 0 0 8px;
        flex-shrink: 0;
        transition: color 0.15s;
      }
      .profile-tag-remove:hover {
        color: #ef4444;
      }
      .profile-add-row {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .profile-add-input {
        flex: 1;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        font-family: inherit;
        color: #374151;
        background: #fff;
        outline: none;
        transition: border-color 0.15s;
      }
      .profile-add-input:focus {
        border-color: #a5b4fc;
      }
      .profile-add-btn {
        background: #fff;
        color: #374151;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .profile-add-btn:hover {
        background: #f3f4f6;
      }
      .profile-save-btn {
        width: 100%;
        margin-top: 16px;
        background: #111827;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s;
      }
      .profile-save-btn:hover {
        background: #374151;
      }

      /* ---- Time-Split Slider Widget ---- */
      .time-split-widget {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 16px 18px 14px;
        margin-top: -8px;
        animation: fadeInUp 0.3s ease-out;
      }
      .tsp-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .tsp-header-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .tsp-title {
        font-size: 11px;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tsp-subtitle {
        font-size: 13px;
        color: #6b7280;
        line-height: 1.4;
      }
      .tsp-hint {
        font-size: 12px;
        color: #9ca3af;
      }
      .tsp-row {
        display: grid;
        grid-template-columns: minmax(130px, 1.3fr) minmax(100px, 2fr) 42px 20px;
        align-items: center;
        gap: 8px;
        padding: 3px 0;
      }
      .tsp-row.is-refine {
        grid-template-columns: 18px 1fr auto auto;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 14px;
        margin-bottom: 4px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        transition:
          background 0.12s,
          border-color 0.12s,
          box-shadow 0.12s;
      }
      .tsp-row.is-refine:hover {
        background: #fafafa;
        border-color: #d1d5db;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.07);
      }
      .tsp-row.is-refine.is-parent {

        <button class="end-btn profile-toggle-btn" id="profile-btn">
          Profile
        </button>
        <button class="end-btn" id="end-session-btn">End Session</button>
      </div>
    </div>

    <div class="main-content">
      <div class="chat-column">
        <div class="chat-wrapper">
          <div class="chat-inner">
            <div class="hint-text" id="hint-text" style="display: none">
              Press <kbd>Enter</kbd> to send &nbsp;&middot;&nbsp;
              <kbd>Shift + Enter</kbd> for a new line
            </div>
            <div id="chat-box"></div>
          </div>
        </div>

        <div id="status"></div>

        <div class="input-area">
          <div class="input-container">
            <form id="chat-form">
              <textarea
                id="chat-input"
                placeholder="Ask or tell me anything..."
                rows="1"
                required
              ></textarea>
              <button
                type="button"
                class="mic-btn"
                id="record-toggle"
                title="Record voice"
              >
                <svg id="mic-icon" viewBox="0 0 24 24">
                  <path
                    d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"
                  />
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                  <line x1="12" y1="19" x2="12" y2="23" />
                  <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
              </button>
              <button type="submit" class="send-btn" title="Send">
                <svg viewBox="0 0 24 24">
                  <path d="M12 19V5M5 12l7-7 7 7" />
                </svg>
              </button>
            </form>
          </div>
          <div class="disclaimer">SparkMe Interview Assistant</div>
        </div>
      </div>

      <div class="profile-panel" id="profile-panel">
        <div class="profile-header">
          <span class="profile-header-title">User Profile</span>
          <span class="profile-header-badge" id="profile-badge"
            >Loading...</span
          >
        </div>
        <div class="profile-body" id="profile-body">
          <div class="profile-empty-state">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            <p>Start the interview to<br />build your profile.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let sessionToken = null;
      let sessionStartTime = null;
      let sessionTargetMs = null;
      let timerInterval = null;
      let isRecording = false;
      let mediaRecorder = null;
      let audioChunks = [];
      let seenMessageIds = new Set();
      let pendingAudioMessages = new Set();
      let currentAudio = null;
      let ttsEnabled = false;
      let isSessionCompleted = false;
      let pollingInterval = null;
      let isInitializing = false;
      const MIN_SESSION_DURATION_MS = 0;
      let profileConfirmPending = false;
      let botMessageBuffer = [];

      const chatInput = document.getElementById("chat-input");
      chatInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 160) + "px";
      });

      function updateStatus(msg) {
        document.getElementById("status").textContent = msg;
      }

      function startTimer() {
        const el = document.getElementById("session-timer");
        const tick = () => {
          const elapsedMs = Date.now() - sessionStartTime;
          if (sessionTargetMs) {
            const remainingMs = sessionTargetMs - elapsedMs;
            const remainingMin = Math.ceil(remainingMs / 60000);
            el.textContent =
              remainingMs >= 0
                ? `${remainingMin} min left`
                : `+${Math.ceil(-remainingMs / 60000)} min`;
          } else {
            const elapsedMin = Math.floor(elapsedMs / 60000);
            el.textContent = `${elapsedMin} min`;
          }
        };
        tick();
        timerInterval = setInterval(tick, 1000);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function scrollToBottom() {
        const w = document.querySelector(".chat-wrapper");
        w.scrollTop = w.scrollHeight;
      }

      function disableChatInputs() {
        chatInput.disabled = true;
        chatInput.placeholder = "Session has ended. Thank you!";
        document.querySelector(".send-btn").disabled = true;
        document.getElementById("record-toggle").disabled = true;
        document.getElementById("chat-form").onsubmit = (e) => {
          e.preventDefault();
        };
      }

      function appendMessage(role, text, messageId) {
        if (messageId && seenMessageIds.has(messageId)) return false;
        if (messageId) seenMessageIds.add(messageId);

        const hint = document.getElementById("hint-text");
        if (hint) hint.style.display = "none";

        const box = document.getElementById("chat-box");
        const isUser = role === "user" || role === "User";
        const div = document.createElement("div");
        div.className = `message ${isUser ? "user" : "bot"}`;
        div.dataset.msgId = messageId || "";

        const contentP = document.createElement("p");
        const contentDiv = document.createElement("div");
        contentDiv.className = "content";
        contentDiv.appendChild(contentP);

        div.appendChild(contentDiv);
        box.appendChild(div);

        contentP.innerHTML = text.replace(/\n/g, "<br>");

        scrollToBottom();
        return true;
      }

      function normalizeTaskName(t) {
        return String(t)
          .toLowerCase()
          .trim()
          .replace(/[^\w\s]/g, "")
          .replace(
            /\b(just|the|a|an|my|some|any|basically|mostly|really)\b/g,
            "",
          )
          .replace(/\b(art|work|stuff|things|tasks?|activities?|stuff)\b/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function dedupKey(t) {
        return String(t).toLowerCase().trim().replace(/\s+/g, " ");
      }

      function dedupTasks(tasks) {
        const seen = new Map();
        for (const t of tasks) {
          const key = dedupKey(t);
          if (!key) continue;
          // Keep the first occurrence (by insertion order)
          if (!seen.has(key)) seen.set(key, t);
        }
        return Array.from(seen.values());
      }

      async function showTimeSplitWidget() {
        if (document.getElementById("time-split-widget")) return;

        // Show loading placeholder immediately so the widget appears as soon
        // as the question does — portrait refresh happens in the background.
        const widget = document.createElement("div");
        widget.id = "time-split-widget";
        widget.className = "time-split-widget";
        document.getElementById("chat-box").appendChild(widget);
        widget.innerHTML = `
                <div class="tsp-header">
                    <span class="tsp-title">Time allocation across tasks</span>
                </div>
                <div style="color:#9ca3af;font-size:13px;padding:18px 2px;">Organizing tasks… <span style="font-style:italic;">(this may take a minute)</span></div>`;
        scrollToBottom();

        // Fetch latest portrait (portrait LLM may still be in-flight).
        async function _refreshPortrait() {
          try {
            const res = await fetch(
              `/api/session-state?session_token=${sessionToken}`,
            );
            if (res.ok) {
              const data = await res.json();
              if (data.success) {
                lastPortrait = data.user_portrait || lastPortrait;
                renderProfile(lastPortrait);
              }
            }
          } catch (e) {}
        }
        await _refreshPortrait();

        // Poll until Task Inventory is non-empty AND stable (same count on two
        // consecutive polls) so the widget captures the full task list even when
        // the scribe is still processing memories after the first portrait update.
        let _prevTaskCount = -1;
        for (let i = 0; i < 15; i++) {
          await new Promise((r) => setTimeout(r, 3000));
          await _refreshPortrait();
          const _count = (lastPortrait["Task Inventory"] || []).length;
          if (_count > 0 && _count === _prevTaskCount) break;
          _prevTaskCount = _count;
        }

        const rawTasks = lastPortrait["Task Inventory"] || [];
        const seedTasks = dedupTasks(rawTasks);
        if (seedTasks.length === 0) {
          widget.remove();
          return;
        }

        // Ask the backend to organize the flat task list into a tree.
        // Routed through getOrFetchTaskTree so this widget, the feedback
        // widget, and the profile panel always agree on the hierarchy.
        let tree = [];
        try {
          const result = await getOrFetchTaskTree(seedTasks);
          if (result && Array.isArray(result.tree)) tree = result.tree;
        } catch (e) {}
        if (!tree.length)
          tree = seedTasks.map((name) => ({ name, children: [] }));

        // Sync profile panel to the same tree the widget just resolved —
        // the profile may still be showing a flat/stale list because its
        // background fetchTaskTree was abandoned when lastPortrait changed.
        if (tree.length) renderProfile(lastPortrait);

        // Flatten tree into a node map
        const nodes = {}; // id -> { id, name, val, parentId, childIds }
        const rootIds = [];
        let nextId = 1;

        function addNode(name, parentId) {
          const id = "n" + nextId++;
          nodes[id] = {
            id,
            name,
            val: 0,
            parentId: parentId || null,
            childIds: [],
          };
          if (parentId) nodes[parentId].childIds.push(id);
          else rootIds.push(id);
          return id;
        }

        function buildFromTree(treeNodes, parentId) {
          for (const t of treeNodes || []) {
            const id = addNode(String(t.name || "").trim(), parentId);
            if (Array.isArray(t.children) && t.children.length) {
              buildFromTree(t.children, id);
            }
          }
        }
        buildFromTree(tree, null);

        // Always append an "Other" catch-all leaf at root
        const otherId = addNode("Other", null);

        const PALETTE = ['#6366f1','#f59e0b','#10b981','#06b6d4','#f97316','#8b5cf6','#ec4899','#14b8a6','#84cc16','#0ea5e9'];
        function colorFor(id) {
          if (id === otherId) return '#d1d5db';
          const nonOther = rootIds.filter(r => r !== otherId);
          const idx = nonOther.indexOf(id);
          return PALETTE[idx % PALETTE.length] || '#6366f1';
        }

        function stackedBarMarkup() {
          const segs = rootIds.map(id => {
            const pct = nodes[id].val || 0;
            if (pct === 0) return '';
            return `<div class="tsp-stacked-seg" style="width:${pct}%;background:${colorFor(id)}" title="${escapeAttr(capitalizeFirst(nodes[id].name))}: ${pct}%"></div>`;
          }).join('');
          return `<div class="tsp-stacked-bar" id="tsp-stacked-bar">${segs}</div>`;
        }

        function updateStackedBar() {
          const bar = widget.querySelector('#tsp-stacked-bar');
          if (!bar) return;
          bar.innerHTML = rootIds.map(id => {
            const pct = nodes[id].val || 0;
            if (pct === 0) return '';
            return `<div class="tsp-stacked-seg" style="width:${pct}%;background:${colorFor(id)}" title="${escapeAttr(capitalizeFirst(nodes[id].name))}: ${pct}%"></div>`;
          }).join('');
        }

        function isLeaf(n) {
          return n.childIds.length === 0;
        }
        function getLeafIds() {
          return Object.values(nodes)
            .filter(isLeaf)
            .map((n) => n.id);
        }
        function total() {
          return Object.values(nodes).reduce((s, n) => s + (n.val || 0), 0);
        }

        function seedAllocations() {
          // Start every leaf at 0 — the user fills in from scratch.
          Object.values(nodes).forEach((n) => {
            n.val = 0;
          });
        }

        const OTHER_EXPLAIN_THRESHOLD = 1;
        let phase = "refine"; // 'refine' | 'allocate' | 'explain'
        let otherExplanation = "";
        let addSubForId = null;

        function findOther() {
          return nodes[otherId];
        }

        function removeNode(id) {
          const n = nodes[id];
          if (!n) return;
          // Recursively remove children first
          [...n.childIds].forEach(removeNode);
          // Detach from parent / roots
          if (n.parentId) {
            const p = nodes[n.parentId];
            p.childIds = p.childIds.filter((cid) => cid !== id);
          } else {
            const i = rootIds.indexOf(id);
            if (i >= 0) rootIds.splice(i, 1);
          }
          delete nodes[id];
        }

        function isAncestorOf(ancestorId, descendantId) {
          let cur = nodes[descendantId];
          while (cur && cur.parentId) {
            if (cur.parentId === ancestorId) return true;
            cur = nodes[cur.parentId];
          }
          return false;
        }

        function reparent(nodeId, newParentId) {
          const n = nodes[nodeId];
          if (!n) return false;
          if (nodeId === otherId) return false;
          if (newParentId === otherId) return false;
          if (newParentId === nodeId) return false;
          if (newParentId === n.parentId) return false;
          if (newParentId && isAncestorOf(nodeId, newParentId)) return false;
          // Detach
          if (n.parentId) {
            const p = nodes[n.parentId];
            p.childIds = p.childIds.filter((cid) => cid !== nodeId);
          } else {
            const i = rootIds.indexOf(nodeId);
            if (i >= 0) rootIds.splice(i, 1);
          }
          // Attach
          if (newParentId) {
            nodes[newParentId].childIds.push(nodeId);
            n.parentId = newParentId;
          } else {
            const oIdx = rootIds.indexOf(otherId);
            if (oIdx >= 0) rootIds.splice(oIdx, 0, nodeId);
            else rootIds.push(nodeId);
            n.parentId = null;
          }
          return true;
        }

        function footerMarkup(t) {
          const status = t === 100 ? "ok" : "warn";
          const label =
            t === 100
              ? "Total: 100%"
              : `Total: ${t}% — ${t < 100 ? "add " + (100 - t) + "% more" : "remove " + (t - 100) + "%"}`;
          const fillCls = t === 100 ? "ok" : t > 100 ? "over" : "";
          const fillWidth = Math.min(t, 100);
          return `
                    <div class="tsp-total-wrap">
                        <span class="tsp-total ${status}" id="tsp-total">
                            <span class="tsp-total-dot"></span>${label}
                        </span>
                        <div class="tsp-progress">
                            <div class="tsp-progress-fill ${fillCls}" id="tsp-progress-fill" style="width:${fillWidth}%"></div>
                        </div>
                    </div>
                    <button class="tsp-back-btn" id="tsp-alloc-back">Back</button>
                    <button class="tsp-submit" id="tsp-submit" ${t === 100 ? "" : "disabled"}>Submit</button>`;
        }

        function refineFooterMarkup() {
          const leafCount = getLeafIds().filter((id) => id !== otherId).length;
          const countLabel = leafCount === 1 ? "1 task" : `${leafCount} tasks`;
          const statusCls = leafCount > 0 ? "ok" : "warn";
          return `
                    <div class="tsp-total-wrap">
                        <span class="tsp-total ${statusCls}">
                            <span class="tsp-total-dot"></span>${countLabel} to allocate
                        </span>
                    </div>
                    <button class="tsp-submit" id="tsp-refine-next" ${leafCount === 0 ? "disabled" : ""}>Allocate time →</button>`;
        }

        function explainMarkup() {
          const pct = findOther().val;
          const canSubmit = otherExplanation.trim().length > 0;
          return `
                    <div class="tsp-explain">
                        <div class="tsp-explain-label">You put <strong>${pct}%</strong> toward "Other" — what does that cover?</div>
                        <input type="text" class="tsp-explain-input" id="tsp-explain-input"
                               placeholder="e.g., admin tasks, mentoring, job applications..."
                               value="${escapeAttr(otherExplanation)}" maxlength="200">
                        <div class="tsp-explain-actions">
                            <button class="tsp-back-btn" id="tsp-explain-back">Back</button>
                            <button class="tsp-submit" id="tsp-explain-submit" ${canSubmit ? "" : "disabled"}>Submit</button>
                        </div>
                    </div>`;
        }

        function indentHtml(depth) {
          return Array.from(
            { length: depth },
            () => '<span class="tsp-task-indent"></span>',
          ).join("");
        }

        function renderNode(id, depth, out) {
          const n = nodes[id];
          const leaf = isLeaf(n);
          const rowCls = leaf ? "" : "is-parent";
          const inRefine = phase === "refine";
          if (!inRefine && depth > 0) return; // Allocate phase shows only top-level tasks.
          const nodeColor = colorFor(id);
          const trackInner = inRefine
            ? ``
            : `
                        <div class="tsp-bar-bg"></div>
                        <div class="tsp-bar-fill" id="tsp-fill-${id}" style="width:${n.val}%;background:${nodeColor}"></div>
                        <input type="range" class="tsp-slider" data-id="${id}" min="0" max="100" step="1" value="${n.val}" style="--tsp-color:${nodeColor}">`;
          if (inRefine) {
            const depthCls = depth > 0 ? " is-sub" : "";
            const isDraggable = id !== otherId;
            out.push(`
                        <div class="tsp-row is-refine${depthCls} ${rowCls}" data-id="${id}" data-depth="${depth}" style="${depth > 0 ? `margin-left:${depth * 28}px;` : ""}" ${isDraggable ? 'draggable="true"' : ""}>
                            ${depth > 0 ? `<span class="tsp-sub-connector" aria-hidden="true"></span>` : ""}
                            ${isDraggable ? `<span class="tsp-drag-handle" aria-hidden="true" title="Drag to nest or un-nest">⋮⋮</span>` : ""}
                            <span class="tsp-task">
                                <textarea class="tsp-task-edit" data-id="${id}" draggable="false" maxlength="120" title="Click to edit" rows="1">${escapeHtml(capitalizeFirst(n.name))}</textarea>
                                ${!leaf ? `<span class="tsp-sub-count">${n.childIds.length}</span>` : ""}
                            </span>
                            ${id !== otherId ? `<button class="tsp-add-sub" data-id="${id}" title="Add subtask"><span class="tsp-add-sub-plus">+</span> sub</button>` : ""}
                            ${id !== otherId ? `<button class="tsp-remove" data-id="${id}" title="Remove">×</button>` : `<span class="tsp-row-spacer"></span>`}
                        </div>`);
          } else {
            const pctCell = `<input type="number" class="tsp-pct" id="tsp-pct-${id}" data-id="${id}" min="0" max="100" step="1" value="${n.val}" aria-label="${escapeAttr(n.name)} percent">`;
            out.push(`
                        <div class="tsp-row ${rowCls}" data-id="${id}">
                            <span class="tsp-task" title="${escapeAttr(n.name)}">
                                <span class="tsp-task-label">${escapeHtml(capitalizeFirst(n.name))}</span>
                            </span>
                            <div class="tsp-track">${trackInner}</div>
                            ${pctCell}
                            <span class="tsp-row-spacer"></span>
                        </div>`);
          }
          if (addSubForId === id) {
            const subDepth = depth + 1;
            out.push(`
                        <div class="tsp-subadd-row" data-depth="${subDepth}" style="margin-left:${subDepth * 28}px;">
                            <span class="tsp-subadd-connector" aria-hidden="true"></span>
                            <input type="text" class="tsp-subadd-input" id="tsp-subadd-input"
                                   placeholder='Subtask of "${escapeAttr(n.name)}"…' maxlength="80">
                            <button class="tsp-subadd-commit" id="tsp-subadd-commit">Add</button>
                            <button class="tsp-subadd-cancel" id="tsp-subadd-cancel" title="Cancel">×</button>
                        </div>`);
          }
          for (const cid of n.childIds) renderNode(cid, depth + 1, out);
        }

        function buildRows() {
          const out = [];
          for (const id of rootIds) {
            if (phase === "refine" && id === otherId) continue;
            renderNode(id, 0, out);
          }
          return out.join("");
        }

        function finalSubmit() {
          // Emit every node with a non-zero allocation (parents and leaves alike).
          const parts = [];
          function walk(id, prefix) {
            const n = nodes[id];
            const path = prefix ? `${prefix} › ${n.name}` : n.name;
            if (n.val > 0) {
              if (n.id === otherId && otherExplanation.trim()) {
                parts.push(`Other (${otherExplanation.trim()}): ${n.val}%`);
              } else {
                parts.push(`${path}: ${n.val}%`);
              }
            }
            for (const cid of n.childIds) walk(cid, path);
          }
          for (const id of rootIds) walk(id, "");
          widget.remove();
          chatInput.value = parts.join(", ");
          document
            .getElementById("chat-form")
            .dispatchEvent(new Event("submit"));
        }

        function render() {
          const title =
            phase === "refine"
              ? "Review your tasks"
              : "Time allocation across tasks";
          const subtitle =
            phase === "refine"
              ? "Edit names, remove extras, or drag to nest tasks under each other."
              : "";
          const addRow =
            phase === "refine" || phase === "allocate"
              ? `<div class="tsp-add-row">
                        <input type="text" class="tsp-add-input" id="tsp-add-input" placeholder="Add a task..." maxlength="80">
                        <button class="tsp-add-btn" id="tsp-add-btn">+ Add</button>
                       </div>`
              : "";
          let footer;
          if (phase === "explain") footer = explainMarkup();
          else if (phase === "refine")
            footer = `<div class="tsp-footer">${refineFooterMarkup()}</div>`;
          else
            footer = `<div class="tsp-footer">${footerMarkup(total())}</div>`;
          widget.innerHTML = `
                    <div class="tsp-header">
                        <div class="tsp-header-text">
                            <span class="tsp-title">${title}</span>
                            ${subtitle ? `<span class="tsp-subtitle">${subtitle}</span>` : ""}
                        </div>
                    </div>
                    ${phase === 'allocate' ? stackedBarMarkup() : ''}
                    <div id="tsp-rows">${buildRows()}</div>
                    ${addRow}
                    ${footer}`;
          widget.querySelectorAll(".tsp-task-edit").forEach((el) => {
            el.style.height = "auto";
            el.style.height = el.scrollHeight + "px";
          });
        }

        function updateFooter() {
          const footer = widget.querySelector(".tsp-footer");
          if (!footer) return;
          if (phase === "refine") footer.innerHTML = refineFooterMarkup();
          else if (phase === "allocate")
            footer.innerHTML = footerMarkup(total());
        }

        function applyVal(id, rawVal, syncPct) {
          const n = nodes[id];
          if (!n) return;
          let v = parseInt(rawVal);
          if (isNaN(v)) v = 0;
          v = Math.max(0, Math.min(100, v));
          n.val = v;
          const fill = document.getElementById(`tsp-fill-${id}`);
          if (fill) fill.style.width = v + "%";
          const slider = widget.querySelector(`.tsp-slider[data-id="${id}"]`);
          if (slider && slider !== document.activeElement) slider.value = v;
          if (syncPct) {
            const pct = document.getElementById(`tsp-pct-${id}`);
            if (pct && pct !== document.activeElement) pct.value = v;
          }
          updateFooter();
          updateStackedBar();
        }

        function addTopLevel() {
          const input = widget.querySelector("#tsp-add-input");
          const name = input.value.trim();
          if (!name) return;
          const newId = addNode(name, null);
          // Keep Other as the last root
          const oIdx = rootIds.indexOf(otherId);
          const nIdx = rootIds.indexOf(newId);
          if (oIdx >= 0 && nIdx > oIdx) {
            rootIds.splice(nIdx, 1);
            rootIds.splice(oIdx, 0, newId);
          }
          render();
          scrollToBottom();
        }

        function commitSubtask() {
          const input = widget.querySelector("#tsp-subadd-input");
          if (!input || !addSubForId) return;
          const name = input.value.trim();
          if (!name) return;
          addNode(name, addSubForId);
          addSubForId = null;
          render();
          scrollToBottom();
        }

        let dragId = null;
        function clearDropClasses() {
          widget
            .querySelectorAll(".is-drop-target")
            .forEach((el) => el.classList.remove("is-drop-target"));
          const rowsEl = widget.querySelector("#tsp-rows");
          if (rowsEl) rowsEl.classList.remove("is-drop-root");
        }
        widget.addEventListener("dragstart", function (e) {
          if (e.target.closest(".tsp-task-edit")) {
            e.preventDefault();
            return;
          }
          const row = e.target.closest(".tsp-row.is-refine");
          if (!row || row.dataset.id === otherId) return;
          dragId = row.dataset.id;
          row.classList.add("is-dragging");
          e.dataTransfer.effectAllowed = "move";
          try {
            e.dataTransfer.setData("text/plain", dragId);
          } catch (_) {}
        });
        widget.addEventListener("dragend", function () {
          dragId = null;
          widget
            .querySelectorAll(".is-dragging")
            .forEach((el) => el.classList.remove("is-dragging"));
          clearDropClasses();
        });
        widget.addEventListener("dragover", function (e) {
          if (!dragId) return;
          const rowsEl = widget.querySelector("#tsp-rows");
          if (!rowsEl) return;
          clearDropClasses();
          const row = e.target.closest(".tsp-row.is-refine");
          const canDropOnRow =
            row &&
            row.dataset.id !== dragId &&
            row.dataset.id !== otherId &&
            !isAncestorOf(dragId, row.dataset.id) &&
            nodes[dragId] &&
            nodes[dragId].parentId !== row.dataset.id;
          if (canDropOnRow) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            row.classList.add("is-drop-target");
          } else if (
            rowsEl.contains(e.target) &&
            nodes[dragId] &&
            nodes[dragId].parentId !== null
          ) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            rowsEl.classList.add("is-drop-root");
          }
        });
        widget.addEventListener("drop", function (e) {
          if (!dragId) return;
          e.preventDefault();
          const rowsEl = widget.querySelector("#tsp-rows");
          const row = e.target.closest(".tsp-row.is-refine");
          let changed = false;
          if (
            row &&
            row.dataset.id !== dragId &&
            row.dataset.id !== otherId &&
            !isAncestorOf(dragId, row.dataset.id)
          ) {
            changed = reparent(dragId, row.dataset.id);
          } else if (
            rowsEl &&
            rowsEl.contains(e.target) &&
            nodes[dragId] &&
            nodes[dragId].parentId !== null
          ) {
            changed = reparent(dragId, null);
          }
          dragId = null;
          clearDropClasses();
          if (changed) render();
        });

        widget.addEventListener("input", function (e) {
          if (e.target.classList.contains("tsp-slider")) {
            applyVal(e.target.dataset.id, e.target.value, true);
          } else if (e.target.classList.contains("tsp-pct")) {
            applyVal(e.target.dataset.id, e.target.value, false);
          } else if (e.target.id === "tsp-explain-input") {
            otherExplanation = e.target.value;
            const btn = document.getElementById("tsp-explain-submit");
            if (btn) btn.disabled = otherExplanation.trim().length === 0;
          }
        });

        widget.addEventListener("change", function (e) {
          if (e.target.classList.contains("tsp-pct")) {
            const id = e.target.dataset.id;
            const n = nodes[id];
            if (n) e.target.value = n.val;
          }
          if (e.target.classList.contains("tsp-task-edit")) {
            const id = e.target.dataset.id;
            const n = nodes[id];
            if (!n) return;
            const newName = e.target.value.trim();
            if (newName) {
              n.name = newName;
              render();
            } else e.target.value = n.name;
          }
        });
        widget.addEventListener("keydown", function (e) {
          if (!e.target.classList.contains("tsp-task-edit")) return;
          if (e.key === "Enter") {
            e.preventDefault();
            e.target.blur();
          }
          if (e.key === "Escape") {
            const n = nodes[e.target.dataset.id];
            if (n) e.target.value = n.name;
            e.target.blur();
          }
        });

        widget.addEventListener("click", function (e) {
          if (e.target.classList.contains("tsp-remove")) {
            removeNode(e.target.dataset.id);
            render();
            scrollToBottom();
            return;
          }
          if (e.target.classList.contains("tsp-add-sub")) {
            addSubForId = e.target.dataset.id;
            render();
            scrollToBottom();
            setTimeout(() => {
              const el = document.getElementById("tsp-subadd-input");
              if (el) el.focus();
            }, 0);
            return;
          }
          if (e.target.id === "tsp-subadd-commit") {
            commitSubtask();
            return;
          }
          if (e.target.id === "tsp-subadd-cancel") {
            addSubForId = null;
            render();
            return;
          }
          if (e.target.id === "tsp-add-btn") {
            addTopLevel();
            return;
          }
          if (e.target.id === "tsp-refine-next") {
            addSubForId = null;
            seedAllocations();
            phase = "allocate";
            render();
            scrollToBottom();
            return;
          }
          if (e.target.id === "tsp-alloc-back") {
            phase = "refine";
            render();
            scrollToBottom();
            return;
          }
          if (e.target.id === "tsp-submit") {
            if (total() !== 100) return;
            const other = findOther();
            if (other && other.val >= OTHER_EXPLAIN_THRESHOLD) {
              phase = "explain";
              render();
              scrollToBottom();
              setTimeout(() => {
                const el = document.getElementById("tsp-explain-input");
                if (el) el.focus();
              }, 0);
            } else {
              finalSubmit();
            }
            return;
          }
          if (e.target.id === "tsp-explain-back") {
            phase = "allocate";
            render();
            return;
          }
          if (e.target.id === "tsp-explain-submit") {
            if (otherExplanation.trim().length === 0) return;
            finalSubmit();
          }
        });

        widget.addEventListener("keydown", function (e) {
          if (e.key !== "Enter") return;
          if (e.target.id === "tsp-add-input") {
            e.preventDefault();
            addTopLevel();
          } else if (e.target.id === "tsp-subadd-input") {
            e.preventDefault();
            commitSubtask();
          } else if (
            e.target.id === "tsp-explain-input" &&
            otherExplanation.trim().length > 0
          ) {
            e.preventDefault();
            finalSubmit();
          }
        });

        render();
        scrollToBottom();
      }

      async function showFeedbackWidget() {
        if (document.getElementById("feedback-widget")) return;

        // Refresh portrait so the task list reflects the most recent state
        try {
          const res = await fetch(
            `/api/session-state?session_token=${sessionToken}`,
          );
          if (res.ok) {
            const data = await res.json();
            if (data.success) {
              lastPortrait = data.user_portrait || lastPortrait;
              renderProfile(lastPortrait);
            }
          }
        } catch (e) {}

        const rawTasks = lastPortrait["Task Inventory"] || [];
        const tasks = dedupTasks(rawTasks);

        // Show the widget immediately; fetch the task tree in the background.
        let taskTree = tasks.map((name) => ({ name, children: [] }));

        const widget = document.createElement("div");
        widget.id = "feedback-widget";
        widget.className = "feedback-widget";
        document.getElementById("chat-box").appendChild(widget);

        let rating = null;

        function capitalizeTask(s) {
          const str = String(s || "").trim();
          if (!str) return str;
          return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function allTaskNames(nodes) {
          const names = [];
          for (const n of nodes || []) {
            if (n && n.name) names.push(String(n.name).trim());
            names.push(...allTaskNames(n && n.children));
          }
          return names;
        }

        // All tasks start checked (user unchecks tasks they don't perform)
        const checkedTasks = new Set();

        function renderTaskNodes(nodes, depth) {
          if (!Array.isArray(nodes) || nodes.length === 0) return "";
          const cls = depth === 0 ? "fb-task-list" : "fb-task-sublist";
          return `<ul class="${cls}">${nodes
            .map((n) => {
              const rawName = String((n && n.name) || "").trim();
              const name = capitalizeTask(rawName);
              const kids = n && Array.isArray(n.children) ? n.children : [];
              const checked = checkedTasks.has(rawName) ? "checked" : "";
              return `<li class="fb-task-item${depth > 0 ? " fb-task-sub" : ""}">
                        <label class="fb-task-label">
                            <input type="checkbox" class="fb-task-check" data-task="${escapeHtml(rawName)}" ${checked}>
                            <span class="fb-task-name">${escapeHtml(name)}</span>
                        </label>
                        ${renderTaskNodes(kids, depth + 1)}
                    </li>`;
            })
            .join("")}</ul>`;
        }

        function render() {
          const taskListHtml =
            tasks.length === 0
              ? `<div class="fb-task-empty">No tasks were extracted.</div>`
              : renderTaskNodes(taskTree, 0);
          const hasUnchecked =
            checkedTasks.size > 0 &&
            allTaskNames(taskTree).some((n) => !checkedTasks.has(n));
          const uncheckedReasonOk =
            !hasUnchecked ||
            (widget._uncheckedReasonValue || "").trim().length > 0;
          const canSubmit =
            rating !== null &&
            (widget._missingTasksValue || "").trim().length > 0 &&
            uncheckedReasonOk;
          widget.innerHTML = `
                    <div class="fb-title">Before you go</div>
                    <div class="fb-intro">A couple of quick questions to help us improve.</div>

                    <div class="fb-section">
                        <div class="fb-section-label">How satisfied were you with this conversation?</div>
                        <div class="fb-rating">
                            ${[1, 2, 3, 4, 5]
                              .map(
                                (n) => `
                                <button type="button" class="fb-rating-btn ${rating === n ? "selected" : ""}" data-val="${n}">${n}</button>
                            `,
                              )
                              .join("")}
                        </div>
                        <div class="fb-rating-scale">
                            <span>Very unsatisfied</span>
                            <span>Very satisfied</span>
                        </div>
                    </div>

                    <div class="fb-section">
                        <div class="fb-section-label">Of these tasks, please check the ones that you perform:</div>
                        ${taskListHtml}
                    </div>

                    ${
                      tasks.length > 0 &&
                      checkedTasks.size > 0 &&
                      allTaskNames(taskTree).some((n) => !checkedTasks.has(n))
                        ? `
                    <div class="fb-section">
                        <div class="fb-section-label">Why didn't you check those tasks?</div>
                        <textarea class="fb-unchecked-reason" id="fb-unchecked-reason" placeholder="e.g. those tasks belong to a colleague, I used to do them but no longer do..." maxlength="1000"></textarea>
                    </div>
                    `
                        : ""
                    }

                    <div class="fb-section">
                        <div class="fb-section-label">Are there tasks you perform that were not captured in this list?</div>
                        <textarea class="fb-missing-tasks" id="fb-missing-tasks" placeholder="List any tasks that were missed..." maxlength="1000"></textarea>
                    </div>

                    <div class="fb-section">
                        <div class="fb-section-label">Anything else you'd like to share? (optional)</div>
                        <textarea class="fb-comment" id="fb-comment" placeholder="Any comments or suggestions..." maxlength="1000"></textarea>
                    </div>

                    <button class="fb-submit" id="fb-submit" ${canSubmit ? "" : "disabled"}>Submit & End Session</button>
                `;

          // Preserve text inputs across re-renders
          const commentEl = widget.querySelector("#fb-comment");
          if (commentEl) commentEl.value = widget._commentValue || "";
          const uncheckedEl = widget.querySelector("#fb-unchecked-reason");
          if (uncheckedEl)
            uncheckedEl.value = widget._uncheckedReasonValue || "";
          const missingEl = widget.querySelector("#fb-missing-tasks");
          if (missingEl) missingEl.value = widget._missingTasksValue || "";

          widget.querySelectorAll(".fb-rating-btn").forEach((btn) => {
            btn.onclick = () => {
              rating = parseInt(btn.dataset.val);
              widget._commentValue = commentEl ? commentEl.value : "";
              render();
            };
          });
          widget.querySelectorAll(".fb-task-check").forEach((cb) => {
            cb.onchange = () => {
              if (cb.checked) checkedTasks.add(cb.dataset.task);
              else checkedTasks.delete(cb.dataset.task);
              widget._commentValue = commentEl ? commentEl.value : "";
              widget._uncheckedReasonValue = uncheckedEl
                ? uncheckedEl.value
                : "";
              render();
            };
          });
          function refreshSubmit() {
            const hasUnchecked =
              checkedTasks.size > 0 &&
              allTaskNames(taskTree).some((n) => !checkedTasks.has(n));
            const uncheckedReasonOk =
              !hasUnchecked ||
              (widget._uncheckedReasonValue || "").trim().length > 0;
            const ok =
              rating !== null &&
              (widget._missingTasksValue || "").trim().length > 0 &&
              uncheckedReasonOk;
            const btn = widget.querySelector("#fb-submit");
            if (btn) btn.disabled = !ok;
          }
          if (commentEl) {
            commentEl.addEventListener("input", () => {
              widget._commentValue = commentEl.value;
            });
          }
          if (uncheckedEl) {
            uncheckedEl.addEventListener("input", () => {
              widget._uncheckedReasonValue = uncheckedEl.value;
              refreshSubmit();
            });
          }
          if (missingEl) {
            missingEl.addEventListener("input", () => {
              widget._missingTasksValue = missingEl.value;
              refreshSubmit();
            });
          }

          const submitBtn = widget.querySelector("#fb-submit");
          if (submitBtn) {
            submitBtn.onclick = async () => {
              if (submitBtn.disabled) return;
              submitBtn.disabled = true;
              submitBtn.textContent = "Submitting...";
              const payload = {
                session_token: sessionToken,
                feedback: {
                  rating: rating,
                  tasks_shown: tasks,
                  task_tree: taskTree,
                  tasks_performed: Array.from(checkedTasks),
                  tasks_not_performed: allTaskNames(taskTree).filter(
                    (n) => !checkedTasks.has(n),
                  ),
                  tasks_not_performed_reason:
                    (widget._uncheckedReasonValue || "").trim() || null,
                  tasks_missing:
                    (widget._missingTasksValue || "").trim() || null,
                  comment: (commentEl ? commentEl.value : "").trim(),
                },
              };
              try {
                const r = await (
                  await fetch("/api/submit-feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                  })
                ).json();
                if (r.success) {
                  widget.remove();
                  isSessionCompleted = true;
                  stopTimer();
                  updateEndSessionButton();
                  disableChatInputs();
                  if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                  }
                  showEndBanner();
                } else {
                  submitBtn.disabled = false;
                  submitBtn.textContent = "Submit & End Session";
                  updateStatus("Failed to submit feedback");
                }
              } catch (e) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit & End Session";
                updateStatus("Error submitting feedback");
              }
            };
          }
        }

        render();
        scrollToBottom();

        // Fetch organized tree in background and re-render task list once ready.
        // Shared with the time-split widget and profile panel via getOrFetchTaskTree.
        if (tasks.length > 0) {
          (async () => {
            try {
              const result = await getOrFetchTaskTree(tasks);
              if (result && Array.isArray(result.tree) && result.tree.length) {
                taskTree = result.tree;
                render();
              }
            } catch (e) {}
          })();
        }
      }

      let currentAudioEl = null;

      function stopCurrentAudio() {
        if (currentAudioEl) {
          currentAudioEl.pause();
          currentAudioEl.src = "";
          currentAudioEl = null;
        }
        updateStatus("");
      }

      function playMessageAudio(messageId) {
        if (!messageId || !ttsEnabled) return;
        stopCurrentAudio();
        const audio = new Audio(
          `/api/stream-voice-response?session_token=${sessionToken}&message_id=${messageId}`,
        );
        currentAudioEl = audio;
        audio.onended = () => {
          if (currentAudioEl === audio) currentAudioEl = null;
          updateStatus("");
        };
        audio.onerror = (e) => {
          console.warn("TTS stream error:", e);
          if (currentAudioEl === audio) currentAudioEl = null;
        };
        audio.play().catch((e) => console.warn("Audio play failed:", e));
      }

      async function showMessageWithAudio(msg) {
        const audioEl = new Audio(
          `/api/stream-voice-response?session_token=${sessionToken}&message_id=${msg.id}`,
        );
        audioEl.preload = "auto";

        await new Promise((resolve) => {
          const timer = setTimeout(resolve, 4000);
          audioEl.addEventListener(
            "canplay",
            () => {
              clearTimeout(timer);
              resolve();
            },
            { once: true },
          );
          audioEl.addEventListener(
            "error",
            () => {
              clearTimeout(timer);
              resolve();
            },
            { once: true },
          );
        });

        appendMessage("bot", msg.content, msg.id);
        removeTyping();
        pendingAudioMessages.delete(msg.id);

        if (ttsEnabled) {
          stopCurrentAudio();
          currentAudioEl = audioEl;
          audioEl.onended = () => {
            if (currentAudioEl === audioEl) currentAudioEl = null;
            updateStatus("");
          };
          audioEl.onerror = (e) => {
            console.warn("TTS stream error:", e);
            if (currentAudioEl === audioEl) currentAudioEl = null;
          };
          audioEl.play().catch((e) => console.warn("Audio play failed:", e));
        }
      }

      async function initializeSession() {
        if (isInitializing || sessionToken) return;
        isInitializing = true;
        try {
          updateStatus("Starting session...");
          const urlParams = new URLSearchParams(window.location.search);
          const availableTime = urlParams.get("available_time");
          const body = availableTime
            ? JSON.stringify({ available_time: parseInt(availableTime) })
            : "{}";
          const res = await fetch("/api/start-session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body,
          });
          const data = await res.json();
          if (data.success) {
            sessionToken = data.session_token;
            const targetMinutes = parseInt(
              data.available_time || availableTime,
              10,
            );
            if (!isNaN(targetMinutes) && targetMinutes > 0) {
              sessionTargetMs = targetMinutes * 60 * 1000;
            }
            const startedAt = data.session_started_at
              ? new Date(data.session_started_at).getTime()
              : null;
            sessionStartTime =
              startedAt && !isNaN(startedAt) ? startedAt : Date.now();
            startTimer();
            updateStatus("");
            // Poll aggressively for the first 8 s so the opening question
            // appears as soon as the LLM responds, then settle to normal cadence.
            if (!pollingInterval) {
              pollingInterval = setInterval(pollForMessages, 100);
              setTimeout(() => {
                clearInterval(pollingInterval);
                pollingInterval = setInterval(pollForMessages, 400);
              }, 8000);
            }
            setInterval(updateEndSessionButton, 1000);
            if (!profilePollInterval)
              profilePollInterval = setInterval(fetchAndRenderProfile, 5000);
            fetchAndRenderProfile();
            if (data.was_existing) {
              await silentProfileLoad();
              await pollForMessages(true);
            } else {
              // showTyping('Setting things up — this may take a minute...');
              pollForMessages();
            }
          } else updateStatus("Failed to start session");
        } catch (e) {
          updateStatus("Error starting session");
        } finally {
          isInitializing = false;
        }
      }

      async function pollForMessages(fullHistory = false) {
        if (!sessionToken) return;
        try {
          const url = fullHistory
            ? `/api/get-messages?session_token=${sessionToken}&full=true`
            : `/api/get-messages?session_token=${sessionToken}`;
          const res = await fetch(url);
          if (res.status === 400) {
            removeTyping();
            sessionToken = null;
            clearInterval(pollingInterval);
            return;
          }
          const data = await res.json();
          if (data.success && data.messages) {
            data.messages.forEach((msg) => {
              if (msg.type === "time_split_widget") {
                if (!seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  // Flush any buffered Interviewer messages so the question
                  // appears above the widget (profile review may have buffered it)
                  if (profileConfirmPending) {
                    profileConfirmPending = false;
                    removeProfileHint();
                    const toFlush = botMessageBuffer.splice(0);
                    toFlush.forEach((m) => {
                      if (appendMessage("bot", m.content, m.id)) removeTyping();
                    });
                  }
                  setTimeout(() => showTimeSplitWidget(), 50);
                }
                return;
              }
              if (msg.type === "feedback_widget") {
                if (!seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  setTimeout(() => showFeedbackWidget(), 50);
                }
                return;
              }
              if (msg.role === "Interviewer" || msg.role === "assistant") {
                if (
                  seenMessageIds.has(msg.id) ||
                  pendingAudioMessages.has(msg.id)
                )
                  return;
                if (botMessageBuffer.some((m) => m.id === msg.id)) return;
                if (profileConfirmPending && !fullHistory) {
                  botMessageBuffer.push(msg);
                  return;
                }
                if (ttsEnabled && msg.id && !fullHistory) {
                  pendingAudioMessages.add(msg.id);
                  showMessageWithAudio(msg);
                } else {
                  if (appendMessage("bot", msg.content, msg.id)) {
                    removeTyping();
                  }
                }
              } else if (msg.role === "User" || msg.role === "user") {
                appendMessage("user", msg.content, msg.id);
              } else if (msg.role === "system") {
                if (msg.id && !seenMessageIds.has(msg.id)) {
                  seenMessageIds.add(msg.id);
                  const div = document.createElement("div");
                  div.className = "system-message";
                  div.textContent = msg.content;
                  document.querySelector(".chat-inner").appendChild(div);
                  scrollToBottom();
                }
              }
            });
          }
          if (data.session_completed && !isSessionCompleted) {
            // If feedback widget is currently shown, don't end yet —
            // wait for the user to submit feedback before finalizing.
            if (document.getElementById("feedback-widget")) return;
            updateStatus("");
            isSessionCompleted = true;
            stopTimer();
            updateEndSessionButton();
            disableChatInputs();
            // Keep polling for 1.5s to catch any goodbye message that is
            // buffered just before the session_in_progress flag flips.
            setTimeout(() => {
              if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
              }
              showEndBanner();
            }, 1500);
          }
        } catch (e) {}
      }

      function updateEndSessionButton() {
        const btn = document.getElementById("end-session-btn");
        if (isSessionCompleted) {
          btn.disabled = true;
          return;
        }
        if (sessionStartTime) {
          const left =
            MIN_SESSION_DURATION_MS - (Date.now() - sessionStartTime);
          if (left > 0) {
            btn.disabled = true;
            btn.title = `Available in ${Math.ceil(left / 60000)}m`;
          } else {
            btn.disabled = false;
            btn.title = "End Session";
          }
        }
      }

      let recordingStartTime = null;
      let recActualMimeType = "";
      const MIN_RECORDING_MS = 500;

      let currentStream = null;

      function startRecording(stream) {
        currentStream = stream;
        const track = stream.getAudioTracks()[0];
        console.log(
          "[Mic] Track:",
          track.label,
          "enabled:",
          track.enabled,
          "muted:",
          track.muted,
          "readyState:",
          track.readyState,
        );
        mediaRecorder = new MediaRecorder(stream);
        recActualMimeType = mediaRecorder.mimeType;
        console.log("[Mic] MediaRecorder mimeType:", recActualMimeType);
        audioChunks = [];
        recordingStartTime = Date.now();
        mediaRecorder.ondataavailable = (e) => {
          console.log("[Mic] chunk:", e.data.size, "bytes");
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
          console.log(
            "[Mic] Total chunks:",
            audioChunks.length,
            "total bytes:",
            audioChunks.reduce((s, c) => s + c.size, 0),
          );
          if (currentStream) {
            currentStream.getTracks().forEach((t) => t.stop());
            currentStream = null;
          }
          sendAudioToServer();
        };
        mediaRecorder.start(250);
        updateStatus("Recording...");
      }

      async function sendAudioToServer() {
        if (!sessionToken) return;
        const elapsed = Date.now() - (recordingStartTime || 0);
        if (elapsed < MIN_RECORDING_MS || audioChunks.length === 0) {
          updateStatus("Recording too short — please hold the button longer.");
          setTimeout(() => updateStatus(""), 3000);
          return;
        }
        updateStatus("Transcribing...");
        const ext = recActualMimeType.includes("mp4") ? "mp4" : "webm";
        const fd = new FormData();
        fd.append(
          "audio",
          new Blob(audioChunks, { type: recActualMimeType }),
          `recording.${ext}`,
        );
        fd.append("session_token", sessionToken);
        fd.append("transcribe_only", "true");
        try {
          const res = await fetch("/api/send-voice", {
            method: "POST",
            body: fd,
          });
          const data = await res.json();

      const micSVG =

      document.getElementById("chat-form").onsubmit = async function (e) {
